            method: "POST",
          });
          if (!resp.ok) {
            throw new Error(`HTTP ${resp.status}`);
          }
          const result = await resp.json();
          showBackfillResult(result);
          // The sync invalidates the in-memory snapshot cache
          // server-side, so a follow-up snapshot fetch will pull fresh
          // data. Run it unconditionally so the dashboard advances to
          // whatever the sync surfaced.
          fetchSnapshot(false);
          loadStoreStats();
          // If the history panel is open, re-pull it from the (newly
          // populated) store.
          if (state.history && state.history.rig) {
            loadHistory(state.history.rig);
          }
        } catch (err) {
          showBackfillResult({
            ok: false,
            stopped_reason: "client_error",
            pages_fetched: 0,
            builds_seen: 0,
            builds_written: 0,
            builds_new: 0,
            builds_updated: 0,
            builds_unchanged: 0,
            errors: [String(err.message || err)],
          });
        } finally {
          setBackfillRunning(false);
        }
      }

      // Auto-refresh drives its 10s loop from a Web Worker instead of a plain
      // setInterval on the page. Browsers aggressively throttle (and
      // eventually freeze) main-thread timers in background/unfocused tabs —
      // Chrome clamps a hidden tab to roughly one timer fire per minute after
      // a few minutes — which is why the refresh only advanced while the tab
      // was focused. Worker timers aren't subject to that background
      // throttling, so the worker posts a "tick" every interval and the page
      // does the actual fetch on receipt. (Only timer *scheduling* is
      // throttled; the fetch itself runs fine in a background tab.)
      const AUTO_REFRESH_INTERVAL_MS = 10000;

      function autoRefreshTick() {
        // Skip the tick while rate-limited; the dedicated retry timer handles
        // resuming once the limit resets, so we don't hammer Buildkite and
        // trigger the same 429 again. Each tick fetches the last 10 deploys
        // per rig because the persistent store covers older history, so 10s
        // is well within Buildkite's 100/min limit. Normal read-only ticks
        // also advance the server cache once its 10s freshness window expires.
        if (isRateLimited()) return;
        fetchSnapshot(true);
      }

      let autoRefreshWorker = null;
      let autoRefreshWorkerTried = false;
      function getAutoRefreshWorker() {
        // Build the worker lazily on first use and cache the result (worker or
        // null) so construction is only attempted once. The worker source is
        // inlined via a Blob URL to keep everything in this single static file
        // (the server sets no CSP, so blob: workers are allowed).
        if (autoRefreshWorkerTried) return autoRefreshWorker;
        autoRefreshWorkerTried = true;
        try {
          if (typeof Worker !== "undefined" && typeof Blob !== "undefined") {
            const src =
              "let t=null;" +
              "onmessage=function(e){" +
              "var d=e.data||{};" +
              "if(d.cmd==='start'){" +
              "if(t)clearInterval(t);" +
              "t=setInterval(function(){postMessage('tick');},d.interval);" +
              "}else if(d.cmd==='stop'){" +
              "if(t){clearInterval(t);t=null;}" +
              "}};";
            const url = URL.createObjectURL(
              new Blob([src], { type: "application/javascript" }),
            );
            const worker = new Worker(url);
            URL.revokeObjectURL(url);
            worker.onmessage = autoRefreshTick;
            autoRefreshWorker = worker;
          }
        } catch (err) {
          // No worker support (or blocked) — fall back to setInterval below.
          autoRefreshWorker = null;
        }
        return autoRefreshWorker;
      }

      function setupAutoRefresh() {
        const worker = getAutoRefreshWorker();
        // Stop any existing loop first (worker tick and the fallback timer) so
        // toggling — or re-running on access-mode changes — never leaves us
        // double-ticking.
        if (worker) worker.postMessage({ cmd: "stop" });
        if (state.autoRefreshTimer) {
          clearInterval(state.autoRefreshTimer);
          state.autoRefreshTimer = null;
        }
        if (!$("autoRefresh").checked) return;
        if (worker) {
          worker.postMessage({
            cmd: "start",
            interval: AUTO_REFRESH_INTERVAL_MS,
          });
        } else {
          // Fallback for environments without Web Worker support. Still
          // subject to background-tab throttling, but better than no
          // auto-refresh at all.
          state.autoRefreshTimer = setInterval(
            autoRefreshTick,
            AUTO_REFRESH_INTERVAL_MS,
          );
        }
      }

      // ============================================================
      // Operator vs. read-only LAN viewer
      // ============================================================
      // Only an unlocked admin client gets the Refresh / Sync controls and
      // the ability to force Buildkite refreshes. Everyone else gets a
      // read-only view that still auto-updates through GET /api/rigs; the
      // Worker refreshes stale snapshots itself. The server is the source of
      // truth for whether this client is an operator, and we fall back to a
      // hostname check if that probe can't be reached.
      function looksLikeLocalhost() {
        const h = (window.location.hostname || "").toLowerCase();
        return (
          h === "" ||
          h === "localhost" ||
          h === "127.0.0.1" ||
          h === "::1" ||
          h === "[::1]"
        );
      }

      function applyAccessMode() {
        const operator = state.isOperator;
        // These controls carry the `flex` utility (which also sets
        // `display`), so toggle the inline style rather than a `hidden`
        // class to avoid a display tug-of-war. "" reverts to the stylesheet.
        for (const id of ["refreshBtn", "backfillBtn", "autoRefreshLabel"]) {
          const el = $(id);
          if (el) el.style.display = operator ? "" : "none";
        }
        updateAdminButton();
        if (!operator) {
          // Read-only viewers keep polling so deploys show up in real time;
          // the toggle is hidden, so pin it on and (re)start the loop.
          const auto = $("autoRefresh");
          if (auto) auto.checked = true;
          setupAutoRefresh();
        }
      }

      async function initAccessMode() {
        // Optimistically reveal controls when the URL is localhost so the
        // operator never sees a flash of the read-only header; the probe
        // below confirms (and, for a LAN URL, leaves them hidden).
        state.isOperator = looksLikeLocalhost();
        applyAccessMode();
        try {
          const resp = await dashboardFetch(apiPath("/api/client-context"));
          if (resp.ok) {
            const ctx = await resp.json();
            state.isOperator = !!ctx.is_operator;
          }
        } catch (err) {
          // Network blip: keep the hostname-based guess from above.
        }
        applyAccessMode();
      }

      function updateAdminButton() {
        const btn = $("adminBtn");
        if (!btn) return;
        if (state.isOperator) {
          btn.textContent = "Lock controls";
          btn.title =
            "Forget the saved dashboard admin token and return to read-only mode.";
        } else {
          btn.textContent = adminToken ? "Unlock failed" : "Unlock controls";
          btn.title =
            "Enter the Cloudflare dashboard admin token to enable Refresh and Sync history from this browser.";
        }
      }

      async function unlockAdminControls() {
        if (state.isOperator && adminToken) {
          setAdminToken("");
          state.isOperator = false;
          applyAccessMode();
          return;
        }

        const token = window.prompt("Enter dashboard admin token");
        if (!token) return;
        setAdminToken(token);
        await initAccessMode();
        if (!state.isOperator) {
          setAdminToken("");
          applyAccessMode();
          window.alert("Admin token was not accepted.");
        }
      }

      // ============================================================
      // Pipeline source toggle
      // ============================================================
      // The dashboard can front several Buildkite pipelines (e.g.
      // Deployments + AAOS Flashing). /api/sources lists them; the header
      // renders one tab per source and ``state.source`` is threaded through
      // every API call via withSource(). Build numbers and rig sets differ
      // per pipeline, so switching resets the per-source view state.

      function renderSourceToggle() {
        const wrap = $("sourceToggle");
        if (!wrap) return;
        const sources = state.sources || [];
        // With a single (or no) source there's nothing to toggle, so leave
        // the row empty — the page looks exactly like the old single-pipeline
        // dashboard.
        if (sources.length <= 1) {
          wrap.innerHTML = "";
          return;
        }
        wrap.innerHTML = sources
          .map((s) => {
            const active = s.key === state.source;
            return `<button type="button" role="tab" aria-selected="${active}" data-source-tab="${escapeHtml(
              s.key,
            )}" class="source-tab${active ? " active" : ""}">${escapeHtml(
              s.label,
            )}</button>`;
          })
          .join(`<span class="source-tab-sep" aria-hidden="true">/</span>`);
        wrap.querySelectorAll("button[data-source-tab]").forEach((btn) => {
          btn.addEventListener("click", () =>
            switchSource(btn.getAttribute("data-source-tab")),
          );
        });
      }

      async function loadSources() {
        try {
          const resp = await dashboardFetch(apiPath("/api/sources"));
          if (resp.ok) {
            const data = await resp.json();
            state.sources = Array.isArray(data.sources) ? data.sources : [];
          }
        } catch (err) {
          // Non-fatal: no toggle, and withSource() stays a no-op so the
          // server serves its primary pipeline.
          state.sources = [];
        }
        // Pick the active source: a valid ?source= in the URL wins (so links
        // are shareable), otherwise the server-declared default / first.
        const keys = (state.sources || []).map((s) => s.key);
        const urlSource = new URL(window.location).searchParams.get("source");
        if (urlSource && keys.includes(urlSource)) {
          state.source = urlSource;
        } else if (state.sources.length) {
          const def = state.sources.find((s) => s.is_default);
          state.source = def ? def.key : state.sources[0].key;
        } else {
          state.source = null;
        }
        renderSourceToggle();
        applyRefColumnLabel();
      }

      function switchSource(key) {
        if (!key || key === state.source) return;
        if (!(state.sources || []).some((s) => s.key === key)) return;
        state.source = key;
        // Build numbers and rig sets are per-pipeline, so wipe everything
        // tied to the old source before loading the new one.
        state.snapshot = null;
        state.expanded.clear();
        state.expandedBuilds.clear();
        state.buildAttempts = {};
        state.history = null;
        const input = $("historyRigInput");
        if (input) input.value = "";
        $("historyClearBtn").classList.add("hidden");
        // Drop any rate-limit countdown carried over from the old source.
        state.rateLimitedUntil = null;
        if (state.rateLimitRetryTimer) {
          clearTimeout(state.rateLimitRetryTimer);
          state.rateLimitRetryTimer = null;
        }
        renderRateLimitBanner();
        // Reflect the choice in the URL (omit it for the default source so
        // the common case stays a clean URL), and clear the per-source rig.
        const isDefault = state.sources[0] && state.sources[0].key === key;
        const url = new URL(window.location);
        if (isDefault) {
          url.searchParams.delete("source");
        } else {
          url.searchParams.set("source", key);
        }
        url.searchParams.delete("rig");
        window.history.replaceState({}, "", url);
        renderSourceToggle();
        applyRefColumnLabel();
        // Show an immediate loading state, then pull the new source's data.
        $("tableBody").innerHTML = `
          <tr>
            <td colspan="8" class="px-4 text-center">Loading...</td>
          </tr>`;
        renderHistoryPanel();
        state.fetchedAtMs = null;
        updateLastUpdatedLabel();
        loadStoreStats();
        fetchSnapshot(false);
      }

      $("refreshBtn").addEventListener("click", () => {
        if (state.isOperator) fetchSnapshot(true);
      });
      $("adminBtn").addEventListener("click", unlockAdminControls);
      $("backfillBtn").addEventListener("click", runBackfill);
      $("autoRefresh").addEventListener("change", setupAutoRefresh);
      $("search").addEventListener("input", (e) => {
        state.filter = e.target.value;
        renderTable();
        // The standalone history panel isn't filtered by the search box, but
        // it should still highlight matches of the current term. Re-render it
        // so highlights track the search bar live as the user types. No-op
        // when the panel is closed (renderHistoryPanel bails on empty state).
        renderHistoryPanel();
      });

      $("historyForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const rig = $("historyRigInput").value;
        loadHistory(rig);
      });
      $("historyClearBtn").addEventListener("click", clearHistory);

      renderHistoryPanel();
      // Resolve operator vs. read-only first so the right controls are
      // shown (or hidden) before the data loads in.
      initAccessMode();
      // Known rigs (autocomplete) are pipeline-independent, so kick that off
      // immediately. The source list must resolve first, though, so the
      // snapshot + footer fetches carry the right ?source=.
      loadKnownRigs();
      loadSources().then(() => {
        loadStoreStats();
        fetchSnapshot(false).then(loadHistoryFromUrl);
      });
      setupAutoRefresh();

      if (typeof ResizeObserver !== "undefined") {
        const rw = document.getElementById("rigsTableWrap");
        if (rw) {
          const ro = new ResizeObserver(() =>
            scheduleSyncDeployColumnWidths(),
          );
          ro.observe(rw);
        }
      }

      // Tick the "updated X ago" label every second so it stays live without
      // waiting for the next refresh.
      setInterval(() => {
        updateLastUpdatedLabel();
        // Tick the rate-limit countdown (no-op when not rate-limited).
        if (state.rateLimitedUntil) {
          if (state.rateLimitedUntil * 1000 <= Date.now()) {
            // Reset time passed; let the scheduled retry clear state when
            // it runs. Just show "retrying now" until then.
            renderRateLimitBanner();
          } else {
            renderRateLimitBanner();
          }
        }
      }, 1000);

      // ============================================================
      // Custom tooltip system
      // ============================================================
      // Replaces the native browser tooltip with a small floating element
      // that appears after a fixed 100ms hover. Uses event delegation on
      // `document` so it picks up dynamically-rendered content (the rig
      // table and history panel re-render on every snapshot fetch) without
      // re-attaching listeners.
      //
      // Hijacks any element with a `title` attribute: on enter, the title
      // is stashed and removed (so the native tooltip doesn't fire), and an
      // `aria-label` is set so screen readers still see the text. On leave,
      // the original title is restored.
      const TOOLTIP_DELAY_MS = 100;
      const tt = {
        el: null,
        showTimer: null,
        currentTarget: null,
        originalTitle: null,
        hadAriaLabel: false,
      };

      function ensureTooltipEl() {
        if (tt.el) return tt.el;
        const el = document.createElement("div");
        el.className = "app-tooltip";
        el.setAttribute("role", "tooltip");
        document.body.appendChild(el);
        tt.el = el;
        return el;
      }

      function findTooltipTarget(start) {
        let node = start;
        while (node && node.nodeType === 1 && node !== document.documentElement) {
          if (node.getAttribute && node.getAttribute("title")) {
            return { el: node, text: node.getAttribute("title") };
          }
          node = node.parentNode;
        }
        return null;
      }

      function positionTooltip(target) {
        const el = ensureTooltipEl();
        // Reset position so getBoundingClientRect measures the natural size.
        el.style.left = "0px";
        el.style.top = "0px";
        const r = target.getBoundingClientRect();
        const tip = el.getBoundingClientRect();
        const margin = 6;
        let top = r.top - tip.height - margin;
        if (top < 4) top = r.bottom + margin; // flip below if no room above
        let left = r.left + (r.width - tip.width) / 2;
        if (left < 4) left = 4;
        if (left + tip.width > window.innerWidth - 4) {
          left = window.innerWidth - 4 - tip.width;
        }
        el.style.left = `${left}px`;
        el.style.top = `${top}px`;
      }

      function showTooltipFor(target, text) {
        const el = ensureTooltipEl();
        el.textContent = text;
        positionTooltip(target);
        el.classList.add("visible");
      }

      function hideTooltip() {
        if (tt.el) tt.el.classList.remove("visible");
      }

      function clearShowTimer() {
        if (tt.showTimer) {
          clearTimeout(tt.showTimer);
          tt.showTimer = null;
        }
      }

      function restoreTitle() {
        const t = tt.currentTarget;
        if (t && tt.originalTitle != null) {
          t.setAttribute("title", tt.originalTitle);
          if (!tt.hadAriaLabel) t.removeAttribute("aria-label");
        }
        tt.currentTarget = null;
        tt.originalTitle = null;
        tt.hadAriaLabel = false;
      }

      function engageTarget(found) {
        tt.currentTarget = found.el;
        tt.originalTitle = found.el.getAttribute("title");
        tt.hadAriaLabel = found.el.hasAttribute("aria-label");
        // Remove `title` so the native tooltip never fires.
        found.el.removeAttribute("title");
        if (!tt.hadAriaLabel) {
          found.el.setAttribute("aria-label", found.text);
        }
        clearShowTimer();
        tt.showTimer = setTimeout(() => {
          // Element may have been removed from the DOM by a re-render.
          if (!document.contains(found.el)) {
            restoreTitle();
            return;
          }
          showTooltipFor(found.el, found.text);
        }, TOOLTIP_DELAY_MS);
      }

      function disengageTarget() {
        clearShowTimer();
        hideTooltip();
        restoreTitle();
      }

      document.addEventListener("mouseover", (event) => {
        const found = findTooltipTarget(event.target);
        if (!found || found.el === tt.currentTarget) return;
        if (tt.currentTarget) disengageTarget();
        engageTarget(found);
      });

      document.addEventListener("mouseout", (event) => {
        if (!tt.currentTarget) return;
        // mouseout fires for child→parent transitions inside the target;
        // only disengage when the cursor actually leaves the subtree.
        const related = event.relatedTarget;
        if (related && tt.currentTarget.contains(related)) return;
        disengageTarget();
      });

      // Keyboard accessibility: also show tooltips when an element is
      // focused via Tab.
      document.addEventListener("focusin", (event) => {
        const found = findTooltipTarget(event.target);
        if (!found || found.el === tt.currentTarget) return;
        if (tt.currentTarget) disengageTarget();
        engageTarget(found);
      });
      document.addEventListener("focusout", () => {
        if (tt.currentTarget) disengageTarget();
      });

      // Hide on scroll/resize so the tooltip doesn't drift away from its
      // anchor. Capture phase + passive so we catch scrolls in nested
      // containers (e.g. the table wrapper) without blocking them.
      window.addEventListener(
        "scroll",
        () => {
          if (tt.currentTarget) disengageTarget();
        },
        { passive: true, capture: true },
      );
      window.addEventListener("resize", () => {
        if (tt.currentTarget) disengageTarget();
      });
    </script>
  </body>
</html>
