<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>githubdashboard</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background: #1d1d1d;
        color: #eee;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        margin: 0;
      }

      main {
        margin: 0 auto;
        max-width: 1180px;
        padding: 28px 20px 48px;
      }

      a {
        color: inherit;
      }

      .back-link {
        color: #aaa;
        display: inline-block;
        font-size: 13px;
        margin-bottom: 32px;
        text-decoration: none;
      }

      .back-link:hover,
      .back-link:focus {
        color: #eee;
      }

      .topbar {
        align-items: center;
        border-bottom: 1px solid #333;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        margin-bottom: 24px;
        padding-bottom: 16px;
      }

      .title {
        min-width: 0;
      }

      h1 {
        font-size: 24px;
        line-height: 1.1;
        margin: 0 0 6px;
      }

      p {
        color: #c8c8c8;
        line-height: 1.55;
        margin: 0 0 20px;
      }

      .subtitle {
        color: #aaa;
        font-size: 13px;
        margin: 0;
      }

      .actions {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .panel {
        border: 1px solid #444;
        padding: 20px;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .stats {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .columns {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-top: 14px;
      }

      .stat {
        border: 1px solid #444;
        padding: 14px;
      }

      .stat-label {
        color: #aaa;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .stat-value {
        font-size: 24px;
        font-weight: 800;
      }

      .panel h2 {
        font-size: 15px;
        margin: 0 0 14px;
      }

      .button,
      button {
        background: transparent;
        border: 1px solid #777;
        color: #eee;
        cursor: pointer;
        display: inline-block;
        font-size: 13px;
        font-weight: 700;
        padding: 12px 14px;
        text-decoration: none;
      }

      .button:hover,
      .button:focus,
      button:hover,
      button:focus {
        background: #242424;
        border-color: #aaa;
      }

      button:disabled {
        color: #777;
        cursor: not-allowed;
      }

      input {
        background: #111;
        border: 1px solid #555;
        color: #eee;
        font: inherit;
        padding: 12px 14px;
        width: 100%;
      }

      .search {
        margin: 16px 0 14px;
      }

      .status {
        color: #aaa;
        font-size: 12px;
        margin: 8px 0 0;
      }

      .error {
        border-color: #7c2d2d;
        color: #ff8b8b;
      }

      .rows {
        display: grid;
        gap: 8px;
      }

      .row {
        border-top: 1px solid #333;
        display: block;
        padding: 10px 0 0;
        text-decoration: none;
      }

      .row:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .row-title {
        align-items: baseline;
        display: flex;
        gap: 8px;
        min-width: 0;
      }

      .row-main {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mono {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .muted {
        color: #999;
        font-size: 12px;
      }

      .badge {
        border: 1px solid #555;
        color: #ccc;
        font-size: 10px;
        font-weight: 800;
        padding: 2px 5px;
        text-transform: uppercase;
      }

      .badge.open {
        border-color: #256a3f;
        color: #64d987;
      }

      .badge.merged {
        border-color: #6d45b7;
        color: #b695ff;
      }

      .search-results {
        display: none;
        margin-bottom: 14px;
      }

      code,
      pre {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      code {
        color: #f0f0f0;
      }

      pre {
        background: #111;
        border: 1px solid #333;
        color: #f0f0f0;
        line-height: 1.5;
        margin: 14px 0 0;
        overflow-x: auto;
        padding: 14px;
      }

      @media (max-width: 960px) {
        .stats,
        .columns {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .topbar {
          align-items: flex-start;
          display: grid;
        }

        .actions {
          justify-content: flex-start;
        }

        .stats,
        .columns {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <a class="back-link" href="../">Back to apps</a>

      <section class="topbar">
        <div class="title">
          <h1>githubdashboard</h1>
          <p id="subtitle" class="subtitle">Loading GitHub dashboard...</p>
        </div>
        <div class="actions">
          <a id="repo-link" class="button" href="https://github.com/AppliedNeuron/core-stack">Open repo</a>
          <button id="admin-button" type="button">Unlock sync</button>
          <button id="sync-button" type="button">Sync now</button>
        </div>
      </section>

      <section id="message" class="panel status" aria-live="polite"></section>

      <section class="search">
        <label class="muted" for="search-input">Search branches, tags, commits, and PRs</label>
        <input id="search-input" autocomplete="off" placeholder="branch name, #1234, SHA, author, PR title">
      </section>

      <section id="search-results" class="panel search-results">
        <h2>Search results</h2>
        <div id="search-rows" class="rows"></div>
      </section>

      <section id="stats" class="grid stats" aria-label="Repository stats"></section>

      <section class="grid columns" aria-label="Recent dashboard data">
        <div class="panel">
          <h2>Branches</h2>
          <div id="branches" class="rows"></div>
        </div>
        <div class="panel">
          <h2>Tags</h2>
          <div id="tags" class="rows"></div>
        </div>
        <div class="panel">
          <h2>Commits</h2>
          <div id="commits" class="rows"></div>
        </div>
        <div class="panel">
          <h2>Pull requests</h2>
          <div id="prs" class="rows"></div>
        </div>
      </section>
    </main>

    <script src="./config.js"></script>
    <script>
      const config = window.githubDashboardConfig || {};
      const apiBaseUrl = (config.apiBaseUrl || "").replace(/\/+$/, "");
      const adminStorageKey = "githubdashboard.adminToken";

      const els = {
        subtitle: document.querySelector("#subtitle"),
        repoLink: document.querySelector("#repo-link"),
        adminButton: document.querySelector("#admin-button"),
        syncButton: document.querySelector("#sync-button"),
        message: document.querySelector("#message"),
        searchInput: document.querySelector("#search-input"),
        searchResults: document.querySelector("#search-results"),
        searchRows: document.querySelector("#search-rows"),
        stats: document.querySelector("#stats"),
        branches: document.querySelector("#branches"),
        tags: document.querySelector("#tags"),
        commits: document.querySelector("#commits"),
        prs: document.querySelector("#prs"),
      };

      let summary = null;
      let syncStatus = null;
      let searchTimer = 0;

      els.adminButton.addEventListener("click", unlockSync);
      els.syncButton.addEventListener("click", syncNow);
      els.searchInput.addEventListener("input", () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(runSearch, 250);
      });

      if (!apiBaseUrl) {
        showMessage("Configure window.githubDashboardConfig.apiBaseUrl in config.js.", true);
        els.syncButton.disabled = true;
      } else {
        refresh();
        setInterval(refresh, 30000);
      }

      async function refresh() {
        try {
          const [nextSummary, nextStatus] = await Promise.all([
            apiJson("/api/summary"),
            apiJson("/api/sync/status"),
          ]);
          summary = nextSummary;
          syncStatus = nextStatus;
          render();
        } catch (error) {
          showMessage(`Failed to load dashboard: ${error.message}`, true);
        }
      }

      async function runSearch() {
        const q = els.searchInput.value.trim();
        if (!q) {
          els.searchResults.style.display = "none";
          els.searchRows.innerHTML = "";
          return;
        }
        try {
          const results = await apiJson(`/api/search?q=${encodeURIComponent(q)}&limit=8`);
          renderSearch(results);
        } catch (error) {
          els.searchResults.style.display = "block";
          els.searchRows.innerHTML = emptyRow(`Search failed: ${escapeHtml(error.message)}`);
        }
      }

      async function syncNow() {
        const adminToken = localStorage.getItem(adminStorageKey) || "";
        if (!adminToken) {
          unlockSync();
          return;
        }

        els.syncButton.disabled = true;
        showMessage("Starting sync...");
        try {
          syncStatus = await apiJson("/api/sync", {
            method: "POST",
            headers: { "X-Dashboard-Admin-Token": adminToken },
          });
          renderStatus();
          setTimeout(refresh, 1500);
        } catch (error) {
          showMessage(`Sync failed to start: ${error.message}`, true);
        } finally {
          els.syncButton.disabled = false;
        }
      }

      function unlockSync() {
        const current = localStorage.getItem(adminStorageKey) || "";
        const value = window.prompt("Worker ADMIN_TOKEN for manual sync:", current);
        if (value === null) return;
        if (value.trim()) {
          localStorage.setItem(adminStorageKey, value.trim());
          showMessage("Manual sync unlocked in this browser.");
        } else {
          localStorage.removeItem(adminStorageKey);
          showMessage("Manual sync token removed.");
        }
      }

      function render() {
        if (!summary) return;
        els.subtitle.textContent = `${summary.repo} · ${syncLine()}`;
        els.repoLink.href = summary.repoUrl;
        renderStatus();
        renderStats();
        renderRows(els.branches, summary.recentBranches, renderBranch);
        renderRows(els.tags, summary.recentTags, renderTag);
        renderRows(els.commits, summary.recentCommits, renderCommit);
        renderRows(els.prs, summary.recentPrs, renderPr);
      }

      function renderStatus() {
        if (!syncStatus) return;
        const pieces = [syncStatus.message || "Ready"];
        if (syncStatus.lastSyncAt) pieces.push(`last sync ${relativeTime(syncStatus.lastSyncAt)}`);
        if (syncStatus.error) pieces.push(syncStatus.error);
        showMessage(pieces.join(" · "), syncStatus.status === "error");
      }

      function renderStats() {
        els.stats.innerHTML = [
          stat("branches", summary.liveBranchCount),
          stat("tags", summary.liveTagCount),
          stat("commits", summary.commitCount),
          stat("open PRs", summary.prCount.open),
          stat("merged PRs", summary.prCount.merged),
        ].join("");
      }

      function renderSearch(results) {
        const rows = [
          ...results.branches.map(renderBranch),
          ...results.tags.map(renderTag),
          ...results.commits.map(renderCommit),
          ...results.prs.map(renderPr),
        ];
        els.searchResults.style.display = "block";
        els.searchRows.innerHTML = rows.length ? rows.join("") : emptyRow("No matches.");
      }

      function renderRows(container, rows, renderer) {
        container.innerHTML = rows && rows.length ? rows.map(renderer).join("") : emptyRow("No data yet. Run a sync.");
      }

      function renderBranch(branch) {
        return linkedRow(
          branch.url || `${summary.repoUrl}/tree/${encodeURIComponent(branch.name)}`,
          `<span class="badge">branch</span><span class="row-main mono">${escapeHtml(branch.name)}</span>`,
          `HEAD ${escapeHtml(branch.shortHeadSha || "")}${branch.isDefault ? " · default" : ""}`
        );
      }

      function renderTag(tag) {
        return linkedRow(
          tag.url || `${summary.repoUrl}/releases/tag/${encodeURIComponent(tag.name)}`,
          `<span class="badge">tag</span><span class="row-main mono">${escapeHtml(tag.name)}</span>`,
          `target ${escapeHtml(tag.shortTargetSha || "")}`
        );
      }

      function renderCommit(commit) {
        return linkedRow(
          commit.url || `${summary.repoUrl}/commit/${encodeURIComponent(commit.sha)}`,
          `<span class="badge">commit</span><span class="row-main">${escapeHtml(commit.summary || commit.shortSha)}</span>`,
          `${escapeHtml(commit.shortSha || "")} · ${escapeHtml(commit.authorName || "unknown")} · ${relativeTime(commit.committedAt)}`
        );
      }

      function renderPr(pr) {
        const state = pr.draft ? "draft" : pr.state || "pr";
        return linkedRow(
          pr.url || `${summary.repoUrl}/pull/${encodeURIComponent(pr.number)}`,
          `<span class="badge ${escapeHtml(state)}">${escapeHtml(state)}</span><span class="row-main">#${pr.number} ${escapeHtml(pr.title || "")}</span>`,
          `${escapeHtml(pr.author || "unknown")} · ${relativeTime(pr.mergedAt || pr.closedAt || pr.createdAt)}`
        );
      }

      function linkedRow(href, title, meta) {
        return `<a class="row" href="${escapeAttribute(href)}" target="_blank" rel="noreferrer">
          <span class="row-title">${title}</span>
          <span class="muted">${escapeHtml(meta || "")}</span>
        </a>`;
      }

      function stat(label, value) {
        return `<div class="stat">
          <div class="stat-label">${escapeHtml(label)}</div>
          <div class="stat-value">${Number(value || 0).toLocaleString()}</div>
        </div>`;
      }

      function emptyRow(text) {
        return `<div class="muted">${text}</div>`;
      }

      function showMessage(text, isError = false) {
        els.message.textContent = text;
        els.message.classList.toggle("error", isError);
      }

      function syncLine() {
        if (!syncStatus) return "sync status unknown";
        if (syncStatus.status === "running") return syncStatus.message || "sync running";
        if (syncStatus.lastSyncAt) return `synced ${relativeTime(syncStatus.lastSyncAt)}`;
        return "not synced yet";
      }

      async function apiJson(path, init = {}) {
        const res = await fetch(`${apiBaseUrl}${path}`, {
          cache: "no-store",
          ...init,
          headers: {
            ...(init.headers || {}),
          },
        });
        const text = await res.text();
        const data = text ? JSON.parse(text) : null;
        if (!res.ok) {
          throw new Error(data?.error || `${res.status} ${res.statusText}`);
        }
        return data;
      }

      function relativeTime(unix) {
        if (!unix) return "unknown";
        const diff = Math.floor(Date.now() / 1000) - unix;
        const abs = Math.abs(diff);
        const units = [
          ["year", 31536000],
          ["month", 2592000],
          ["day", 86400],
          ["hour", 3600],
          ["minute", 60],
        ];
        for (const [name, seconds] of units) {
          if (abs >= seconds) {
            const value = Math.round(diff / seconds);
            return new Intl.RelativeTimeFormat(undefined, { numeric: "auto" }).format(-value, name);
          }
        }
        return "just now";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function escapeAttribute(value) {
        return escapeHtml(value).replace(/'/g, "&#39;");
      }
    </script>
  </body>
</html>
