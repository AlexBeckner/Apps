<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apps</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background: #111;
        color: #eee;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        margin: 0;
      }

      main {
        margin: 0 auto;
        max-width: 900px;
        padding: 32px 20px;
      }

      h1 {
        margin: 0 0 8px;
      }

      p {
        color: #aaa;
        margin: 0 0 24px;
      }

      .app-card {
        border: 1px solid #333;
        color: inherit;
        display: block;
        padding: 16px;
        text-decoration: none;
      }

      .app-card:hover,
      .app-card:focus {
        border-color: #666;
      }

      .app-card h2 {
        font-size: 18px;
        margin: 0 0 8px;
      }

      .app-card p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Apps</h1>
      <p>Small web tools used with AppliedNeuron/core-stack.</p>

      <a class="app-card" href="./dataspeedhashfinder/">
        <h2>dataspeedhashfinder</h2>
        <p>Compare Ford GE1 Dataspeed parameter hashes across branches.</p>
      </a>

      <a class="app-card" href="./buildkitedeploymentdashboard/">
        <h2>buildkitedeploymentdashboard</h2>
        <p>Open the Buildkite-backed dashboard for current rig deployments.</p>
      </a>
    </main>
  </body>
</html>
