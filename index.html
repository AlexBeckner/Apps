<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apps</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background: #1d1d1d;
        color: #eee;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        margin: 0;
      }

      main {
        margin: 0 auto;
        max-width: 560px;
        padding: 88px 20px;
      }

      .apps {
        border: 1px solid #444;
      }

      .app-link {
        color: inherit;
        display: block;
        font-size: 13px;
        font-weight: 700;
        padding: 16px;
        text-decoration: none;
      }

      .app-link + .app-link {
        border-top: 1px solid #444;
      }

      .app-link:hover,
      .app-link:focus {
        border-color: #666;
        background: #242424;
      }
    </style>
  </head>
  <body>
    <main>
      <nav class="apps" aria-label="Apps">
        <a class="app-link" href="./dataspeedhashfinder/">dataspeedhashfinder</a>
        <a class="app-link" href="./buildkitedeploymentdashboard/">buildkitedeploymentdashboard</a>
      </nav>
    </main>
  </body>
</html>
