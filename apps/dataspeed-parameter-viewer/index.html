<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dataspeed Parameter Hash Viewer</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background: #111;
        color: #eee;
        margin: 8px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        font-size: 14px;
      }

      main {
        max-width: 900px;
      }

      .search-grid,
      .hash-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 48px minmax(0, 1fr);
        gap: 8px;
      }

      .branch-column {
        padding: 0;
      }

      p {
        margin: 0;
      }

      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 600;
      }

      .sr-only {
        height: 1px;
        left: -10000px;
        overflow: hidden;
        position: absolute;
        top: auto;
        width: 1px;
      }

      input {
        background: #111;
        border: 1px solid #666;
        color: #eee;
        width: 100%;
        font: inherit;
        padding: 4px 6px;
      }

      input::placeholder {
        color: #888;
      }

      .rows {
        display: grid;
        gap: 8px;
        margin-top: 8px;
      }

      .module-name {
        grid-column: 1 / -1;
        font-weight: 700;
      }

      .hash-cell {
        min-height: 64px;
        padding: 4px 0;
      }

      .match-cell {
        align-items: center;
        display: flex;
        font-size: 28px;
        font-weight: 700;
        justify-content: center;
        min-height: 64px;
      }

      .match {
        color: #25d366;
      }

      .mismatch {
        color: #ff4d4d;
      }

      .hash {
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 20px;
        font-weight: 700;
      }

      .hash-line {
        align-items: center;
        display: flex;
        gap: 8px;
      }

      .placeholder,
      .error {
        color: #aaa;
        overflow-wrap: anywhere;
      }

      .error {
        color: #ff4d4d;
      }

      button {
        background: #2a2a2a;
        border: 1px solid #666;
        color: #eee;
        cursor: pointer;
        font: inherit;
        padding: 4px 8px;
      }

      .download-button {
        align-items: center;
        display: inline-flex;
        height: 28px;
        justify-content: center;
        padding: 0;
        width: 28px;
      }

      .download-button svg {
        height: 16px;
        width: 16px;
      }

      .token-section {
        margin-top: 8px;
        padding: 0;
      }

      @media (max-width: 700px) {
        .search-grid,
        .hash-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="search-grid" aria-label="Branch inputs">
        <div class="branch-column">
          <label class="sr-only" for="left-ref">Left branch</label>
          <input
            id="left-ref"
            autocomplete="off"
            list="branch-suggestions"
            placeholder="master"
            value="master"
          >
        </div>
        <div></div>
        <div class="branch-column">
          <label class="sr-only" for="right-ref">Right branch</label>
          <input
            id="right-ref"
            autocomplete="off"
            list="branch-suggestions"
            placeholder="branch, tag, or commit SHA"
          >
        </div>
      </section>

      <section id="rows" class="rows" aria-label="Dataspeed module hashes"></section>

      <section class="token-section" aria-label="GitHub token">
        <label for="github-token">GitHub token</label>
        <input
          id="github-token"
          type="password"
          autocomplete="off"
          placeholder="Paste token for private repo access"
        >
      </section>

      <datalist id="branch-suggestions"></datalist>
    </main>

    <script>
      const owner = "AppliedNeuron";
      const repo = "core-stack";
      const parameterDirectory =
        "onroad/controls/dbw/dataspeed_v2/parameters";
      const files = [
        { module: "Gateway", fileName: "FORD_GE1 Gateway.json" },
        { module: "Shift", fileName: "FORD_GE1 Shift.json" },
        { module: "Throttle", fileName: "FORD_GE1 Throttle.json" },
      ];

      const columns = {
        left: {
          input: document.querySelector("#left-ref"),
          files: new Map(),
          errors: new Map(),
          requestId: 0,
        },
        right: {
          input: document.querySelector("#right-ref"),
          files: new Map(),
          errors: new Map(),
          requestId: 0,
        },
      };

      const rowsEl = document.querySelector("#rows");
      const tokenInput = document.querySelector("#github-token");
      const branchSuggestions = document.querySelector("#branch-suggestions");
      const decoder = new TextDecoder("utf-8");
      const githubTokenStorageKey = "dataspeedParameterViewer.githubToken";

      let githubToken = loadSavedGithubToken();
      tokenInput.value = githubToken;
      let branchSuggestionRequestId = 0;

      renderRows();

      function loadSavedGithubToken() {
        try {
          return window.localStorage.getItem(githubTokenStorageKey) || "";
        } catch {
          return "";
        }
      }

      function saveGithubToken(token) {
        try {
          if (token) {
            window.localStorage.setItem(githubTokenStorageKey, token);
          } else {
            window.localStorage.removeItem(githubTokenStorageKey);
          }
        } catch {
          // Some browser settings disable localStorage; the in-memory token still works.
        }
      }

      function normalizeRef(input) {
        const trimmed = input.trim();
        const treeMarker = "/tree/";
        const treeIndex = trimmed.indexOf(treeMarker);

        if (treeIndex !== -1) {
          const treeRef = trimmed.slice(treeIndex + treeMarker.length);
          return decodeURIComponent(treeRef.split(/[?#]/)[0]);
        }

        return trimmed.replace(/^origin\//, "");
      }

      function encodedPath(path) {
        return path.split("/").map(encodeURIComponent).join("/");
      }

      function contentsApiUrl(ref, fileName) {
        const path = `${parameterDirectory}/${fileName}`;
        return `https://api.github.com/repos/${owner}/${repo}/contents/${encodedPath(
          path
        )}?ref=${encodeURIComponent(ref)}`;
      }

      function matchingRefsApiUrl(prefix) {
        const encodedPrefix = prefix.split("/").map(encodeURIComponent).join("/");
        return `https://api.github.com/repos/${owner}/${repo}/git/matching-refs/heads/${encodedPrefix}`;
      }

      function githubHeaders(accept) {
        const headers = {
          Accept: accept,
          "X-GitHub-Api-Version": "2022-11-28",
        };

        if (githubToken) {
          headers.Authorization = `Bearer ${githubToken}`;
        }

        return headers;
      }

      function decodeBase64Content(content) {
        const binary = atob(content.replace(/\s/g, ""));
        const bytes = Uint8Array.from(binary, (character) =>
          character.charCodeAt(0)
        );
        return decoder.decode(bytes);
      }

      function downloadText(fileName, text) {
        const blob = new Blob([text], {
          type: "application/json;charset=utf-8",
        });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function downloadFileName(parameterFile) {
        return parameterFile.fileName.replace(
          /\.json$/i,
          ` ${parameterFile.hash}.json`
        );
      }

      async function fetchParameterFile(ref, file) {
        const response = await fetch(contentsApiUrl(ref, file.fileName), {
          headers: githubHeaders("application/vnd.github.object+json"),
        });

        if (!response.ok) {
          const errorText = await response.text();
          let githubMessage = errorText;
          try {
            githubMessage = JSON.parse(errorText).message || errorText;
          } catch {
            // GitHub usually returns JSON errors, but keep the raw body if not.
          }
          const error = new Error(
            `${response.status} ${response.statusText}: ${githubMessage}`
          );
          error.status = response.status;
          throw error;
        }

        const metadata = await response.json();
        if (metadata.type !== "file" || metadata.encoding !== "base64") {
          throw new Error(`${file.fileName} was not returned as a JSON file.`);
        }

        const text = decodeBase64Content(metadata.content);
        const json = JSON.parse(text);
        if (typeof json.hash !== "string" && typeof json.hash !== "number") {
          throw new Error(`${file.fileName} does not contain a top-level hash.`);
        }

        return {
          module: file.module,
          fileName: metadata.name,
          hash: String(json.hash).toUpperCase(),
          text,
        };
      }

      function renderRows() {
        rowsEl.innerHTML = "";

        for (const file of files) {
          const row = document.createElement("div");
          row.className = "hash-row";

          const module = document.createElement("div");
          module.className = "module-name";
          module.textContent = file.module;

          row.append(
            module,
            renderCell(columns.left, file.module),
            renderMatchCell(file.module),
            renderCell(columns.right, file.module)
          );
          rowsEl.appendChild(row);
        }
      }

      function renderMatchCell(module) {
        const cell = document.createElement("div");
        cell.className = "match-cell";

        const leftFile = columns.left.files.get(module);
        const rightFile = columns.right.files.get(module);
        if (!leftFile || !rightFile) {
          return cell;
        }

        const marker = document.createElement("span");
        if (leftFile.hash === rightFile.hash) {
          marker.className = "match";
          marker.textContent = "=";
        } else {
          marker.className = "mismatch";
          marker.textContent = "X";
        }
        cell.appendChild(marker);

        return cell;
      }

      function renderCell(column, module) {
        const cell = document.createElement("article");
        cell.className = "hash-cell";
        const parameterFile = column.files.get(module);
        const error = column.errors.get(module);

        if (parameterFile) {
          const hashLine = document.createElement("div");
          hashLine.className = "hash-line";

          const hash = document.createElement("div");
          hash.className = "hash";
          hash.textContent = parameterFile.hash;

          const downloadButton = document.createElement("button");
          downloadButton.className = "download-button";
          downloadButton.type = "button";
          downloadButton.title = `Download ${parameterFile.fileName}`;
          downloadButton.setAttribute(
            "aria-label",
            `Download ${parameterFile.fileName}`
          );
          downloadButton.innerHTML =
            '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 4h2v9l3-3 1.4 1.4L12 16.8l-5.4-5.4L8 10l3 3V4z" fill="currentColor"></path><path d="M5 19h14v2H5v-2z" fill="currentColor"></path></svg>';
          downloadButton.addEventListener("click", () => {
            downloadText(downloadFileName(parameterFile), parameterFile.text);
          });

          hashLine.append(hash, downloadButton);
          cell.appendChild(hashLine);
        } else if (error) {
          const message = document.createElement("p");
          message.className = "error";
          message.textContent = error;
          cell.appendChild(message);
        } else {
          const placeholder = document.createElement("p");
          placeholder.className = "placeholder";
          placeholder.textContent = normalizeRef(column.input.value)
            ? "Loading..."
            : "Enter a branch";
          cell.appendChild(placeholder);
        }

        return cell;
      }

      async function fetchAllFiles(ref) {
        const results = await Promise.allSettled(
          files.map((file) => fetchParameterFile(ref, file))
        );

        return results.map((result, index) => ({
          file: files[index],
          result,
        }));
      }

      async function updateBranchSuggestions(input) {
        try {
          const requestId = branchSuggestionRequestId + 1;
          branchSuggestionRequestId = requestId;
          const prefix = normalizeRef(input.value);
          if (!prefix || prefix.length < 2) {
            branchSuggestions.innerHTML = "";
            return;
          }

          const response = await fetch(matchingRefsApiUrl(prefix), {
            headers: githubHeaders("application/vnd.github+json"),
          });
          if (!response.ok) {
            return;
          }

          const refs = await response.json();
          const branchRefs = refs
            .filter((ref) => ref.ref && ref.ref.startsWith("refs/heads/"))
            .slice(0, 50);
          const suggestions = await Promise.all(
            branchRefs.map(async (ref) => ({
              name: ref.ref.slice("refs/heads/".length),
              updatedAt: await fetchBranchUpdatedAt(ref),
            }))
          );
          if (requestId !== branchSuggestionRequestId) {
            return;
          }

          branchSuggestions.innerHTML = "";
          suggestions
            .sort(
              (left, right) =>
                right.updatedAt - left.updatedAt ||
                left.name.localeCompare(right.name)
            )
            .slice(0, 25)
            .forEach((suggestion) => {
              const option = document.createElement("option");
              option.value = suggestion.name;
              branchSuggestions.appendChild(option);
            });
        } catch {
          branchSuggestions.innerHTML = "";
        }
      }

      async function fetchBranchUpdatedAt(ref) {
        try {
          const response = await fetch(ref.object.url, {
            headers: githubHeaders("application/vnd.github+json"),
          });
          if (!response.ok) {
            return 0;
          }

          const commit = await response.json();
          return (
            Date.parse(commit.committer?.date || commit.author?.date || "") || 0
          );
        } catch {
          return 0;
        }
      }

      async function loadColumn(columnName) {
        const column = columns[columnName];
        const ref = normalizeRef(column.input.value);
        const requestId = column.requestId + 1;
        column.requestId = requestId;
        column.files.clear();
        column.errors.clear();

        if (!ref) {
          renderRows();
          return;
        }

        renderRows();

        const results = await fetchAllFiles(ref);
        if (requestId !== column.requestId) {
          return;
        }

        for (const { file, result } of results) {
          if (result.status === "fulfilled") {
            column.files.set(result.value.module, result.value);
          } else {
            column.errors.set(file.module, result.reason.message);
          }
        }

        renderRows();
      }

      function debounce(callback, waitMs) {
        let timeoutId;
        return () => {
          window.clearTimeout(timeoutId);
          timeoutId = window.setTimeout(callback, waitMs);
        };
      }

      columns.left.input.addEventListener(
        "input",
        debounce(() => {
          updateBranchSuggestions(columns.left.input);
          loadColumn("left");
        }, 400)
      );
      columns.right.input.addEventListener(
        "input",
        debounce(() => {
          updateBranchSuggestions(columns.right.input);
          loadColumn("right");
        }, 400)
      );
      tokenInput.addEventListener(
        "input",
        debounce(() => {
          githubToken = tokenInput.value.trim();
          saveGithubToken(githubToken);
          if (normalizeRef(columns.left.input.value)) {
            loadColumn("left");
          }
          if (normalizeRef(columns.right.input.value)) {
            loadColumn("right");
          }
        }, 400)
      );

      loadColumn("left");
    </script>
  </body>
</html>
