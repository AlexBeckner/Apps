<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="route.css">
    <title>Log Search</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background: #111;
        color: #eee;
        margin: 8px;
        /* Full-height flex column so the main area can grow to fill the page
           (used by the pre-search browse list, below). */
        display: flex;
        flex-direction: column;
        min-height: calc(100vh - 16px);
        min-height: calc(100dvh - 16px);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        font-size: 14px;
      }

      main {
        max-width: none;
        margin: 0;
        display: flex;
        flex: 1 1 auto;
        flex-direction: column;
        min-height: 0;
      }

      h1 {
        font-size: 18px;
        margin: 8px 0 2px;
      }

      p {
        margin: 0;
      }

      .muted {
        color: #aaa;
      }

      .error {
        color: #ff6b6b;
      }

      a {
        color: #7fb2ff;
      }

      .dropzone {
        border: 1px dashed #666;
        border-radius: 6px;
        cursor: pointer;
        display: block;
        margin-top: 12px;
        padding: 22px 16px;
        text-align: center;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      .dropzone:hover,
      .dropzone:focus-within {
        border-color: #888;
        background: #161616;
      }

      .dropzone-plus {
        color: #888;
        display: block;
        font-size: 40px;
        font-weight: 300;
        line-height: 1;
        /* The "+" glyph sits a hair below its line-box center; nudge it up. */
        transform: translateY(-0.06em);
      }

      /* Exactly one of the plus sign / info line shows at a time. */
      .dropzone.has-selection .dropzone-plus {
        display: none;
      }

      .dropzone:not(.has-selection) #selection {
        display: none;
      }

      .dropzone input[type="file"] {
        display: none;
      }

      /* Full-screen drop target: shown only while files are dragged over the
         page, so a folder/archive can be dropped anywhere, not just the box. */
      .drop-overlay {
        align-items: center;
        background: rgba(10, 16, 26, 0.82);
        display: none;
        inset: 0;
        justify-content: center;
        padding: 24px;
        position: fixed;
        z-index: 100;
      }

      .drop-overlay.active {
        display: flex;
      }

      .drop-overlay-inner {
        border: 2px dashed #7fb2ff;
        border-radius: 16px;
        color: #cfe0ff;
        font-size: 96px;
        font-weight: 300;
        line-height: 1;
        padding: 40px 64px;
        /* Let drag events fall through to a single target so the enter/leave
           counter that toggles the overlay never flickers on child edges. */
        pointer-events: none;
      }

      /* Nudge just the glyph up (not the dashed box) to optically center it. */
      .drop-overlay-plus {
        display: block;
        transform: translateY(-0.06em);
      }

      /* Top row: a "controls" box on the left and the file heatmap on the
         right, sitting side by side and stretched to the same height. The
         right cell is the sizing anchor (position: relative) and the heatmap
         fills it absolutely, so the heatmap always matches the left box's
         height and scrolls its list internally rather than growing the row. */
      .top-grid {
        align-items: stretch;
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .top-left {
        border: 1px solid #333;
        border-radius: 6px;
        padding: 14px;
      }

      .top-left > :first-child {
        margin-top: 0;
      }

      .top-right {
        min-height: 0;
        position: relative;
      }

      /* Browse mode (no search run yet): let the file list grow to fill the
         page instead of only matching the controls box height, so many more
         files are visible at once. The grid stretches to fill the flex column;
         the left controls box keeps its natural height (align-items: start)
         while the right cell -- and the heatmap that fills it -- stretches to
         the grown row. Toggled via the .browse-fill class from JS. */
      .top-grid.browse-fill {
        align-items: start;
        flex: 1 1 auto;
        min-height: 0;
      }

      .top-grid.browse-fill .top-right {
        align-self: stretch;
      }

      .controls {
        align-items: end;
        display: grid;
        gap: 8px 12px;
        grid-template-columns: minmax(0, 1fr) auto auto;
        margin-top: 12px;
      }

      .terms-help {
        font-size: 0.78rem;
        grid-column: 1 / -1;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }

      input[type="text"] {
        background: #111;
        border: 1px solid #666;
        color: #eee;
        font: inherit;
        padding: 6px 8px;
        width: 100%;
      }

      input[type="text"]::placeholder {
        color: #888;
      }

      .toggles {
        display: flex;
        gap: 14px;
        white-space: nowrap;
      }

      .toggle {
        align-items: center;
        cursor: pointer;
        display: flex;
        font-weight: 400;
        gap: 6px;
        margin: 0;
      }

      button {
        background: #2a2a2a;
        border: 1px solid #666;
        color: #eee;
        cursor: pointer;
        font: inherit;
        padding: 6px 14px;
      }

      button:hover:not(:disabled) {
        border-color: #888;
      }

      button.primary {
        background: #1f6feb;
        border-color: #1f6feb;
      }

      button:disabled {
        cursor: default;
        opacity: 0.5;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .progress {
        margin-top: 12px;
      }

      .bar {
        background: #222;
        border-radius: 3px;
        height: 6px;
        margin-top: 6px;
        overflow: hidden;
      }

      .bar > span {
        background: #1f6feb;
        display: block;
        height: 100%;
        width: 0;
        transition: width 0.1s linear;
      }

      .summary {
        border-top: 1px solid #2a2a2a;
        display: none;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: 14px;
        padding-top: 12px;
      }

      .stat .n {
        font-size: 20px;
        font-weight: 700;
      }

      .stat .k {
        color: #aaa;
        font-size: 12px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
      }

      .chip {
        background: #1a1a1a;
        border: 1px solid #444;
        border-radius: 999px;
        cursor: pointer;
        font-size: 12px;
        padding: 3px 10px;
      }

      .chip.active {
        background: #16202e;
        border-color: #7fb2ff;
        color: #cfe0ff;
      }

      .results-head {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .results-head input {
        flex: 0 1 320px;
        max-width: 320px;
      }

      /* Top pager sits on the results-head row, pushed to the right. */
      .results-head .pager {
        margin-left: auto;
        margin-top: 0;
      }

      table {
        border-collapse: collapse;
        font-size: 13px;
        margin-top: 8px;
        table-layout: fixed;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid #222;
        overflow: hidden;
        padding: 5px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: #aaa;
        font-weight: 600;
        position: sticky;
        top: 0;
        background: #111;
      }

      thead th:first-child {
        padding-left: 20px;
      }

      col.c-line {
        width: 84px;
      }

      td.file-head {
        background: #151515;
        border-top: 1px solid #2f2f2f;
        color: #cfe0ff;
        padding-top: 7px;
        padding-bottom: 7px;
      }

      td.file-head .fh-inner {
        align-items: baseline;
        display: flex;
        gap: 12px;
        justify-content: space-between;
      }

      td.file-head .fh-path {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      td.file-head .base {
        font-weight: 700;
      }

      td.file-head .fcount {
        color: #8a8a8a;
        flex-shrink: 0;
        font-weight: 400;
        white-space: nowrap;
      }

      td.line {
        color: #888;
        font-variant-numeric: tabular-nums;
        padding-left: 20px;
      }

      td.text {
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      mark {
        background: #6a4a00;
        color: #ffd479;
        border-radius: 2px;
        padding: 0 1px;
      }

      .heatmap {
        border: 1px solid #333;
        border-radius: 6px;
        display: none;
        flex-direction: column;
        inset: 0;
        padding: 12px;
        position: absolute;
      }

      .heatmap h2 {
        color: #aaa;
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 8px;
      }

      .heat-list {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 3px;
        min-height: 0;
        overflow-y: auto;
        /* Keep the list scrollable (wheel/trackpad/keyboard) but hide the
           scrollbar chrome for a cleaner look. */
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* legacy Edge/IE */
      }

      .heat-list::-webkit-scrollbar {
        display: none; /* Chromium, Safari */
      }

      .heat-row {
        align-items: center;
        border: 1px solid transparent;
        border-radius: 4px;
        cursor: pointer;
        display: grid;
        gap: 10px;
        /* [ path | value ]: the path takes all remaining space; the value
           (count+percent, or size) is the last column and right-aligned, so
           every value's right edge lines up regardless of its width. */
        grid-template-columns: minmax(0, 1fr) auto;
        padding: 3px 6px;
      }

      .heat-row:hover {
        background: #161616;
      }

      .heat-row.active {
        background: #16202e;
        border-color: #7fb2ff;
      }

      /* Browse list: same [ path | value ] layout as the base rule, but file
         sizes are short and uniform, so a fixed value column keeps the path's
         truncation point aligned across rows too. */
      .heat-row.browse {
        grid-template-columns: minmax(0, 1fr) 72px;
      }

      .heat-row .hp {
        direction: rtl;
        overflow: hidden;
        text-align: left;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .heat-row .hp span {
        direction: ltr;
        unicode-bidi: plaintext;
      }

      .heat-row .hp .base {
        font-weight: 700;
      }

      .heat-count {
        color: #ccc;
        font-variant-numeric: tabular-nums;
        text-align: right;
        white-space: nowrap;
      }

      .heat-count .hc-p {
        color: #8a8a8a;
        margin-left: 5px;
      }

      .heat-note {
        color: #aaa;
        font-size: 12px;
        margin-top: 8px;
      }

      .note {
        color: #aaa;
        margin-top: 8px;
      }

      .search-all-btn {
        margin-left: 8px;
        padding: 2px 10px;
        vertical-align: baseline;
      }

      .pager {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 12px;
      }

      .pager .page-info {
        color: #aaa;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      tbody tr.res-row {
        cursor: pointer;
      }

      tbody tr.res-row:hover td {
        background: #161616;
      }

      tbody tr.file-row {
        cursor: pointer;
      }

      tbody tr.file-row:hover td.file-head {
        background: #1b2634;
      }

      .viewer {
        background: #0d0d0d;
        display: flex;
        inset: 0;
        padding: 0;
        position: fixed;
        z-index: 50;
      }

      .viewer[hidden] {
        display: none;
      }

      /* Full-page viewer: the box fills the whole viewport edge-to-edge (no
         backdrop, border, or radius) so long log lines get the maximum width. */
      .viewer-box {
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        height: 100%;
        margin: 0;
        max-height: 100%;
        max-width: none;
        overflow: hidden;
        width: 100%;
      }

      .viewer-head {
        align-items: center;
        border-bottom: 1px solid #222;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: space-between;
        padding: 10px 12px;
      }

      .viewer-title {
        flex: 1 1 200px;
        font-size: 13px;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .viewer-title .base {
        font-weight: 700;
      }

      .viewer-event-status {
        color: #7fb2ff;
        flex: 0 1 auto;
        font-size: 12px;
      }

      .viewer-event-status:empty {
        display: none;
      }

      .viewer-event-status.error {
        color: #ff6b6b;
      }

      /* In-file find: retargets the viewer's highlight + match navigation to a
         query typed here; clearing it restores the original search matches. */
      .viewer-find {
        align-items: center;
        display: inline-flex;
        flex: 0 1 260px;
        gap: 8px;
        min-width: 140px;
      }

      .viewer-find input {
        flex: 1 1 auto;
        min-width: 0;
        padding: 5px 8px;
      }

      .viewer-find-count {
        color: #aaa;
        flex-shrink: 0;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .viewer-find-count.empty {
        color: #ff6b6b;
      }

      .viewer-nav {
        align-items: center;
        display: flex;
        flex-shrink: 0;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: flex-end;
      }

      .viewer-nav button {
        padding: 6px 10px;
      }

      .viewer-nav .minfo {
        color: #aaa;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      /* Zoom cluster reads as one segmented control. */
      .viewer-zoom {
        align-items: stretch;
        display: inline-flex;
      }

      .viewer-zoom button {
        border-radius: 0;
        min-width: 34px;
        text-align: center;
      }

      .viewer-zoom button + button {
        border-left: 0;
      }

      #viewer-zoom-reset {
        font-variant-numeric: tabular-nums;
        min-width: 48px;
      }

      .vsep {
        align-self: stretch;
        background: #2a2a2a;
        margin: 2px 2px;
        width: 1px;
      }

      /* Body + the custom match scrollbar sit side by side and share the space
         left below the header. */
      .viewer-main {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .viewer-body {
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12.5px;
        line-height: 1.5;
        flex: 1;
        min-height: 0;
        min-width: 0;
        overflow: auto;
        padding: 0;
        position: relative;
      }

      /* The native scrollbar is replaced by the custom match scrollbar on the
         right. Vertical scrolling still works via wheel/trackpad/keyboard, and
         wide lines scroll horizontally with shift+wheel/trackpad. */
      .viewer-body {
        scrollbar-width: none;
      }

      .viewer-body::-webkit-scrollbar {
        height: 0;
        width: 0;
      }

      .viewer-body:focus {
        outline: none;
      }

      /* Image and video files reuse the full-page viewer, but replace the text
         viewport with a centered, contain-sized native media element. */
      .viewer.media-mode .viewer-text-only {
        display: none;
      }

      .viewer.video-mode .viewer-zoom {
        display: none;
      }

      .viewer.media-mode .viewer-body {
        align-items: center;
        background: #080808;
        display: flex;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        justify-content: center;
        padding: 20px;
      }

      /* A zoomed image gets a max-content stage that grows with it, while the
         minimum viewport-sized stage keeps smaller images centered. */
      .viewer.image-mode .viewer-body {
        display: block;
        overflow: auto;
        padding: 0;
        scrollbar-width: auto;
      }

      .viewer.image-mode .viewer-body::-webkit-scrollbar {
        height: 12px;
        width: 12px;
      }

      .viewer-image-stage {
        align-items: center;
        display: flex;
        height: max-content;
        justify-content: center;
        min-height: 100%;
        min-width: 100%;
        padding: 20px;
        width: max-content;
      }

      .viewer-media {
        display: block;
        max-height: 100%;
        max-width: 100%;
        object-fit: contain;
      }

      .viewer.image-mode img.viewer-media {
        flex: none;
        max-height: none;
        max-width: none;
      }

      video.viewer-media {
        background: #000;
      }

      .viewer-media-message {
        color: #aaa;
        max-width: 560px;
        text-align: center;
      }

      .viewer-media-message.error {
        color: #ff8a8a;
      }

      /* Custom scrollbar / match minimap. The canvas paints a tick for every
         match at its position in the file; the thumb is the highlighted section
         showing where the viewport currently sits; the cursor marks the focused
         match. It is also the scroll control: click or drag to navigate. */
      .viewer-scroll {
        background: #0a0a0a;
        border-left: 1px solid #1c1c1c;
        cursor: pointer;
        flex: 0 0 16px;
        position: relative;
        touch-action: none;
        user-select: none;
        width: 16px;
      }

      .viewer-scroll[hidden] {
        display: none;
      }

      .viewer-scroll.no-scroll {
        cursor: default;
      }

      .viewer-scroll-map {
        display: block;
        height: 100%;
        inset: 0;
        position: absolute;
        width: 100%;
        z-index: 1;
      }

      .viewer-scroll-thumb {
        background: rgba(21, 32, 46, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.95);
        border-radius: 3px;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.95),
          0 0 4px rgba(0, 0, 0, 0.9);
        left: 1px;
        pointer-events: none;
        position: absolute;
        right: 1px;
        top: 0;
        will-change: transform;
        z-index: 2;
      }

      .viewer-scroll:hover .viewer-scroll-thumb {
        background: rgba(38, 58, 82, 0.38);
      }

      .viewer-scroll.dragging .viewer-scroll-thumb {
        background: rgba(52, 79, 110, 0.48);
      }

      .viewer-scroll-cursor {
        background: #ffd479;
        box-shadow: 0 0 4px rgba(255, 212, 121, 0.9);
        height: 2px;
        left: 0;
        pointer-events: none;
        position: absolute;
        right: 0;
        top: 0;
        will-change: transform;
        z-index: 3;
      }

      .viewer-scroll-thumb[hidden],
      .viewer-scroll-cursor[hidden] {
        display: none;
      }

      /* A 1px-wide spacer sizes the (possibly scaled) scrollbar; the window
         holds only the rows near the viewport and is repositioned per frame. */
      .v-spacer {
        width: 1px;
      }

      .v-window {
        left: 0;
        min-width: 100%;
        position: absolute;
        top: 0;
        width: max-content;
      }

      /* Fixed-height, non-wrapping rows: line N is always at (N-1) * rowH, so
         positioning any line is exact regardless of file size. Long lines scroll
         horizontally with the body rather than wrapping. */
      .v-line {
        display: flex;
        gap: 8px;
        height: var(--vrh, 18.75px);
        line-height: var(--vrh, 18.75px);
        min-width: 100%;
        overflow: hidden;
        padding: 0 10px;
        white-space: pre;
      }

      .v-line:hover {
        background: #141414;
      }

      .v-line.v-hit {
        background: #16202e;
      }

      .v-line.v-eventable {
        cursor: pointer;
      }

      .v-line.v-eventable .v-ln {
        color: #7fb2ff;
      }

      .v-line.v-event-added {
        background: #132019;
      }

      .v-line.v-event-added .v-ln {
        color: #52d273;
      }

      /* Line-number gutter is sized to the file's digit count (set per file), so
         short files don't waste a wide fixed column. */
      .v-ln {
        color: #666;
        flex: 0 0 calc(var(--v-ln-digits, 4) * 1ch + 2px);
        font-variant-numeric: tabular-nums;
        text-align: right;
        user-select: none;
        width: calc(var(--v-ln-digits, 4) * 1ch + 2px);
      }

      .v-tx {
        flex: 0 0 auto;
        white-space: pre;
      }

      .viewer-body mark {
        cursor: pointer;
      }

      /* Fit-to-width (wrap) mode: lines flow to the body width and grow taller
         instead of scrolling horizontally. The virtualization still tracks one
         logical line per row-height slot; renderViewer measures the top line's
         real (wrapped) height to keep scrolling smooth and gap-free. */
      .viewer-body.wrap {
        overflow-x: hidden;
      }

      .viewer-body.wrap .v-window {
        min-width: 0;
        width: 100%;
      }

      .viewer-body.wrap .v-line {
        align-items: flex-start;
        height: auto;
        min-height: var(--vrh, 18.75px);
        overflow: visible;
        white-space: pre-wrap;
      }

      .viewer-body.wrap .v-tx {
        flex: 1 1 auto;
        min-width: 0;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      mark.v-cur {
        background: #ffd479;
        color: #000;
        outline: 2px solid #ffd479;
      }

      /* Below this width the two top boxes stack. The heatmap returns to normal
         flow (its desktop layout fills the right cell absolutely), so these
         overrides must come after the base .heatmap / .heat-list rules to win. */
      @media (max-width: 820px) {
        .top-grid {
          grid-template-columns: 1fr;
        }

        .top-right {
          position: static;
        }

        .heatmap {
          position: static;
        }

        .heat-list {
          flex: none;
          max-height: 50vh;
        }

        /* Stacked layout caps the list at 50vh on its own, so don't let the
           browse-mode grow rule stretch the grid and add empty space. */
        .top-grid.browse-fill {
          flex: 0 1 auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="drop-overlay" id="drop-overlay" aria-hidden="true">
      <div class="drop-overlay-inner"><span class="drop-overlay-plus">+</span></div>
    </div>
    <main>
      <div class="top-grid" id="top-grid">
        <div class="top-left">
          <label
            class="dropzone"
            id="dropzone"
            tabindex="0"
            aria-label="Choose a log folder, or drag and drop a folder or archive anywhere on the page"
          >
            <span class="dropzone-plus" aria-hidden="true">+</span>
            <p class="muted" id="selection"></p>
            <input id="folder" type="file" webkitdirectory directory multiple>
          </label>

          <div class="controls">
            <div>
              <input
                id="terms"
                type="text"
                placeholder="ERROR, FATAL, "
                autocomplete="on"
                spellcheck="true"
                aria-label="Search terms"
                aria-describedby="terms-help"
              >
            </div>
            <div class="toggles">
              <label class="toggle"><input id="case" type="checkbox"> Case sensitive</label>
              <label class="toggle"><input id="regex" type="checkbox"> Regex</label>
            </div>
            <button id="search" class="primary" type="button" disabled>Search</button>
          </div>

          <div class="chips" id="quick-chips" aria-label="Quick add terms">
            <span class="chip" data-add="ERROR">+ ERROR</span>
            <span class="chip" data-add="FATAL">+ FATAL</span>
            <span class="chip" data-add="WARNING">+ WARNING</span>
            <span class="chip" data-add="CRITICAL">+ CRITICAL</span>
            <span class="chip" data-add="Exception">+ Exception</span>
            <span class="chip" data-add="Traceback">+ Traceback</span>
            <span class="chip" data-add="panic">+ panic</span>
            <span class="chip" data-add="segfault">+ segfault</span>
          </div>

          <div class="actions">
            <button id="cancel" type="button" style="display: none;">Cancel</button>
          </div>

          <div class="progress" id="progress" style="display: none;">
            <p class="muted" id="progress-text"></p>
            <div class="bar"><span id="progress-bar"></span></div>
          </div>

          <p class="error" id="config-error" role="alert"></p>

          <section class="summary" id="summary" aria-live="polite"></section>

          <p class="note" id="scan-note"></p>
        </div>

        <div class="top-right">
          <section class="heatmap" id="heatmap" aria-label="File heatmap"></section>
        </div>
      </div>

      <section class="route-panel" id="route-panel" aria-label="Vehicle route trace" hidden>
        <div class="route-head">
          <div class="route-heading">
            <h2>Vehicle route</h2>
            <p class="route-status" id="route-status" aria-live="polite"></p>
          </div>
          <div class="route-actions">
            <label class="toggle">
              <input id="route-include-propagated" type="checkbox" disabled>
              Include odometry points
            </label>
            <button id="route-archives" type="button" hidden>Analyze archives</button>
            <button id="route-download" type="button" disabled>Download GeoJSON</button>
            <button id="route-collapse" type="button">Hide</button>
          </div>
        </div>
        <div class="route-body" id="route-body">
          <p class="route-empty" id="route-empty">Reading localization data...</p>
          <div id="route-visual" hidden>
            <div class="route-stats" id="route-stats"></div>
            <div class="route-workspace" id="route-workspace">
              <section class="route-events" id="route-events" hidden>
                <h3>Timeline events</h3>
                <div class="route-event-list" id="route-event-list"></div>
              </section>
              <div class="route-map-column">
                <div class="route-map-frame" id="route-map-frame">
                  <div class="route-tiles" id="route-tiles" hidden></div>
                  <svg
                    class="route-svg"
                    id="route-svg"
                    viewBox="0 0 1000 560"
                    preserveAspectRatio="none"
                    role="img"
                    aria-label="Interactive north-up trace of the route taken by the vehicle"
                  ></svg>
                  <div class="route-map-buttons">
                    <select id="route-map-style" aria-label="Map style" disabled>
                      <option value="osm" selected>Street (OSM)</option>
                      <option value="satellite">Satellite</option>
                      <option value="local">Local plot</option>
                    </select>
                    <button class="route-map-zoom" id="route-zoom-out" type="button" title="Zoom out" hidden>&minus;</button>
                    <button class="route-map-zoom" id="route-zoom-in" type="button" title="Zoom in" hidden>+</button>
                    <button id="route-fit" type="button">Fit route</button>
                  </div>
                  <div class="route-tooltip" id="route-tooltip" hidden></div>
                  <div class="route-map-hint">Drag to move &middot; Pinch or scroll to zoom</div>
                  <div class="route-map-attribution" id="route-attribution" hidden>
                    <span id="route-attribution-osm">&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener noreferrer">OpenStreetMap contributors</a></span>
                    <span id="route-attribution-satellite" hidden>Imagery: <a href="https://www.usgs.gov/programs/national-geospatial-program/national-map" target="_blank" rel="noopener noreferrer">USDA, USGS The National Map</a></span>
                  </div>
                </div>
                <div class="route-under-map">
                  <div class="route-timeline">
                    <button id="route-play" type="button" disabled>Play</button>
                    <input id="route-range" type="range" min="0" max="0" value="0" disabled aria-label="Route playback position">
                    <select id="route-speed" aria-label="Playback speed">
                      <option value="10">10&times;</option>
                      <option value="30" selected>30&times;</option>
                      <option value="60">60&times;</option>
                    </select>
                    <span class="route-time" id="route-time"></span>
                  </div>
                  <div class="route-legend" aria-label="Route legend">
                    <span class="route-legend-item"><span class="route-swatch"></span><span id="route-legend-label">Route</span></span>
                    <span class="route-legend-item" id="route-engaged-legend" hidden><span class="route-swatch engaged"></span>Engaged</span>
                    <span class="route-legend-item"><span class="route-swatch start"></span>Start</span>
                    <span class="route-legend-item"><span class="route-swatch end"></span>End</span>
                    <span class="route-legend-item"><span class="route-swatch event"></span>Event</span>

        </div>
      </section>

      <div class="chips" id="term-filter" aria-label="Filter by term"></div>

      <div class="results-head" id="results-head" style="display: none;">
        <input id="filter" type="text" placeholder="Filter results by path or text..." autocomplete="off">
        <button id="download" type="button">Download CSV</button>
        <div class="pager" id="pager-top" style="display: none;"></div>
      </div>

      <p class="note" id="results-note"></p>

      <table id="results-table" style="display: none;">
        <colgroup>
          <col class="c-line">
          <col>
        </colgroup>
        <tbody id="results-body"></tbody>
      </table>

      <div class="pager" id="pager-bottom" style="display: none;"></div>
    </main>

    <div class="viewer" id="viewer" hidden>
      <div class="viewer-box" role="dialog" aria-modal="true" aria-label="File viewer">
        <div class="viewer-head">
          <div class="viewer-title" id="viewer-title"></div>
          <span class="viewer-event-status" id="viewer-event-status" aria-live="polite"></span>
          <div class="viewer-find viewer-text-only">
            <input id="viewer-find" type="text" placeholder="Find in file..." autocomplete="off" spellcheck="false" aria-label="Find in file">
            <span class="viewer-find-count" id="viewer-find-count" aria-live="polite"></span>
          </div>
          <div class="viewer-nav">
            <span class="minfo" id="viewer-minfo"></span>
            <button class="viewer-text-only" id="viewer-first" type="button" title="First match (Home)">&#8676; First</button>
            <button class="viewer-text-only" id="viewer-prev" type="button" title="Previous match (Up / Left arrow)">&uarr; Prev</button>
            <button class="viewer-text-only" id="viewer-next" type="button" title="Next match (Down / Right arrow)">&darr; Next</button>
            <button class="viewer-text-only" id="viewer-last" type="button" title="Last match (End)">Last &#8677;</button>
            <span class="vsep viewer-text-only" aria-hidden="true"></span>
            <span class="viewer-zoom">
              <button id="viewer-zoom-out" type="button" title="Zoom out (-)">&#8722;</button>
              <button id="viewer-zoom-reset" type="button" title="Reset zoom (0)">100%</button>
              <button id="viewer-zoom-in" type="button" title="Zoom in (+)">+</button>
            </span>
            <button class="viewer-text-only" id="viewer-wrap" type="button" title="Toggle line wrap (W)" aria-pressed="false">Wrap: Off</button>
            <span class="vsep viewer-text-only" aria-hidden="true"></span>
            <button id="viewer-close" type="button" title="Close (Esc)">Close</button>
          </div>
        </div>
        <div class="viewer-main">
          <div class="viewer-body" id="viewer-body" tabindex="0"></div>
          <div class="viewer-scroll" id="viewer-scroll" aria-hidden="true" hidden>
            <canvas class="viewer-scroll-map" id="viewer-scroll-map"></canvas>
            <div class="viewer-scroll-cursor" id="viewer-scroll-cursor" hidden></div>
            <div class="viewer-scroll-thumb" id="viewer-scroll-thumb" hidden></div>
          </div>
        </div>
      </div>
    </div>

    <script src="archives.js"></script>
    <script src="route-core.js"></script>
    <script src="route.js"></script>
    <script>
      // Retain matches until their text is estimated to use this much memory,
      // rather than a fixed count -- so a run with a few hundred thousand short
      // matches stays fully in memory (instant filtering) while a pathological
      // run with millions of matches still can't exhaust the tab. Each match
      // costs roughly its text length plus a small per-object overhead.
      const STORE_BUDGET = 400 * 1024 * 1024; // ~400 MB of retained match text
      const STORE_MATCH_OVERHEAD = 64; // approx per-match object cost, in bytes
      const matchCost = (text) => text.length + STORE_MATCH_OVERHEAD;
      const PAGE_SIZE = 1000; // matches shown per results page
      const BINARY_SNIFF_BYTES = 8000;
      const VIEWER_BLOCK_LINES = 500; // lines per virtualized viewer block
      // Browsers cap how tall an element can be (about 2^24 device pixels). On a
      // HiDPI display that is only ~8.4M CSS px -- far short of what a file with
      // hundreds of thousands of lines needs. Keep the scroll content under this
      // cap and map the scroll position across the full line range so every line
      // (and every match) stays reachable, no matter how large the file is.
      const VIEWER_MAX_CONTENT_PX = Math.floor(
        16000000 / (window.devicePixelRatio || 1)
      );
      // Viewer zoom: font size (px) drives the measured row height, so zooming
      // just re-measures and re-anchors. Clamped to a sane, readable range.
      const VIEWER_FONT_DEFAULT = 12.5;
      const VIEWER_FONT_MIN = 6.5;
      const VIEWER_FONT_MAX = 44;
      const VIEWER_ZOOM_STEP = 1.15;
      const VIEWER_IMAGE_ZOOM_MIN = 0.1;
      const VIEWER_IMAGE_ZOOM_MAX = 8;
      const VIEWER_IMAGE_ZOOM_STEP = 1.25;
      // Local File objects usually carry a MIME type, but directory pickers and
      // archive entries are inconsistent. These fallbacks cover media formats
      // browsers commonly know how to display or play; unsupported codecs still
      // fail cleanly inside the viewer.
      const MEDIA_MIME_BY_EXTENSION = Object.freeze({
        avif: "image/avif",
        bmp: "image/bmp",
        gif: "image/gif",
        heic: "image/heic",
        heif: "image/heif",
        ico: "image/x-icon",
        jfif: "image/jpeg",
        jpeg: "image/jpeg",
        jpg: "image/jpeg",
        jxl: "image/jxl",
        png: "image/png",
        svg: "image/svg+xml",
        tif: "image/tiff",
        tiff: "image/tiff",
        webp: "image/webp",
        "3gp": "video/3gpp",
        avi: "video/x-msvideo",
        m4v: "video/x-m4v",
        mkv: "video/x-matroska",
        mov: "video/quicktime",
        mp4: "video/mp4",
        mpeg: "video/mpeg",
        mpg: "video/mpeg",
        ogv: "video/ogg",
        webm: "video/webm",
      });

      const el = (id) => document.getElementById(id);
      const dropzone = el("dropzone");
      const dropOverlay = el("drop-overlay");
      const folderInput = el("folder");
      const selectionEl = el("selection");
      const termsInput = el("terms");
      const caseInput = el("case");
      const regexInput = el("regex");
      const searchBtn = el("search");
      const cancelBtn = el("cancel");
      const progressEl = el("progress");
      const progressText = el("progress-text");
      const progressBar = el("progress-bar");
      const configError = el("config-error");
      const summaryEl = el("summary");
      const heatmapEl = el("heatmap");
      const topGrid = el("top-grid");
      const termFilterEl = el("term-filter");
      const resultsHead = el("results-head");
      const filterInput = el("filter");
      const downloadBtn = el("download");
      const resultsNote = el("results-note");
      const scanNote = el("scan-note");
      const resultsTable = el("results-table");
      const resultsBody = el("results-body");
      const pagerTop = el("pager-top");
      const pagerBottom = el("pager-bottom");
      const viewer = el("viewer");
      const viewerTitle = el("viewer-title");
      const viewerEventStatus = el("viewer-event-status");
      const viewerMinfo = el("viewer-minfo");
      const viewerFirst = el("viewer-first");
      const viewerPrev = el("viewer-prev");
      const viewerNext = el("viewer-next");
      const viewerLast = el("viewer-last");
      const viewerZoomOut = el("viewer-zoom-out");
      const viewerZoomIn = el("viewer-zoom-in");
      const viewerZoomReset = el("viewer-zoom-reset");
      const viewerWrapBtn = el("viewer-wrap");
      const viewerClose = el("viewer-close");
      const viewerBody = el("viewer-body");
      const viewerScroll = el("viewer-scroll");
      const viewerScrollMap = el("viewer-scroll-map");
      const viewerScrollThumb = el("viewer-scroll-thumb");
      const viewerScrollCursor = el("viewer-scroll-cursor");
      const viewerFindInput = el("viewer-find");
      const viewerFindCount = el("viewer-find-count");

      // Archive expansion (.zip/.tar/.tar.gz/.tgz/.gz) runs client-side via
      // archives.js. It needs the native DecompressionStream API; if that is
      // missing we still scan plain folders and just skip archives.
      const archivesSupported = !!(
        window.LogArchives && window.LogArchives.support().any
      );

      // Chromium's File System Access API can open the folder picker directly
      // in a well-known location (Downloads, below). Safari and Firefox don't
      // implement it, so this is a progressive enhancement over the plain
      // <input webkitdirectory> picker, whose start directory the browser
      // controls and a page cannot set.
      const directoryPickerSupported =
        typeof window.showDirectoryPicker === "function";

      // Selected files as { file, path }. Kept in memory so re-searching with
      // new terms just re-reads them (no need to hold every line in memory).
      let selected = [];
      let lastRun = null; // results of the most recent completed scan
      let activeTerm = null; // term chip filter, or null for all
      let activeFile = null; // heatmap file filter, or null for all
      let activeFileMatches = null; // all matches for activeFile, re-read on demand
      let activeFileCapped = false; // that re-read hit the per-file cap
      let currentPage = 0; // zero-based page shown in the results list
      let fileScanToken = 0; // guards against races when switching files fast
      let globalScan = null; // cached disk re-scan of matches for the active filter
      let globalScanToken = 0; // cancels a superseded global re-scan
      let globalScanLoading = false; // a global re-scan is currently in flight
      let running = false;
      let cancelRequested = false;
      let displayRoot = ""; // shared root folder/archive trimmed from shown paths
      let viewerData = null; // virtualized model of the file open in the viewer
      let viewerIdx = -1; // index of the focused match in viewerData.matchLines
      let viewerToken = 0; // guards against races when opening files quickly
      let viewerSpacer = null; // sizes the scrollbar to the (scaled) file height
      let viewerWindow = null; // holds only the rows near the viewport
      let viewerRaf = 0; // rAF handle coalescing scroll-driven re-renders
      let viewerFontPx = VIEWER_FONT_DEFAULT; // current zoom (persists across files)
      let viewerWrap = false; // false = extended (default), true = fit-to-width
      let viewerFindTimer = 0; // debounce handle for the in-file find box
      let viewerEventStatusTimer = 0; // clears add-to-timeline feedback
      let viewerMode = "text"; // text, image, or video
      let viewerObjectUrl = null; // active local-media URL, revoked on close/open
      let viewerImageElement = null;
      let viewerImageBaseWidth = 0; // fit-to-viewport size at 100%
      let viewerImageBaseHeight = 0;
      let viewerImageZoom = 1;
      let viewerGestureStartZoom = 1; // Safari's cumulative pinch scale anchor

      // The drop box shows a single status line; empty text collapses it and
      // brings back the plus sign.
      function setDropInfo(text) {
        selectionEl.textContent = text || "";
        dropzone.classList.toggle("has-selection", !!text);
      }

      function setSelection(files) {
        selected = files;
        if (window.LogRoute) window.LogRoute.setSelection(files);
        if (!files.length) {
          setDropInfo("");
          searchBtn.disabled = true;
          clearSearchState();
          heatmapEl.innerHTML = "";
          heatmapEl.style.display = "none";
          setBrowseFill(false);
          return;
        }
        const totalBytes = files.reduce((sum, f) => sum + f.file.size, 0);
        const root = files[0].path.split("/")[0] || "(folder)";
        setDropInfo(
          `${files.length.toLocaleString()} file${files.length === 1 ? "" : "s"} ` +
            `(${formatBytes(totalBytes)}) from "${root}"`
        );
        searchBtn.disabled = false;
        // A new selection drops any previous results and shows the file list so
        // files can be opened right away, before (or without) a search.
        clearSearchState();
        renderBrowseHeatmap();
      }

      function filesFromInput(fileList) {
        return Array.from(fileList).map((file) => ({
          file,
          path: file.webkitRelativePath || file.name,
        }));
      }

      // Recursively walk a FileSystemDirectoryHandle into the same
      // { file, path } shape the rest of the app uses. Paths are prefixed with
      // the chosen folder's own name so they read like webkitRelativePath.
      async function filesFromDirectoryHandle(dirHandle) {
        const out = [];
        const walk = async (handle, prefix) => {
          for await (const entry of handle.values()) {
            const path = prefix ? `${prefix}/${entry.name}` : entry.name;
            if (entry.kind === "file") {
              out.push({ file: await entry.getFile(), path });
            } else if (entry.kind === "directory") {
              await walk(entry, path);
            }
          }
        };
        await walk(dirHandle, dirHandle.name);
        return out;
      }

      // Open the folder picker. In Chromium this uses the File System Access
      // API so the dialog opens in Downloads; elsewhere it falls back to the
      // native <input webkitdirectory> picker (browser-chosen location).
      async function pickFolder() {
        if (!directoryPickerSupported) {
          folderInput.click();
          return;
        }
        let dirHandle;
        try {
          // No `id` is passed, so the picker opens in Downloads on every use
          // instead of reopening wherever the user last browsed.
          dirHandle = await window.showDirectoryPicker({ startIn: "downloads" });
        } catch (error) {
          // AbortError just means the picker was dismissed; on anything else
          // fall back to the native picker so folder selection still works.
          if (error && error.name === "AbortError") return;
          folderInput.click();
          return;
        }
        setDropInfo("Reading folder...");
        try {
          setSelection(await filesFromDirectoryHandle(dirHandle));
        } catch (error) {
          setDropInfo("");
          showConfigError(
            "Could not read the selected folder: " + error.message
          );
        }
      }

      folderInput.addEventListener("change", () => {
        setSelection(filesFromInput(folderInput.files));
      });

      // The dropzone is a <label> wrapping the file input, so a click normally
      // opens the native picker. When the File System Access API is available,
      // intercept that click and open the Downloads-rooted picker instead.
      dropzone.addEventListener("click", (event) => {
        if (!directoryPickerSupported) return;
        event.preventDefault();
        pickFolder();
      });

      // Drag & drop works anywhere on the page, not just over the dropzone. A
      // full-screen overlay appears while files are dragged in, and dropping a
      // folder, archive, or files reads them wherever they land. The depth
      // counter tracks dragenter/dragleave across nested elements so the
      // overlay does not flicker. Non-file drags (e.g. text into an input) are
      // left alone so the browser handles them normally.
      let dragDepth = 0;

      function dragHasFiles(event) {
        const dt = event.dataTransfer;
        return !!dt && Array.from(dt.types || []).includes("Files");
      }

      window.addEventListener("dragenter", (event) => {
        if (!dragHasFiles(event)) return;
        event.preventDefault();
        dragDepth++;
        dropOverlay.classList.add("active");
      });
      window.addEventListener("dragover", (event) => {
        if (!dragHasFiles(event)) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = "copy";
      });
      window.addEventListener("dragleave", (event) => {
        if (!dragHasFiles(event)) return;
        dragDepth = Math.max(0, dragDepth - 1);
        if (dragDepth === 0) dropOverlay.classList.remove("active");
      });
      window.addEventListener("drop", (event) => {
        if (!dragHasFiles(event)) return;
        event.preventDefault();
        dragDepth = 0;
        dropOverlay.classList.remove("active");
        ingestDataTransfer(event.dataTransfer);
      });

      // Read dropped items into the selection. Folders are traversed via the
      // entry API; browsers without it fall back to the flat file list. All
      // DataTransfer reads happen synchronously up front because it is cleared
      // once the drop handler returns.
      async function ingestDataTransfer(dataTransfer) {
        if (!dataTransfer) return;
        const entries = [];
        const items = dataTransfer.items;
        if (items && items.length) {
          for (const item of items) {
            const entry = item.webkitGetAsEntry && item.webkitGetAsEntry();
            if (entry) entries.push(entry);
          }
        }
        const flatFiles = entries.length
          ? null
          : Array.from(dataTransfer.files || []);

        if (entries.length) {
          setDropInfo("Reading folder...");
          try {
            const files = [];
            for (const entry of entries) {
              await walkEntry(entry, files);
            }
            setSelection(files);
          } catch (error) {
            setDropInfo("");
            showConfigError(
              "Could not read the dropped items: " + error.message
            );
          }
          return;
        }
        if (flatFiles && flatFiles.length) {
          setSelection(filesFromInput(flatFiles));
        }
      }

      dropzone.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          pickFolder();
        }
      });

      async function walkEntry(entry, out) {
        if (entry.isFile) {
          const file = await new Promise((resolve, reject) =>
            entry.file(resolve, reject)
          );
          out.push({ file, path: entry.fullPath.replace(/^\//, "") });
          return;
        }
        if (entry.isDirectory) {
          const reader = entry.createReader();
          // readEntries returns results in batches; keep calling until empty.
          while (true) {
            const batch = await new Promise((resolve, reject) =>
              reader.readEntries(resolve, reject)
            );
            if (!batch.length) break;
            for (const child of batch) {
              await walkEntry(child, out);
            }
          }
        }
      }

      // Quick-add chips append a term to the terms box.
      el("quick-chips").addEventListener("click", (event) => {
        const term = event.target && event.target.getAttribute("data-add");
        if (!term) return;
        let current;
        try {
          current = parseTerms();
        } catch (error) {
          showConfigError(error.message);
          termsInput.focus();
          return;
        }
        if (!current.some((t) => t.toLowerCase() === term.toLowerCase())) {
          current.push(term);
          termsInput.value = current.map(serializeTerm).join(", ");
        }
        showConfigError("");
      });

      searchBtn.addEventListener("click", runSearch);
      cancelBtn.addEventListener("click", () => {
        cancelRequested = true;
      });
      termsInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !searchBtn.disabled && !running) runSearch();
      });
      filterInput.addEventListener(
        "input",
        debounce(() => {
          currentPage = 0;
          invalidateGlobalScan();
          renderResults();
        }, 150)
      );
      downloadBtn.addEventListener("click", downloadCsv);
      // The truncation note can carry a "Search all files" button that recovers
      // matches dropped past the in-memory store cap.
      resultsNote.addEventListener("click", (event) => {
        if (event.target.closest("#search-all")) runGlobalRescan();
      });
      pagerTop.addEventListener("click", onPagerClick);
      pagerBottom.addEventListener("click", onPagerClick);

      // Clicking a results row opens that file in the viewer, jumped to the
      // clicked line. Ignore the click if the user is selecting text.
      resultsBody.addEventListener("click", (event) => {
        const tr = event.target.closest("tr");
        if (!tr || !tr.dataset.path) return;
        const selection = window.getSelection && window.getSelection();
        if (selection && !selection.isCollapsed) return;
        openViewer(tr.dataset.path, Number(tr.dataset.line));
      });

      viewerFirst.addEventListener("click", () => setViewerMatch(0));
      viewerPrev.addEventListener("click", () => setViewerMatch(viewerIdx - 1));
      viewerNext.addEventListener("click", () => setViewerMatch(viewerIdx + 1));
      viewerLast.addEventListener("click", () =>
        setViewerMatch(viewerMatchCount() - 1)
      );
      viewerZoomOut.addEventListener("click", () => changeViewerZoom(-1));
      viewerZoomIn.addEventListener("click", () => changeViewerZoom(1));
      viewerZoomReset.addEventListener("click", resetViewerZoom);
      viewerWrapBtn.addEventListener("click", () => setViewerWrap(!viewerWrap));
      viewerClose.addEventListener("click", closeViewer);

      viewerFindInput.addEventListener("input", scheduleFind);
      viewerFindInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          // Commit a still-pending edit first (landing on its nearest match);
          // otherwise step to the next/previous match.
          if (viewerFindTimer) {
            clearTimeout(viewerFindTimer);
            viewerFindTimer = 0;
            applyFind();
          } else {
            viewerFindStep(event.shiftKey ? -1 : 1);
          }
        } else if (event.key === "Escape") {
          event.preventDefault();
          // First Escape clears the query (back to the search matches); a second
          // Escape on the now-empty box closes the viewer.
          if (viewerFindInput.value) {
            clearFind();
          } else {
            closeViewer();
          }
        }
      });
      // Click on the backdrop (not the dialog box) closes the viewer.
      viewer.addEventListener("mousedown", (event) => {
        if (event.target === viewer) closeViewer();
      });
      document.addEventListener("keydown", (event) => {
        if (viewer.hidden) return;
        // Videos own their playback/navigation keys. Images also support the
        // same +, -, and 0 zoom shortcuts as text files.
        if (viewerMode !== "text") {
          if (event.key === "Escape") {
            closeViewer();
          } else if (
            viewerMode === "image" &&
            (event.key === "+" || event.key === "=")
          ) {
            event.preventDefault();
            changeViewerZoom(1);
          } else if (
            viewerMode === "image" &&
            (event.key === "-" || event.key === "_")
          ) {
            event.preventDefault();
            changeViewerZoom(-1);
          } else if (viewerMode === "image" && event.key === "0") {
            event.preventDefault();
            resetViewerZoom();
          }
          return;
        }
        // Cmd/Ctrl+F focuses the in-file find box (overriding the browser's own
        // find, which can't see the virtualized rows anyway).
        if ((event.metaKey || event.ctrlKey) && (event.key === "f" || event.key === "F")) {
          event.preventDefault();
          viewerFindInput.focus();
          viewerFindInput.select();
          return;
        }
        // While typing in the find box, let it own its keys (text editing,
        // Enter/Esc) rather than firing the viewer's single-key shortcuts.
        if (event.target === viewerFindInput) return;
        if (event.key === "Escape") {
          closeViewer();
        } else if (event.key === "ArrowDown" || event.key === "ArrowRight") {
          event.preventDefault();
          setViewerMatch(viewerIdx + 1);
        } else if (event.key === "ArrowUp" || event.key === "ArrowLeft") {
          event.preventDefault();
          setViewerMatch(viewerIdx - 1);
        } else if (event.key === "Home" && viewerMatchCount()) {
          event.preventDefault();
          setViewerMatch(0);
        } else if (event.key === "End" && viewerMatchCount()) {
          event.preventDefault();
          setViewerMatch(viewerMatchCount() - 1);
        } else if (event.key === "+" || event.key === "=") {
          event.preventDefault();
          changeViewerZoom(1);
        } else if (event.key === "-" || event.key === "_") {
          event.preventDefault();
          changeViewerZoom(-1);
        } else if (event.key === "0") {
          event.preventDefault();
          resetViewerZoom();
        } else if (event.key === "w" || event.key === "W") {
          event.preventDefault();
          setViewerWrap(!viewerWrap);
        }
      });

      viewerBody.addEventListener("click", onViewerMatchClick);
      viewerBody.addEventListener("scroll", onViewerScroll);
      // Chromium exposes a trackpad pinch as a cancelable Ctrl+wheel event;
      // Safari exposes gesture events. Handle both so the image zooms in place
      // instead of the browser scaling the whole page.
      viewer.addEventListener("wheel", onViewerImageWheel, { passive: false });
      viewer.addEventListener("gesturestart", onViewerImageGestureStart, {
        passive: false,
      });
      viewer.addEventListener("gesturechange", onViewerImageGestureChange, {
        passive: false,
      });
      viewer.addEventListener("gestureend", onViewerImageGestureEnd, {
        passive: false,
      });
      window.addEventListener("resize", () => {
        if (viewerData) {
          drawViewerMatchMap();
          scheduleViewerRender();
        } else if (viewerMode === "image" && viewerImageElement) {
          fitViewerImage(false);
        }
      });

      // Custom scrollbar navigation. A press maps the pointer to a virtual
      // offset; if it lands on the thumb we keep the grab offset so it drags
      // smoothly, otherwise we jump so the pointer becomes the thumb's center.
      let viewerScrollDragging = false;
      let viewerScrollGrab = 0;

      function viewerScrollOffsetFor(clientY, useGrab) {
        const g = viewerScrollGeom();
        if (!g.scrollable) return null;
        const rect = viewerScroll.getBoundingClientRect();
        const y = Math.max(0, Math.min(clientY - rect.top, g.h));
        if (useGrab === undefined) {
          const curTop =
            g.m.maxVirtual > 0
              ? (viewerVirtualTop(g.m) / g.m.maxVirtual) * g.movable
              : 0;
          viewerScrollGrab =
            y >= curTop && y <= curTop + g.thumbH ? y - curTop : g.thumbH / 2;
        }
        const thumbTop = Math.max(0, Math.min(y - viewerScrollGrab, g.movable));
        return g.movable > 0 ? (thumbTop / g.movable) * g.m.maxVirtual : 0;
      }

      viewerScroll.addEventListener("pointerdown", (event) => {
        if (!viewerData || !viewerSpacer) return;
        const vt = viewerScrollOffsetFor(event.clientY);
        if (vt == null) return;
        viewerScrollDragging = true;
        viewerScroll.classList.add("dragging");
        try {
          viewerScroll.setPointerCapture(event.pointerId);
        } catch (e) {}
        event.preventDefault();
        viewerScrollToVirtualTop(vt);
      });

      viewerScroll.addEventListener("pointermove", (event) => {
        if (!viewerScrollDragging) return;
        const vt = viewerScrollOffsetFor(event.clientY, true);
        if (vt != null) viewerScrollToVirtualTop(vt);
      });

      function endViewerScrollDrag(event) {
        if (!viewerScrollDragging) return;
        viewerScrollDragging = false;
        viewerScroll.classList.remove("dragging");
        try {
          viewerScroll.releasePointerCapture(event.pointerId);
        } catch (e) {}
      }

      viewerScroll.addEventListener("pointerup", endViewerScrollDrag);
      viewerScroll.addEventListener("pointercancel", endViewerScrollDrag);

      // Commas separate terms except inside double quotes. Quoted terms support
      // backslash escapes (\" and \\) and CSV-style doubled quotes.
      function parseTerms(value = termsInput.value) {
        const terms = [];
        let term = "";
        let inQuotes = false;
        let afterQuote = false;
        let quotedTerm = false;

        function pushTerm() {
          const normalized = quotedTerm ? term : term.trim();
          if (normalized) terms.push(normalized);
          term = "";
          afterQuote = false;
          quotedTerm = false;
        }

        for (let i = 0; i < value.length; i++) {
          const char = value[i];

          if (inQuotes) {
            if (
              char === "\\" &&
              (value[i + 1] === '"' || value[i + 1] === "\\")
            ) {
              term += value[++i];
            } else if (char === '"') {
              if (value[i + 1] === '"') {
                term += '"';
                i++;
              } else {
                inQuotes = false;
                afterQuote = true;
              }
            } else {
              term += char;
            }
          } else if (afterQuote) {
            if (char === ",") {
              pushTerm();
            } else if (!/\s/.test(char)) {
              throw new Error(
                `Unexpected "${char}" after a quoted search term. Add a comma before the next term.`
              );
            }
          } else if (char === ",") {
            pushTerm();
          } else if (char === '"' && !term.trim()) {
            term = "";
            inQuotes = true;
            quotedTerm = true;
          } else {
            term += char;
          }
        }

        if (inQuotes) {
          throw new Error(
            'Unclosed quote in search terms. Add a closing quote or escape a literal quote as \\".'
          );
        }
        pushTerm();
        return terms;
      }

      function serializeTerm(term) {
        if (
          !term.includes(",") &&
          !term.includes('"') &&
          term.trim() === term
        ) {
          return term;
        }
        const escaped = term.replace(/\\/g, "\\\\").replace(/"/g, '\\"');
        return `"${escaped}"`;
      }

      function buildMatchers(terms) {
        const flags = caseInput.checked ? "" : "i";
        const asRegex = regexInput.checked;
        const source = terms
          .map((t) => (asRegex ? t : escapeRegex(t)))
          .map((t) => `(?:${t})`)
          .join("|");
        // Combined matcher for "does this line match anything" + highlighting.
        const combined = new RegExp(source, flags);
        const highlight = new RegExp(source, flags + "g");
        // Per-term matchers for the summary breakdown.
        const perTerm = terms.map((t) => ({
          term: t,
          re: new RegExp(asRegex ? t : escapeRegex(t), flags),
        }));
        return { combined, highlight, perTerm };
      }

      async function runSearch() {
        if (running) return;
        showConfigError("");
        let terms;
        try {
          terms = parseTerms();
        } catch (error) {
          showConfigError(error.message);
          return;
        }
        if (!selected.length) {
          showConfigError("Choose a log folder first.");
          return;
        }
        if (!terms.length) {
          // No search terms: don't treat it as an error. Just return to the
          // expanded browse view (same clean state as a fresh selection), so
          // clearing the terms and pressing Enter/Search shows the file list.
          clearSearchState();
          renderBrowseHeatmap();
          return;
        }

        let matchers;
        try {
          matchers = buildMatchers(terms);
        } catch (error) {
          showConfigError("Invalid regular expression: " + error.message);
          return;
        }

        running = true;
        cancelRequested = false;
        searchBtn.disabled = true;
        cancelBtn.style.display = "";
        progressEl.style.display = "";
        summaryEl.style.display = "none";
        heatmapEl.style.display = "none";
        heatmapEl.innerHTML = "";
        setBrowseFill(false);
        resultsHead.style.display = "none";
        resultsTable.style.display = "none";
        resultsNote.textContent = "";
        scanNote.textContent = "";
        termFilterEl.innerHTML = "";
        activeTerm = null;
        activeFile = null;
        activeFileMatches = null;
        activeFileCapped = false;
        currentPage = 0;
        fileScanToken++;
        globalScan = null;
        invalidateGlobalScan();

        const ctx = {
          matches: [],
          stored: 0,
          storedBytes: 0, // estimated memory used by retained match text
          totalMatches: 0,
          totalLines: 0,
          filesScanned: 0,
          filesSkipped: 0,
          bytesRead: 0,
          unsupported: 0, // archived entries we can't read (encrypted, etc.)
          archiveErrors: [], // archives that failed to parse
          archivesExpanded: 0,
          termCounts: Object.fromEntries(terms.map((t) => [t, 0])),
          fileCounts: Object.create(null),
          fileTerms: Object.create(null), // path -> Set of terms that matched in it
          fileCount: 0,
          matchers,
          startedAt: performance.now(),
          lastUi: 0,
        };

        // Expand archives into scan tasks up front. Each top-level selected item
        // is one task; an archive task fans out to all the files inside it.
        const { tasks, unsupportedArchives } = buildTasks(selected);
        ctx.archivesExpanded = tasks.filter((t) => t.archive).length;
        const totalTasks = tasks.length;
        try {
          for (let i = 0; i < tasks.length; i++) {
            if (cancelRequested) break;
            updateProgress(ctx, i, totalTasks, tasks[i].path);
            await tasks[i].run(ctx);
          }
        } catch (error) {
          showConfigError("Error while scanning: " + error.message);
        }

        ctx.elapsedMs = performance.now() - ctx.startedAt;
        ctx.cancelled = cancelRequested;
        lastRun = ctx;
        displayRoot = commonRoot(Object.keys(ctx.fileCounts));

        running = false;
        cancelBtn.style.display = "none";
        searchBtn.disabled = false;
        // Scan finished: hide the progress bar and its status line entirely.
        progressEl.style.display = "none";

        renderSummary(ctx);
        renderScanNote(ctx, unsupportedArchives);
        renderHeatmap(ctx);
        renderTermFilter(ctx);
        renderResults();
      }

      // Turn the flat selection into scan tasks, expanding archives when the
      // browser supports the decompression APIs archives.js relies on.
      function buildTasks(items) {
        const tasks = [];
        let unsupportedArchives = 0;
        for (const { file, path } of items) {
          const kind = window.LogArchives ? LogArchives.archiveKind(path) : null;
          if (kind) {
            if (LogArchives.canExpand(path)) {
              tasks.push({
                path,
                archive: true,
                run: (ctx) =>
                  LogArchives.extract(file, path, makeArchiveSink(ctx), {
                    isCancelled: () => cancelRequested,
                  }),
              });
              continue;
            }
            unsupportedArchives++;
          }
          tasks.push({
            path,
            archive: false,
            run: (ctx) => scanFile(file, path, ctx),
          });
        }
        return { tasks, unsupportedArchives };
      }

      // Sink that streams each inner archive file through a LineScanner, so the
      // scanning/highlighting logic is identical to plain files.
      function makeArchiveSink(ctx) {
        return {
          open(name) {
            return {
              name,
              scanner: makeLineScanner(name, ctx),
              decoder: new TextDecoder("utf-8", { fatal: false }),
              done: false,
            };
          },
          chunk(handle, bytes) {
            if (handle.done) return false;
            ctx.bytesRead += bytes.length;
            const text = handle.decoder.decode(bytes, { stream: true });
            if (text) handle.scanner.pushText(text);
            if (handle.scanner.binary) {
              handle.done = true;
              return false; // tell the extractor to stop reading this entry
            }
            const now = performance.now();
            if (now - ctx.lastUi > 120) {
              ctx.lastUi = now;
              liveProgress(ctx, handle.name);
            }
            return true;
          },
          close(handle) {
            if (!handle.done) {
              const tail = handle.decoder.decode();
              if (tail) handle.scanner.pushText(tail);
            }
            handle.scanner.finish();
            ctx.filesScanned++;
            if (handle.scanner.binary) ctx.filesSkipped++;
          },
          skip(_name, _reason) {
            ctx.filesScanned++;
            ctx.filesSkipped++;
            ctx.unsupported++;
          },
          error(path, err) {
            ctx.filesScanned++;
            ctx.filesSkipped++;
            ctx.archiveErrors.push(
              `${path}: ${(err && err.message) || "could not be read"}`
            );
          },
        };
      }

      function renderScanNote(ctx, unsupportedArchives) {
        const parts = [];
        if (ctx.archiveErrors.length) {
          parts.push(
            `${ctx.archiveErrors.length} archive${ctx.archiveErrors.length === 1 ? "" : "s"} ` +
              `could not be read: ${ctx.archiveErrors.slice(0, 3).join("; ")}` +
              (ctx.archiveErrors.length > 3 ? "; ..." : ".")
          );
        }
        if (ctx.unsupported) {
          parts.push(
            `${ctx.unsupported.toLocaleString()} archived ` +
              `entr${ctx.unsupported === 1 ? "y was" : "ies were"} skipped ` +
              `(encrypted or unsupported compression).`
          );
        }
        if (unsupportedArchives) {
          parts.push(
            `${unsupportedArchives} archive${unsupportedArchives === 1 ? "" : "s"} ` +
              `could not be expanded in this browser and ` +
              `${unsupportedArchives === 1 ? "was" : "were"} skipped.`
          );
        }
        scanNote.textContent = parts.join(" ");
      }

      // Line-by-line scanner shared by plain files and archived entries. It
      // sniffs the first chunk for a NUL byte to skip binary content.
      function makeLineScanner(path, ctx) {
        const { combined, perTerm } = ctx.matchers;
        let buffer = "";
        let lineNo = 0;
        let sniffed = false;
        let binary = false;
        return {
          get binary() {
            return binary;
          },
          pushText(text) {
            if (binary || !text) return;
            if (!sniffed) {
              sniffed = true;
              // NUL byte in the head strongly implies binary content; skip it.
              if (text.slice(0, BINARY_SNIFF_BYTES).includes("\u0000")) {
                binary = true;
                return;
              }
            }
            // The leftover buffer never contains "\n", so the first search can
            // skip it. Keeps files with very long lines linear-time.
            const searchFrom = buffer.length;
            buffer += text;
            let nl = buffer.indexOf("\n", searchFrom);
            while (nl !== -1) {
              let line = buffer.slice(0, nl);
              buffer = buffer.slice(nl + 1);
              if (line.endsWith("\r")) line = line.slice(0, -1);
              lineNo++;
              ctx.totalLines++;
              testLine(line, lineNo, path, ctx, combined, perTerm);
              nl = buffer.indexOf("\n");
            }
          },
          finish() {
            if (binary || !buffer.length) return;
            if (buffer.endsWith("\r")) buffer = buffer.slice(0, -1);
            lineNo++;
            ctx.totalLines++;
            testLine(buffer, lineNo, path, ctx, combined, perTerm);
          },
        };
      }

      async function scanFile(fileObj, path, ctx) {
        let stream;
        try {
          stream = fileObj
            .stream()
            .pipeThrough(new TextDecoderStream("utf-8", { fatal: false }));
        } catch (error) {
          ctx.filesScanned++;
          ctx.filesSkipped++;
          return;
        }

        const reader = stream.getReader();
        const scanner = makeLineScanner(path, ctx);
        try {
          while (true) {
            if (cancelRequested) break;
            const { value, done } = await reader.read();
            if (done) break;
            ctx.bytesRead += value.length;
            scanner.pushText(value);
            if (scanner.binary) {
              try {
                await reader.cancel();
              } catch (e) {}
              break;
            }
            const now = performance.now();
            if (now - ctx.lastUi > 120) {
              ctx.lastUi = now;
              liveProgress(ctx, path);
            }
          }
          if (!cancelRequested) scanner.finish();
        } finally {
          try {
            reader.releaseLock();
          } catch (e) {}
        }

        ctx.filesScanned++;
        if (scanner.binary) ctx.filesSkipped++;
      }

      function testLine(line, lineNo, path, ctx, combined, perTerm) {
        if (!combined.test(line)) return;
        // Counts are the *true* totals across the whole scan so the heatmap,
        // term chips, and summary show the real picture. The results list keeps
        // match text only up to STORE_BUDGET of memory; if that fills, a filter
        // (or a heatmap file click) re-reads from disk to recover the rest.
        ctx.totalMatches++;
        ctx.fileCounts[path] = (ctx.fileCounts[path] || 0) + 1;
        for (const t of perTerm) {
          if (t.re.test(line)) {
            ctx.termCounts[t.term]++;
            // Remember which terms a file contains so a term-scoped re-scan can
            // skip files that can't possibly hold that term's matches.
            (ctx.fileTerms[path] || (ctx.fileTerms[path] = new Set())).add(
              t.term
            );
          }
        }
        if (ctx.storedBytes < STORE_BUDGET) {
          // Guard against pathologically long lines blowing up memory/DOM.
          const text = line.length > 4000 ? line.slice(0, 4000) + " ..." : line;
          ctx.matches.push({ path, lineNo, text });
          ctx.stored++;
          ctx.storedBytes += matchCost(text);
        }
      }

      function updateProgress(ctx, index, total, path) {
        progressBar.style.width = `${Math.round((index / total) * 100)}%`;
        progressText.textContent =
          `Scanning ${index + 1} / ${total}: ${path} ` +
          `-- ${ctx.totalMatches.toLocaleString()} matches`;
      }

      function liveProgress(ctx, path) {
        progressText.textContent =
          `Scanning: ${path} -- ` +
          `${ctx.totalMatches.toLocaleString()} matches, ` +
          `${ctx.totalLines.toLocaleString()} lines`;
      }

      function renderSummary(ctx) {
        const stats = [
          ["Matches", ctx.totalMatches],
          ["Files scanned", ctx.filesScanned],
          ["Files skipped", ctx.filesSkipped],
          ["Lines searched", ctx.totalLines],
          ["Time", `${(ctx.elapsedMs / 1000).toFixed(1)}s`],
        ];
        summaryEl.innerHTML = "";
        for (const [k, v] of stats) {
          const stat = document.createElement("div");
          stat.className = "stat";
          const n = document.createElement("div");
          n.className = "n";
          n.textContent = typeof v === "number" ? v.toLocaleString() : v;
          const label = document.createElement("div");
          label.className = "k";
          label.textContent = k;
          stat.append(n, label);
          summaryEl.appendChild(stat);
        }
        summaryEl.style.display = "flex";
      }

      const HEAT_LIMIT = 100; // max file rows drawn in the search heatmap
      // The browse list is the only way to open a file before searching, so it
      // shows many more rows than the search heatmap (which can be narrowed with
      // the results filter). Still capped to guard against a pathological drop
      // of tens of thousands of files.
      const BROWSE_LIMIT = 1000;

      function renderHeatmap(ctx) {
        heatmapEl.innerHTML = "";
        setBrowseFill(false);
        const entries = Object.keys(ctx.fileCounts)
          .map((path) => [path, ctx.fileCounts[path]])
          .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

        if (!entries.length) {
          heatmapEl.style.display = "none";
          return;
        }

        const shown = entries.slice(0, HEAT_LIMIT);

        const heading = document.createElement("h2");
        heading.textContent =
          `${entries.length.toLocaleString()} ` +
          `file${entries.length === 1 ? "" : "s"} with matches `;
        heatmapEl.appendChild(heading);

        const list = document.createElement("div");
        list.className = "heat-list";

        for (const [path, count] of shown) {
          const row = document.createElement("div");
          row.className = "heat-row" + (activeFile === path ? " active" : "");
          row.dataset.file = path;
          row.title =
            `${path} -- ${count.toLocaleString()} match${count === 1 ? "" : "es"} ` +
            `(${formatPercent(count, ctx.totalMatches)})`;

          const hp = document.createElement("div");
          hp.className = "hp";
          const inner = document.createElement("span");
          inner.innerHTML = formatPath(path);
          hp.appendChild(inner);

          const countEl = document.createElement("div");
          countEl.className = "heat-count";
          const countN = document.createElement("span");
          countN.className = "hc-n";
          countN.textContent = count.toLocaleString();
          const countP = document.createElement("span");
          countP.className = "hc-p";
          countP.textContent = `(${formatPercent(count, ctx.totalMatches)})`;
          countEl.append(countN, countP);

          row.append(hp, countEl);
          row.addEventListener("click", () => selectHeatFile(path));
          list.appendChild(row);
        }
        heatmapEl.appendChild(list);

        if (entries.length > shown.length) {
          const note = document.createElement("p");
          note.className = "heat-note";
          note.textContent =
            `Showing the top ${shown.length} files by hit count.`;
          heatmapEl.appendChild(note);
        }
        heatmapEl.style.display = "flex";
      }

      function syncHeatRows() {
        for (const row of heatmapEl.querySelectorAll(".heat-row")) {
          row.classList.toggle("active", (row.dataset.file || null) === activeFile);
        }
      }

      // In browse mode (a selection with openable files but no search yet) the
      // file list grows to fill the page; a search or empty selection turns it
      // back off so results lay out normally below the controls.
      function setBrowseFill(on) {
        topGrid.classList.toggle("browse-fill", on);
      }

      // Before any search is run, the heatmap doubles as a file browser so a
      // file can be opened without searching first. It lists the selected files
      // by size -- known instantly, without reading them -- and clicking a row
      // opens that file in the viewer with no search overlay. (Counting lines
      // would mean reading every file up front, which would defeat opening one
      // quickly, so size stands in for "how big is this file".)
      function renderBrowseHeatmap() {
        heatmapEl.innerHTML = "";
        if (!selected.length) {
          heatmapEl.style.display = "none";
          setBrowseFill(false);
          return;
        }

        // Only plain files can be opened directly; an archive's contents are
        // not known until a search expands it.
        const isArchive = (p) =>
          !!(window.LogArchives && LogArchives.archiveKind(p));
