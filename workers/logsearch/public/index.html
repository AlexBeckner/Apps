        if (!query) return null;
        try {
          return new RegExp(escapeRegex(query), "gi");
        } catch (error) {
          return null;
        }
      }

      // Append matches for newly sealed blocks [startBlock, end) to the active
      // matchLines using the current (find) highlight. Sealed blocks never
      // change, so scanning forward from findScannedBlocks is safe and cheap.
      function rescanFindFrom(data, startBlock) {
        const re = data.highlight;
        if (!re) return;
        const nb = data.blocks.length;
        for (let bi = startBlock; bi < nb; bi++) {
          const block = data.blocks[bi];
          for (let i = 0; i < block.count; i++) {
            const hits = countLineMatches(viewerBlockLine(block, i), re);
            if (hits) {
              const ln = block.first + i;
              for (let k = 0; k < hits; k++) data.matchLines.push(ln);
            }
          }
        }
        data.findScannedBlocks = nb;
      }

      // Focus the first find match at/after the current viewport top so the jump
      // feels local rather than yanking to the top of the file. A no-op once the
      // user has a valid match focused, so it can also "catch" the first match
      // as it streams in without stealing later manual navigation.
      function focusInitialFind() {
        const data = viewerData;
        if (!data || !data.findActive) return;
        const total = data.matchLines.length;
        if (!total) {
          viewerIdx = -1;
          updateViewerInfo();
          return;
        }
        if (viewerIdx >= 0 && viewerIdx < total) return;
        let idx = lowerBound(data.matchLines, currentViewerTopLine());
        if (idx >= total) idx = total - 1;
        setViewerMatch(idx, false);
      }

      // Apply (or clear) the find query in the box: retarget the viewer to it, or
      // fall back to the original search matches when the box is empty.
      function applyFind() {
        const data = viewerData;
        if (!data) return;
        const re = buildFindRegex(viewerFindInput.value);
        if (re) {
          data.findActive = true;
          data.highlight = re;
          data.matchLines = [];
          data.findScannedBlocks = 0;
          rescanFindFrom(data, 0);
          data.jumped = true; // don't let the open-line auto-jump fight the find
          viewerIdx = -1; // re-pick a focused match for the new query
          scheduleViewerRender();
          focusInitialFind();
        } else {
          data.findActive = false;
          data.highlight = data.baseHighlight;
          data.matchLines = data.baseMatchLines;
          data.findScannedBlocks = 0;
          // Re-seat the focused index onto the base matches nearest the current
          // view so the counter and Prev/Next stay sensible -- without scrolling
          // (the view stays where the find left it).
          const total = data.matchLines.length;
          if (!total) {
            viewerIdx = -1;
          } else {
            let idx = lowerBound(data.matchLines, currentViewerTopLine());
            if (idx >= total) idx = total - 1;
            viewerIdx = idx;
          }
          scheduleViewerRender();
          updateViewerInfo();
        }
        drawViewerMatchMap();
        updateViewerFindStatus();
      }

      function scheduleFind() {
        clearTimeout(viewerFindTimer);
        viewerFindTimer = window.setTimeout(() => {
          viewerFindTimer = 0;
          applyFind();
        }, 130);
      }

      function clearFind() {
        clearTimeout(viewerFindTimer);
        viewerFindTimer = 0;
        viewerFindInput.value = "";
        applyFind();
      }

      // Enter / Shift+Enter cycle through find matches (wrapping at the ends),
      // matching how a browser's find box behaves.
      function viewerFindStep(dir) {
        const total = viewerMatchCount();
        if (!total) return;
        let idx = viewerIdx + dir;
        if (idx < 0) idx = total - 1;
        else if (idx >= total) idx = 0;
        setViewerMatch(idx);
      }

      // The compact "n/total" (or "No results") badge beside the find box.
      function updateViewerFindStatus() {
        const data = viewerData;
        if (!data || !data.findActive) {
          viewerFindCount.textContent = "";
          viewerFindCount.classList.remove("empty");
          return;
        }
        const total = viewerMatchCount();
        if (!total) {
          viewerFindCount.textContent = "No results";
          viewerFindCount.classList.add("empty");
        } else {
          viewerFindCount.textContent = `${viewerIdx + 1}/${total.toLocaleString()}`;
          viewerFindCount.classList.remove("empty");
        }
      }

      // highlight defaults to the last search's matcher (results-row clicks);
      // browse-mode clicks pass null so the file opens with no search overlay.
      async function openViewer(path, lineNo, highlight) {
        if (highlight === undefined) {
          highlight =
            lastRun && lastRun.matchers ? lastRun.matchers.highlight : null;
        }
        const token = ++viewerToken;
        clearViewerObjectUrl();
        viewerMode = "text";
        viewer.classList.remove("media-mode", "image-mode", "video-mode");
        viewerImageElement = null;
        viewer.hidden = false;
        document.body.style.overflow = "hidden";
        viewerTitle.innerHTML = formatPath(path);
        viewerIdx = -1;
        showViewerEventStatus("");
        // Each file opens in its natural state (original-search highlights or
        // browse); any leftover find query from the previous file is cleared.
        viewerFindInput.value = "";
        viewerFindCount.textContent = "";
        viewerFindCount.classList.remove("empty");

        // Build the virtualized DOM: a tall spacer that owns the scrollbar plus a
        // small window holding only the rows near the viewport. Apply the
        // persisted zoom + wrap preferences first so the measured row height
        // reflects the current font.
        viewerBody.style.fontSize = viewerFontPx + "px";
        viewerBody.classList.toggle("wrap", viewerWrap);
        const rowH = measureViewerRowHeight();
        viewerBody.style.setProperty("--vrh", rowH + "px");
        viewerBody.scrollTop = 0;
        viewerBody.scrollLeft = 0;
        viewerBody.innerHTML = "";
        viewerSpacer = document.createElement("div");
        viewerSpacer.className = "v-spacer";
        viewerWindow = document.createElement("div");
        viewerWindow.className = "v-window";
        viewerWindow.innerHTML =
          '<div class="v-line"><span class="v-tx">Loading...</span></div>';
        viewerBody.append(viewerSpacer, viewerWindow);

        const data = newViewerData(path, lineNo, highlight);
        data.rowH = rowH;
        viewerData = data;

        // Reset the custom scrollbar for the new file (empty match map, no thumb
        // or cursor until the first render/stream).
        viewerScrollDragging = false;
        viewerScroll.classList.remove("dragging");
        viewerScroll.hidden = false;
        viewerScrollThumb.hidden = true;
        viewerScrollCursor.hidden = true;
        drawViewerMatchMap();

        // Sync the zoom/wrap controls with the persisted state.
        updateViewerZoomLabel();
        viewerWrapBtn.textContent = viewerWrap ? "Wrap: On" : "Wrap: Off";
        viewerWrapBtn.setAttribute("aria-pressed", viewerWrap ? "true" : "false");

        updateViewerInfo();
        viewerBody.focus();

        const source = findSource(path);
        if (!source) {
          viewerData = null;
          viewerMessage(
            "Could not locate this file to open. Re-select the folder or " +
              "archive and search again."
          );
          updateViewerInfo();
          return;
        }

        const media = mediaInfoForSource(path, source);
        if (media) {
          await openMediaViewer(path, source, media, token);
          return;
        }

        let ok = false;
        try {
          ok = await streamSourceLines(source, {
            shouldStop: () => token !== viewerToken,
            onBytes(read, totalHint) {
              data.progressPct = totalHint
                ? Math.min(100, Math.round((read / totalHint) * 100))
                : null;
              const now = performance.now();
              if (now - data.lastUi > 100) {
                data.lastUi = now;
                if (!data.jumped) tryViewerAutoJump(data);
                // A find applied mid-load only saw the blocks sealed so far;
                // fold in any newly sealed ones (and catch the first match if it
                // only just streamed in) before we repaint.
                if (data.findActive) {
                  rescanFindFrom(data, data.findScannedBlocks);
                  focusInitialFind();
                }
                scheduleViewerRender();
                drawViewerMatchMap();
                updateViewerInfo();
              }
            },
            onLine(line, ln) {
              data.lineCount = ln;
              // Always track the original-search matches so an in-file find can
              // be cleared back to them; the find uses its own scan (rescanFindFrom).
              const hits = countLineMatches(line, data.baseHighlight);
              for (let i = 0; i < hits; i++) data.baseMatchLines.push(ln);
              data.pending.push(line);
              if (data.pending.length === VIEWER_BLOCK_LINES) {
                sealViewerBlock(data);
              }
            },
          });
        } catch (error) {
          ok = false;
        }

        // Bail if the viewer was closed or another file opened while loading.
        if (token !== viewerToken) return;
        if (!ok && !data.lineCount) {
          viewerData = null;
          viewerMessage("Could not read this file.");
          updateViewerInfo();
          return;
        }

        sealViewerBlock(data);
        data.loaded = true;
        if (data.findActive) {
          rescanFindFrom(data, data.findScannedBlocks);
          focusInitialFind();
        }
        if (!data.lineCount) {
          viewerMessage("(empty file)");
          viewerSpacer = null;
          viewerWindow = null;
          updateViewerScrollbar();
          drawViewerMatchMap();
          updateViewerInfo();
          return;
        }
        tryViewerAutoJump(data);
        scheduleViewerRender();
        drawViewerMatchMap();
        updateViewerInfo();
      }

      function updateViewerInfo() {
        const data = viewerData;
        updateViewerFindStatus();
        const total = viewerMatchCount();
        // Browse mode (opened without a search): no matches to step through, so
        // show the line count and keep the match-nav buttons disabled.
        if (data && !data.highlight) {
          const lines = data.lineCount || 0;
          viewerMinfo.textContent = !data.loaded
            ? `Loading${data.progressPct != null ? ` ${data.progressPct}%` : ""}...`
            : `${lines.toLocaleString()} line${lines === 1 ? "" : "s"}`;
          viewerFirst.disabled = true;
          viewerPrev.disabled = true;
          viewerNext.disabled = true;
          viewerLast.disabled = true;
          return;
        }
        if (data && !data.loaded) {
          const pct = data.progressPct;
          viewerMinfo.textContent =
            (viewerIdx >= 0 ? `Match ${viewerIdx + 1} / ` : "") +
            `${total.toLocaleString()} match${total === 1 ? "" : "es"}` +
            ` -- loading${pct != null ? ` ${pct}%` : ""}...`;
        } else {
          viewerMinfo.textContent = total
            ? `Match ${viewerIdx + 1} / ${total.toLocaleString()}`
            : "No matches";
        }
        const has = total > 0;
        viewerFirst.disabled = !has || viewerIdx <= 0;
        viewerPrev.disabled = !has || viewerIdx <= 0;
        viewerNext.disabled = !has || viewerIdx >= total - 1;
        viewerLast.disabled = !has || viewerIdx >= total - 1;
      }

      function closeViewer() {
        viewerToken++; // stops any in-flight streamed load
        showViewerEventStatus("");
        clearViewerObjectUrl();
        viewer.hidden = true;
        viewerMode = "text";
        viewer.classList.remove("media-mode", "image-mode", "video-mode");
        viewerImageElement = null;
        viewerData = null;
        viewerFindInput.value = "";
        viewerFindCount.textContent = "";
        viewerFindCount.classList.remove("empty");
        if (viewerFindTimer) {
          clearTimeout(viewerFindTimer);
          viewerFindTimer = 0;
        }
        if (viewerRaf) {
          cancelAnimationFrame(viewerRaf);
          viewerRaf = 0;
        }
        viewerBody.innerHTML = "";
        viewerSpacer = null;
        viewerWindow = null;
        viewerIdx = -1;
        viewerScrollDragging = false;
        viewerScroll.classList.remove("dragging");
        viewerScroll.hidden = true;
        viewerScrollThumb.hidden = true;
        viewerScrollCursor.hidden = true;
        viewerMinfo.textContent = "";
        drawViewerMatchMap();
        document.body.style.overflow = "";
      }

      function showConfigError(message) {
        configError.textContent = message || "";
      }

      function escapeRegex(value) {
        return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (c) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        }[c]));
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        const units = ["KB", "MB", "GB", "TB"];
        let value = bytes / 1024;
        let unit = 0;
        while (value >= 1024 && unit < units.length - 1) {
          value /= 1024;
          unit++;
        }
        return `${value.toFixed(value >= 10 ? 0 : 1)} ${units[unit]}`;
      }

      function formatMediaDuration(seconds) {
        const total = Math.max(0, Math.round(seconds));
        const hours = Math.floor(total / 3600);
        const minutes = Math.floor((total % 3600) / 60);
        const secs = total % 60;
        return hours
          ? `${hours}:${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`
          : `${minutes}:${String(secs).padStart(2, "0")}`;
      }

      function debounce(callback, waitMs) {
        let timeoutId;
        return (...args) => {
          window.clearTimeout(timeoutId);
          timeoutId = window.setTimeout(() => callback(...args), waitMs);
        };
      }

      if (!("TextDecoderStream" in window)) {
        showConfigError(
          "This browser lacks TextDecoderStream. Use a recent Chrome, Edge, or Safari."
        );
        searchBtn.disabled = true;
      } else if (!archivesSupported) {
        // Folder scanning still works; only automatic archive expansion needs
        // the DecompressionStream API (Chrome 103+, Firefox 113+, Safari 16.4+).
        scanNote.textContent =
          "Note: automatic archive expansion (.zip/.tar/.gz) needs a newer " +
          "browser; plain folders still work here.";
      }
    </script>
  </body>
</html>
