        const plain = selected.filter((s) => !isArchive(s.path));
        const archiveCount = selected.length - plain.length;

        // Show paths relative to the shared root, matching the search view.
        displayRoot = commonRoot(selected.map((s) => s.path));

        const entries = plain
          .map((s) => [s.path, s.file.size])
          .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

        const heading = document.createElement("h2");
        heading.textContent = entries.length
          ? `${entries.length.toLocaleString()} ` +
            `file${entries.length === 1 ? "" : "s"}`
          : "No directly openable files";
        heatmapEl.appendChild(heading);

        if (entries.length) {
          const shown = entries.slice(0, BROWSE_LIMIT);

          const list = document.createElement("div");
          list.className = "heat-list";
          for (const [path, size] of shown) {
            const row = document.createElement("div");
            row.className = "heat-row browse";
            row.dataset.file = path;
            row.title = `${path} -- ${formatBytes(size)}`;

            const hp = document.createElement("div");
            hp.className = "hp";
            const inner = document.createElement("span");
            inner.innerHTML = formatPath(path);
            hp.appendChild(inner);

            const countEl = document.createElement("div");
            countEl.className = "heat-count";
            countEl.textContent = formatBytes(size);

            row.append(hp, countEl);
            row.addEventListener("click", () => openViewer(path, 1, null));
            list.appendChild(row);
          }
          heatmapEl.appendChild(list);

          if (entries.length > shown.length) {
            const note = document.createElement("p");
            note.className = "heat-note";
            note.textContent =
              `Showing the ${shown.length.toLocaleString()} largest of ` +
              `${entries.length.toLocaleString()} files.`;
            heatmapEl.appendChild(note);
          }
        }

        if (archiveCount) {
          const note = document.createElement("p");
          note.className = "heat-note";
          note.textContent =
            `${archiveCount.toLocaleString()} ` +
            `archive${archiveCount === 1 ? "" : "s"} will be expanded when you ` +
            `search.`;
          heatmapEl.appendChild(note);
        }

        heatmapEl.style.display = "flex";
        // Fill the page only when there is an actual file list to browse (an
        // archive-only selection shows just a note, so leave it compact).
        setBrowseFill(entries.length > 0);
      }

      // Reset everything a previous search left on screen so a fresh selection
      // starts clean (in browse mode). Leaves the heatmap alone -- the caller
      // repaints it as either the browse list or search results.
      function clearSearchState() {
        lastRun = null;
        activeTerm = null;
        activeFile = null;
        activeFileMatches = null;
        activeFileCapped = false;
        currentPage = 0;
        fileScanToken++;
        globalScan = null;
        invalidateGlobalScan();
        summaryEl.style.display = "none";
        summaryEl.innerHTML = "";
        termFilterEl.innerHTML = "";
        resultsHead.style.display = "none";
        resultsTable.style.display = "none";
        resultsBody.innerHTML = "";
        resultsNote.innerHTML = "";
        scanNote.textContent = "";
        pagerTop.style.display = "none";
        pagerBottom.style.display = "none";
        pagerTop.innerHTML = "";
        pagerBottom.innerHTML = "";
      }

      function scrollToResults() {
        if (resultsHead.style.display !== "none") {
          resultsHead.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
      }

      // Clicking a heatmap file filters the results to it. If the scan filled
      // the memory budget, this file's rows may be missing from the in-memory
      // store, so re-read just this one file to recover all of them.
      async function selectHeatFile(path) {
        const turningOff = activeFile === path;
        activeFile = turningOff ? null : path;
        activeFileMatches = null;
        activeFileCapped = false;
        currentPage = 0;
        fileScanToken++;
        invalidateGlobalScan();
        syncHeatRows();

        if (!activeFile) {
          renderResults();
          return;
        }

        // Fast path: nothing was dropped, so the store already has every match.
        if (!lastRun || lastRun.totalMatches <= lastRun.stored) {
          renderResults();
          scrollToResults();
          return;
        }

        const token = fileScanToken;
        const expected = (lastRun.fileCounts[path] || 0).toLocaleString();
        resultsHead.style.display = "none";
        resultsTable.style.display = "none";
        resultsBody.innerHTML = "";
        resultsNote.textContent =
          `Loading all ${expected} matches in "${stripRoot(path)}"...`;

        let rescanned = null;
        try {
          rescanned = await rescanFileMatches(path);
        } catch (e) {
          rescanned = null;
        }
        // Bail if the user switched files (or cleared) while we were reading.
        if (token !== fileScanToken || activeFile !== path) return;

        if (rescanned) {
          activeFileMatches = rescanned.matches;
          activeFileCapped = rescanned.capped;
        }
        renderResults();
        scrollToResults();
      }

      // Re-read one file (from disk or its archive) and collect every matching
      // line, streaming so the whole file is never held in memory. Capped per
      // file to keep memory bounded; reading stops as soon as the cap is hit.
      async function rescanFileMatches(path) {
        const source = findSource(path);
        if (!source) return null;

        const token = fileScanToken;
        const combined = lastRun.matchers.combined;
        const matches = [];
        let bytes = 0;
        let capped = false;
        const ok = await streamSourceLines(source, {
          shouldStop: () => capped || token !== fileScanToken,
          onLine(line, lineNo) {
            if (capped || !combined.test(line)) return;
            if (bytes >= STORE_BUDGET) {
              capped = true;
              return;
            }
            const text =
              line.length > 4000 ? line.slice(0, 4000) + " ..." : line;
            bytes += matchCost(text);
            matches.push({ path, lineNo, text });
          },
        });
        if (!ok && !capped) return null;
        return { matches, capped };
      }

      // Each heatmap row shows its raw count and its share of all matches.
      function formatPercent(part, total) {
        if (!total) return "0%";
        const pct = (part / total) * 100;
        if (pct >= 10) return `${pct.toFixed(0)}%`;
        if (pct >= 0.1) return `${pct.toFixed(1)}%`;
        return pct > 0 ? "<0.1%" : "0%";
      }

      function renderTermFilter(ctx) {
        termFilterEl.innerHTML = "";
        const terms = Object.keys(ctx.termCounts);
        if (terms.length <= 1 && !ctx.totalMatches) return;

        const all = document.createElement("span");
        all.className = "chip" + (activeTerm === null ? " active" : "");
        all.textContent = `All (${ctx.totalMatches.toLocaleString()})`;
        all.addEventListener("click", () => {
          activeTerm = null;
          currentPage = 0;
          invalidateGlobalScan();
          syncTermChips();
          renderResults();
        });
        termFilterEl.appendChild(all);

        for (const term of terms) {
          const chip = document.createElement("span");
          chip.className = "chip" + (activeTerm === term ? " active" : "");
          chip.dataset.term = term;
          chip.textContent = `${term} (${ctx.termCounts[term].toLocaleString()})`;
          chip.addEventListener("click", () => {
            activeTerm = activeTerm === term ? null : term;
            currentPage = 0;
            invalidateGlobalScan();
            syncTermChips();
            renderResults();
          });
          termFilterEl.appendChild(chip);
        }
      }

      function syncTermChips() {
        for (const chip of termFilterEl.children) {
          const term = chip.dataset.term || null;
          chip.classList.toggle("active", term === activeTerm);
        }
      }

      function activeTermRegex() {
        if (!activeTerm) return null;
        const flags = caseInput.checked ? "" : "i";
        const src = regexInput.checked ? activeTerm : escapeRegex(activeTerm);
        try {
          return new RegExp(src, flags);
        } catch (e) {
          return null;
        }
      }

      // True when the scan found more matches than the in-memory store could
      // hold, so the results list is only a prefix of every match.
      function storeCapped() {
        return !!lastRun && lastRun.totalMatches > lastRun.stored;
      }

      // Identifies a global re-scan by the filter it was run for, so a cached
      // result is reused only while the term/text filter is unchanged.
      function globalScanKey() {
        return (activeTerm || "") + "\u0000" + filterInput.value.trim();
      }

      // A term chip or free-text filter can only see the matches kept in the
      // capped store. When the scan overflowed it, the active filter needs a
      // fresh disk re-scan to be complete. (A selected heatmap file already gets
      // its own full re-read, so it never needs this.)
      function needsGlobalRescan() {
        return (
          !activeFile &&
          storeCapped() &&
          !!(activeTerm || filterInput.value.trim())
        );
      }

      function invalidateGlobalScan() {
        globalScanToken++;
        globalScanLoading = false;
      }

      function searchAllButtonHtml() {
        const q = activeTerm || filterInput.value.trim();
        const label = q
          ? `Search all files for "${escapeHtml(q)}"`
          : "Search all files";
        return `<button type="button" id="search-all" class="search-all-btn">${label}</button>`;
      }

      // Re-read every matched file from disk (streaming) and collect the lines
      // that pass the active term/text filter, so a capped store no longer hides
      // matches. When a term chip is active the read is scoped to just the files
      // known to contain that term; the read is cancelled if the filter changes.
      async function runGlobalRescan() {
        if (!lastRun || !needsGlobalRescan()) return;
        const key = globalScanKey();
        if (globalScan && globalScan.key === key) {
          renderResults();
          return;
        }
        const token = ++globalScanToken;
        globalScanLoading = true;

        const combined = lastRun.matchers.combined;
        const termRe = activeTermRegex();
        const filterText = filterInput.value.trim().toLowerCase();
        const paths =
          activeTerm && lastRun.fileTerms
            ? Object.keys(lastRun.fileCounts).filter(
                (p) =>
                  lastRun.fileTerms[p] && lastRun.fileTerms[p].has(activeTerm)
              )
            : Object.keys(lastRun.fileCounts);

        const matches = [];
        let bytes = 0;
        let capped = false;
        resultsNote.textContent = `Searching all files... 0 / ${paths.length}`;
        for (let i = 0; i < paths.length; i++) {
          if (token !== globalScanToken) return; // superseded by a newer filter
          if (capped) break;
          const path = paths[i];
          const source = findSource(path);
          if (source) {
            await streamSourceLines(source, {
              shouldStop: () => capped || token !== globalScanToken,
              onLine(line, lineNo) {
                if (capped || !combined.test(line)) return;
                if (termRe && !termRe.test(line)) return;
                if (
                  filterText &&
                  !line.toLowerCase().includes(filterText) &&
                  !path.toLowerCase().includes(filterText)
                ) {
                  return;
                }
                if (bytes >= STORE_BUDGET) {
                  capped = true;
                  return;
                }
                const text =
                  line.length > 4000 ? line.slice(0, 4000) + " ..." : line;
                bytes += matchCost(text);
                matches.push({ path, lineNo, text });
              },
            });
          }
          if (token !== globalScanToken) return;
          resultsNote.textContent =
            `Searching all files... ${i + 1} / ${paths.length} scanned, ` +
            `${matches.length.toLocaleString()} found`;
        }
        if (token !== globalScanToken) return;
        globalScan = { key, matches, capped };
        globalScanLoading = false;
        currentPage = 0;
        renderResults();
        scrollToResults();
      }

      // The active match set: a heatmap file's fully re-read matches when one is
      // selected, a completed global re-scan when the capped store was searched
      // for the current filter, otherwise the global (capped) store.
      function currentSource() {
        if (activeFile && activeFileMatches) {
          return { mode: "file", matches: activeFileMatches };
        }
        if (!activeFile && globalScan && globalScan.key === globalScanKey()) {
          return { mode: "scan", matches: globalScan.matches };
        }
        return { mode: "store", matches: lastRun.matches };
      }

      // Predicate for the term chip + free-text filters over the active set.
      function currentPredicate(usingFileSet) {
        const filterText = filterInput.value.trim().toLowerCase();
        const termRe = activeTermRegex();
        return (m) => {
          // currentSource already scopes to the file when a re-read set is in
          // use; only the shared global store needs the explicit path check.
          if (activeFile && !usingFileSet && m.path !== activeFile) return false;
          if (termRe && !termRe.test(m.text)) return false;
          if (
            filterText &&
            !m.text.toLowerCase().includes(filterText) &&
            !m.path.toLowerCase().includes(filterText)
          ) {
            return false;
          }
          return true;
        };
      }

      function renderResults() {
        if (!lastRun) return;
        const { mode, matches: source } = currentSource();
        const usingFileSet = mode === "file";
        const passes = currentPredicate(usingFileSet);

        // Collect every match that passes the current filters, then show one
        // page of PAGE_SIZE matches at a time. This keeps the whole result set
        // reachable while never putting more than a page of rows in the DOM.
        const filtered = [];
        for (const m of source) {
          if (passes(m)) filtered.push(m);
        }

        const pageCount = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
        currentPage = Math.min(Math.max(0, currentPage), pageCount - 1);
        const start = currentPage * PAGE_SIZE;
        const end = Math.min(start + PAGE_SIZE, filtered.length);
        const pageMatches = filtered.slice(start, end);

        // Group this page's matches by file (in the order files are first
        // seen) so the list shows one header row per file with its lines
        // beneath.
        const groups = new Map(); // path -> matches[]
        for (const m of pageMatches) {
          let group = groups.get(m.path);
          if (!group) {
            group = [];
            groups.set(m.path, group);
          }
          group.push(m);
        }

        resultsBody.innerHTML = "";
        const frag = document.createDocumentFragment();
        const highlight = lastRun.matchers.highlight;
        for (const [path, group] of groups) {
          // A clickable header row per file (opens the file at its first match),
          // followed by a row for each matching line in the file.
          const headTr = document.createElement("tr");
          headTr.className = "file-row";
          headTr.dataset.path = path;
          headTr.dataset.line = group[0].lineNo;
          headTr.title = "Click to open this file with matches highlighted";

          const headTd = document.createElement("td");
          headTd.className = "file-head";
          headTd.colSpan = 2;
          const count = group.length;
          headTd.innerHTML =
            `<div class="fh-inner">` +
            `<span class="fh-path">${formatPath(path)}</span>` +
            `<span class="fcount">${count.toLocaleString()} ` +
            `match${count === 1 ? "" : "es"}</span>` +
            `</div>`;
          headTr.appendChild(headTd);
          frag.appendChild(headTr);

          for (const m of group) {
            const tr = document.createElement("tr");
            tr.className = "res-row";
            tr.dataset.path = m.path;
            tr.dataset.line = m.lineNo;
            tr.title = "Click to open this file with matches highlighted";

            const lineTd = document.createElement("td");
            lineTd.className = "line";
            lineTd.textContent = m.lineNo;

            const textTd = document.createElement("td");
            textTd.className = "text";
            textTd.innerHTML = highlightText(m.text, highlight);

            tr.append(lineTd, textTd);
            frag.appendChild(tr);
          }
        }
        resultsBody.appendChild(frag);

        resultsTable.style.display = pageMatches.length ? "table" : "none";
        resultsHead.style.display = lastRun.matches.length ? "flex" : "none";
        renderPagination(filtered.length, pageCount, start, end);

        if (!lastRun.totalMatches) {
          resultsNote.textContent = "No matches found.";
          return;
        }

        // Note parts may include a "Search all files" button, so they are HTML.

        if (mode === "file") {
          // This file's lines were re-read from disk in full.
          if (activeFileCapped) {
            parts.push(
              `This file has too many matches to hold in memory at once; ` +
                `filter or download the CSV to narrow them.`
            );
          }
        } else if (mode === "scan") {
          // The capped store was re-scanned from disk for this filter, so the
          // list below is now complete (up to the store cap).
          parts.push(
            `Searched all files: ${filtered.length.toLocaleString()} ` +
              `match${filtered.length === 1 ? "" : "es"} for this filter.`
          );
          if (globalScan && globalScan.capped) {
            parts.push(
              `Stopped after filling the memory budget; ` +
                `narrow the filter to see them all.`
            );
          }
        } else if (activeFile) {
          // A file is selected but we fell back to the in-memory store (its
          // re-read was unavailable), so some of its lines may be missing.
          if (storeCapped()) {
            parts.push(
              "Showing only the matches kept in memory for this file; a re-read " +
                "was unavailable, so some may be missing."
            );
          }
        } else if (needsGlobalRescan()) {
          // The active filter has only searched the capped in-memory store, so
          // matches dropped past the cap are missing. Offer a full disk re-scan.
          if (globalScanLoading) {
            parts.push("Searching all files...");
          } else {
            if (activeTerm) {
              const known = lastRun.termCounts[activeTerm] || 0;
              parts.push(
                `Showing ${filtered.length.toLocaleString()} of ` +
                  `${known.toLocaleString()} "${escapeHtml(activeTerm)}" ` +
                  `match${known === 1 ? "" : "es"} kept in memory.`
              );
            } else {
              parts.push(
                `The results list holds only the first ` +
                  `${lastRun.stored.toLocaleString()} of ` +
                  `${lastRun.totalMatches.toLocaleString()} matches, so this ` +
                  `filter searched just those.`
              );
            }
            parts.push(searchAllButtonHtml());
          }
        } else if (!activeFile && storeCapped()) {
          // No filter yet, but the store is capped -- tell the user the list is
          // a prefix and how to reach the rest.
          parts.push(
            `Showing the first ${lastRun.stored.toLocaleString()} of ` +
              `${lastRun.totalMatches.toLocaleString()} matches kept in memory. ` +
              `Pick a term, type a filter, or click a file to search them all.`
          );
        }
        resultsNote.innerHTML = parts.join(" ");
      }

      // Draw the Prev / Next controls in the results-head row (with the filter
      // and Download CSV) and again below the table. Always shown when there is
      // at least one match; on a single page both buttons are just disabled.
      function renderPagination(total, pageCount, start, end) {
        if (total <= 0) {
          pagerTop.style.display = "none";
          pagerBottom.style.display = "none";
          pagerTop.innerHTML = "";
          pagerBottom.innerHTML = "";
          return;
        }
        const info =
          `Page ${(currentPage + 1).toLocaleString()} of ` +
          `${pageCount.toLocaleString()} \u00b7 matches ` +
          `${(start + 1).toLocaleString()}\u2013${end.toLocaleString()} of ` +
          `${total.toLocaleString()}`;
        const prevDis = currentPage <= 0 ? " disabled" : "";
        const nextDis = currentPage >= pageCount - 1 ? " disabled" : "";
        const html =
          `<button type="button" data-page="prev"${prevDis}>&larr; Prev</button>` +
          `<span class="page-info">${info}</span>` +
          `<button type="button" data-page="next"${nextDis}>Next &rarr;</button>`;
        pagerTop.innerHTML = html;
        pagerBottom.innerHTML = html;
        pagerTop.style.display = "flex";
        pagerBottom.style.display = "flex";
      }

      function onPagerClick(event) {
        const btn = event.target.closest("button[data-page]");
        if (!btn || btn.disabled) return;
        gotoPage(currentPage + (btn.dataset.page === "next" ? 1 : -1));
      }

      function gotoPage(page) {
        currentPage = page;
        renderResults();
        // Land at the top of the results so a new page starts from its first
        // row rather than wherever the previous page was scrolled to.
        resultsHead.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function highlightText(text, highlightRe) {
        // Browse mode opens files without a search, so there is nothing to
        // highlight -- just escape and return the raw line.
        if (!highlightRe) return escapeHtml(text);
        highlightRe.lastIndex = 0;
        let result = "";
        let last = 0;
        let match;
        let guard = 0;
        while ((match = highlightRe.exec(text)) !== null) {
          if (match.index >= last) {
            result += escapeHtml(text.slice(last, match.index));
            result += "<mark>" + escapeHtml(match[0]) + "</mark>";
            last = match.index + match[0].length;
          }
          // Avoid infinite loop on zero-width matches.
          if (match.index === highlightRe.lastIndex) highlightRe.lastIndex++;
          if (++guard > 5000) break;
        }
        result += escapeHtml(text.slice(last));
        return result;
      }

      function formatPath(path) {
        const shown = stripRoot(path);
        const idx = shown.lastIndexOf("/");
        if (idx === -1) return `<span class="base">${escapeHtml(shown)}</span>`;
        const dir = shown.slice(0, idx + 1);
        const base = shown.slice(idx + 1);
        return (
          escapeHtml(dir) + `<span class="base">${escapeHtml(base)}</span>`
        );
      }

      // The directory prefix shared by every matched file is noise on each row,
      // so we hide it and show only the part below it. Stripping the whole common
      // prefix (never a file's own basename) lets a plain folder and an archive of
      // that same folder read identically: the archive's filename and the single
      // root folder inside it both fall away, just like a selected folder's name.
      function commonRoot(paths) {
        if (!paths.length) return "";
        const prefix = paths[0].split("/");
        // Never strip a file's own basename, so cap the prefix one segment short
        // of the shallowest path.
        let common = prefix.length - 1;
        for (const p of paths) {
          const segs = p.split("/");
          common = Math.min(common, segs.length - 1);
          let i = 0;
          while (i < common && segs[i] === prefix[i]) i++;
          common = i;
          if (common <= 0) return "";
        }
        return prefix.slice(0, common).join("/");
      }

      function stripRoot(path) {
        if (displayRoot && path.startsWith(displayRoot + "/")) {
          return path.slice(displayRoot.length + 1);
        }
        return path;
      }

      function downloadCsv() {
        if (!lastRun) return;
        // Export exactly what the current filters show (file, term, free text),
        // including a heatmap file's fully re-read matches or a global re-scan.
        const { mode, matches: source } = currentSource();
        const passes = currentPredicate(mode === "file");
        const rows = [["file", "line", "text"]];
        for (const m of source) {
          if (passes(m)) rows.push([m.path, String(m.lineNo), m.text]);
        }
        if (rows.length === 1) return;
        const csv = rows
          .map((r) => r.map(csvCell).join(","))
          .join("\r\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "logsearch-results.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function csvCell(value) {
        const needsQuotes = /[",\r\n]/.test(value);
        const escaped = value.replace(/"/g, '""');
        return needsQuotes ? `"${escaped}"` : escaped;
      }

      // ---- file viewer -------------------------------------------------------

      // Map a result path back to the selected source that can produce its bytes.
      // Plain files match directly; archived entries are prefixed with their
      // archive's path (except single .gz files, whose entry drops the suffix).
      function findSource(path) {
        for (const item of selected) {
          const kind = window.LogArchives
            ? LogArchives.archiveKind(item.path)
            : null;
          if (!kind && item.path === path) {
            return { kind: "file", file: item.file };
          }
        }
        for (const item of selected) {
          const kind = window.LogArchives
            ? LogArchives.archiveKind(item.path)
            : null;
          if (!kind) continue;
          if (kind === "gzip") {
            const inner = item.path.replace(/\.(gz|gzip)$/i, "") || item.path;
            if (path === inner) {
              return {
                kind: "archive",
                file: item.file,
                archivePath: item.path,
                innerPath: inner,
              };
            }
          } else if (path.startsWith(item.path + "/")) {
            return {
              kind: "archive",
              file: item.file,
              archivePath: item.path,
              innerPath: path,
            };
          }
        }
        return null;
      }

      function mediaInfoForSource(path, source) {
        const declared =
          source.kind === "file" && source.file && source.file.type
            ? source.file.type.split(";")[0].trim().toLowerCase()
            : "";
        let mime =
          declared.startsWith("image/") || declared.startsWith("video/")
            ? declared
            : "";
        if (!mime) {
          const name = path.split("/").pop() || "";
          const dot = name.lastIndexOf(".");
          const extension = dot >= 0 ? name.slice(dot + 1).toLowerCase() : "";
          mime = MEDIA_MIME_BY_EXTENSION[extension] || "";
        }
        if (mime.startsWith("image/")) return { kind: "image", mime };
        if (mime.startsWith("video/")) return { kind: "video", mime };
        return null;
      }

      function clearViewerObjectUrl() {
        if (!viewerObjectUrl) return;
        URL.revokeObjectURL(viewerObjectUrl);
        viewerObjectUrl = null;
      }

      // Plain files can be handed to the browser without copying. An archived
      // media entry must be assembled into a Blob first because native <img> and
      // <video> elements need a random-access URL rather than a chunk callback.
      async function mediaBlobForSource(source, media, token, onProgress) {
        if (source.kind === "file") {
          const declared = (source.file.type || "").toLowerCase();
          return declared === media.mime
            ? source.file
            : source.file.slice(0, source.file.size, media.mime);
        }

        const chunks = [];
        let found = false;
        let failed = false;
        let read = 0;
        let total = 0;
        const cancelled = () => token !== viewerToken;
        const sink = {
          open(name, sizeHint) {
            if (found || name !== source.innerPath) return null;
            found = true;
            total = Number(sizeHint) || 0;
            return {};
          },
          chunk(_handle, bytes) {
            if (cancelled()) return false;
            // Archive readers may reuse their input buffer, so retain a copy.
            chunks.push(bytes.slice());
            read += bytes.length;
            if (onProgress) onProgress(read, total);
            return true;
          },
          close() {},
          skip() {
            failed = true;
          },
          error() {
            failed = true;
          },
        };
        try {
          await LogArchives.extractEntry(
            source.file,
            source.archivePath,
            source.innerPath,
            sink,
            { isCancelled: cancelled }
          );
        } catch (error) {
          failed = true;
        }
        if (cancelled() || !found || failed) return null;
        return new Blob(chunks, { type: media.mime });
      }

      // Split streamed text into lines with the same semantics as
      // String.split("\n"): every "\n" ends a line, a trailing newline yields a
      // final empty line, and a lone "\r" before the newline is stripped.
      function lineEmitter(onLine) {
        let buffer = "";
        let lineNo = 0;
        return {
          push(text) {
            // The leftover buffer never contains "\n", so the search can skip
            // it. Keeps very long lines (rare, but huge) linear-time.
            const searchFrom = buffer.length;
            buffer += text;
            let nl = buffer.indexOf("\n", searchFrom);
            while (nl !== -1) {
              let line = buffer.slice(0, nl);
              buffer = buffer.slice(nl + 1);
              if (line.endsWith("\r")) line = line.slice(0, -1);
              onLine(line, ++lineNo);
              nl = buffer.indexOf("\n");
            }
          },
          finish() {
            // A trailing "\n" leaves an empty buffer; emitting it would invent a
            // phantom last line and disagree with the search's line numbering.
            if (!buffer.length) return;
            let line = buffer;
            buffer = "";
            if (line.endsWith("\r")) line = line.slice(0, -1);
            onLine(line, ++lineNo);
          },
        };
      }

      // Stream a findSource() result line-by-line without ever buffering the
      // whole file. Used by the viewer and the heatmap re-read. Returns true
      // when the source was fully streamed, false if it was cancelled via
      // shouldStop() or could not be found/read.
      async function streamSourceLines(source, handlers) {
        const emitter = lineEmitter(handlers.onLine);
        const decoder = new TextDecoder("utf-8", { fatal: false });
        const stopped = () => !!(handlers.shouldStop && handlers.shouldStop());

        if (source.kind === "file") {
          let reader;
          try {
            reader = source.file.stream().getReader();
          } catch (error) {
            return false;
          }
          let read = 0;
          try {
            while (true) {
              if (stopped()) {
                try {
                  await reader.cancel();
                } catch (e) {}
                return false;
              }
              const { value, done } = await reader.read();
              if (done) break;
              read += value.byteLength;
              const text = decoder.decode(value, { stream: true });
              if (text) emitter.push(text);
              if (handlers.onBytes) handlers.onBytes(read, source.file.size);
            }
          } catch (error) {
            return false;
          } finally {
            try {
              reader.releaseLock();
            } catch (e) {}
          }
          const tail = decoder.decode();
          if (tail) emitter.push(tail);
          emitter.finish();
          return true;
        }

        // Archive entry: extractEntry jumps straight to the entry for ZIP and
        // walks (with early exit) for TAR/GZ. Bytes arrive already decompressed.
        let found = false;
        let doneTarget = false;
        let read = 0;
        let total = 0;
        const sink = {
          open(name, sizeHint) {
            if (doneTarget || found || name !== source.innerPath) return null;
            found = true;
            total = sizeHint || 0;
            return { name };
          },
          chunk(_handle, bytes) {
            if (stopped()) return false;
            read += bytes.length;
            const text = decoder.decode(bytes, { stream: true });
            if (text) emitter.push(text);
            if (handlers.onBytes) handlers.onBytes(read, total);
            return true;
          },
          close() {
            doneTarget = true;
          },
          skip() {},
          error() {},
        };
        try {
          await LogArchives.extractEntry(
            source.file,
            source.archivePath,
            source.innerPath,
            sink,
            { isCancelled: () => doneTarget || stopped() }
          );
        } catch (error) {
          return false;
        }
        if (!found || stopped()) return false;
        const tail = decoder.decode();
        if (tail) emitter.push(tail);
        emitter.finish();
        return true;
      }

      // First index in the sorted array whose value is >= target.
      function lowerBound(arr, target) {
        let lo = 0;
        let hi = arr.length;
        while (lo < hi) {
          const mid = (lo + hi) >> 1;
          if (arr[mid] < target) lo = mid + 1;
          else hi = mid;
        }
        return lo;
      }

      // Count the marks highlightText() would produce for this line, mirroring
      // its overlap handling and its runaway-line guard so the match index and
      // the rendered marks always agree.
      function countLineMatches(text, highlightRe) {
        if (!highlightRe) return 0;
        highlightRe.lastIndex = 0;
        let count = 0;
        let last = 0;
        let match;
        let guard = 0;
        while ((match = highlightRe.exec(text)) !== null) {
          if (match.index >= last) {
            count++;
            last = match.index + match[0].length;
          }
          if (match.index === highlightRe.lastIndex) highlightRe.lastIndex++;
          if (++guard > 5000) break;
        }
        return count;
      }

      function viewerMessage(message) {
        viewerBody.innerHTML = "";
        const line = document.createElement("div");
        line.className = "v-line";
        const text = document.createElement("span");
        text.className = "v-tx";
        text.textContent = message;
        line.appendChild(text);
        viewerBody.appendChild(line);
      }

      function mediaViewerMessage(message, isError) {
        viewerBody.innerHTML = "";
        const text = document.createElement("p");
        text.className = "viewer-media-message" + (isError ? " error" : "");
        text.textContent = message;
        if (viewerMode === "image") {
          const stage = document.createElement("div");
          stage.className = "viewer-image-stage";
          stage.appendChild(text);
          viewerBody.appendChild(stage);
        } else {
          viewerBody.appendChild(text);
        }
      }

      async function openMediaViewer(path, source, media, token) {
        viewerMode = media.kind;
        viewer.classList.add("media-mode");
        viewer.classList.toggle("image-mode", media.kind === "image");
        viewer.classList.toggle("video-mode", media.kind === "video");
        viewerData = null;
        viewerIdx = -1;
        viewerSpacer = null;
        viewerWindow = null;
        viewerImageElement = null;
        viewerImageBaseWidth = 0;
        viewerImageBaseHeight = 0;
        viewerImageZoom = 1;
        viewerBody.classList.remove("wrap");
        viewerBody.style.fontSize = "";
        viewerBody.style.removeProperty("--vrh");
        viewerBody.scrollTop = 0;
        viewerBody.scrollLeft = 0;
        viewerScroll.hidden = true;
        viewerScrollThumb.hidden = true;
        viewerScrollCursor.hidden = true;
        updateViewerZoomLabel();
        mediaViewerMessage(
          source.kind === "archive"
            ? `Extracting ${media.kind} from archive...`
            : `Opening ${media.kind}...`
        );
        viewerMinfo.textContent =
          source.kind === "file" ? formatBytes(source.file.size) : "Loading...";
        viewerBody.focus();

        let lastProgressUi = 0;
        const blob = await mediaBlobForSource(
          source,
          media,
          token,
          (read, total) => {
            const now = performance.now();
            if (now - lastProgressUi < 100) return;
            lastProgressUi = now;
            viewerMinfo.textContent = total
              ? `Loading ${Math.min(100, Math.round((read / total) * 100))}%...`
              : `Loading ${formatBytes(read)}...`;
          }
        );
        if (token !== viewerToken) return;
        if (!blob) {
          viewerMinfo.textContent = "";
          mediaViewerMessage(`Could not read this ${media.kind}.`, true);
          return;
        }

        const url = URL.createObjectURL(blob);
        if (token !== viewerToken) {
          URL.revokeObjectURL(url);
          return;
        }
        viewerObjectUrl = url;

        const preview = document.createElement(
          media.kind === "image" ? "img" : "video"
        );
        preview.className = "viewer-media";
        if (media.kind === "image") {
          viewerImageElement = preview;
          preview.draggable = false;
          preview.alt = path.split("/").pop() || "Image preview";
          preview.addEventListener("load", () => {
            if (token !== viewerToken) return;
            fitViewerImage(true);
            updateViewerZoomLabel();
            viewerMinfo.textContent =
              `${preview.naturalWidth.toLocaleString()} × ` +
              `${preview.naturalHeight.toLocaleString()} · ${formatBytes(blob.size)}`;
          });
        } else {
          preview.controls = true;
          preview.preload = "metadata";
          preview.playsInline = true;
          preview.addEventListener("loadedmetadata", () => {
            if (token !== viewerToken) return;
            const details = [];
            if (preview.videoWidth && preview.videoHeight) {
              details.push(
                `${preview.videoWidth.toLocaleString()} × ` +
                  `${preview.videoHeight.toLocaleString()}`
              );
            }
            if (Number.isFinite(preview.duration)) {
              details.push(formatMediaDuration(preview.duration));
            }
            details.push(formatBytes(blob.size));
            viewerMinfo.textContent = details.join(" · ");
          });
        }
        preview.addEventListener("error", () => {
          if (token !== viewerToken) return;
          clearViewerObjectUrl();
          viewerImageElement = null;
          updateViewerZoomLabel();
          viewerMinfo.textContent = media.mime;
          mediaViewerMessage(
            `This browser cannot display this ${media.kind} format or codec.`,
            true
          );
        });
        viewerBody.innerHTML = "";
        if (media.kind === "image") {
          const stage = document.createElement("div");
          stage.className = "viewer-image-stage";
          stage.appendChild(preview);
          viewerBody.appendChild(stage);
        } else {
          viewerBody.appendChild(preview);
        }
        preview.src = url;
      }

      // The viewer is virtualized so huge files open instantly and scroll
      // smoothly. The file streams in as blocks of VIEWER_BLOCK_LINES lines
      // (one string + a line-offset table per block, no DOM) for O(1) line
      // lookup, and only the ~screenful of lines around the scroll position is
      // ever in the DOM. Rows have a fixed height, so any line's position is
      // computed directly; for files taller than the browser's element-height
      // cap the scroll range is scaled onto the full file, keeping every line
      // and match reachable. Match positions are indexed during the streamed
      // read, so the counter and First/Prev/Next/Last cover the entire file.

      function viewerMatchCount() {
        return viewerData ? viewerData.matchLines.length : 0;
      }

      function newViewerData(path, hitLine, highlight) {
        // matchLines is the "active" set the nav/minimap/highlight all key off.
        // It starts as the base (original-search) set and is the same array as
        // baseMatchLines until an in-file find retargets it (see applyFind).
        const baseMatchLines = [];
        return {
          path,
          blocks: [], // { first, count, text, starts } for O(1) line lookup
          pending: [], // lines waiting to be sealed into the next block
          matchLines: baseMatchLines, // line number of every active match, in order
          baseMatchLines, // the original search's matches, retained across finds
          baseHighlight: highlight, // original search matcher (restored on clear)
          findActive: false, // an in-file find query is currently applied
          findScannedBlocks: 0, // sealed blocks already scanned into a find
          lineCount: 0,
          hitLine,
          highlight,
          loaded: false,
          jumped: false, // the initial jump to the clicked line happened
          progressPct: null,
          lastUi: 0,
          rowH: 18.75, // measured height of one rendered row, in px
          anchorVirtualTop: null, // exact virtual offset to hold after a jump
          programmaticScroll: false, // the next scroll event is one we caused
          lastScrollTop: 0, // last vertical offset, to spot horizontal scrolls
          _lnDigits: 0, // last applied line-number gutter digit count
          wrapRealH: null, // exact wrapped height when the whole file is rendered
          addedEventLines: new Set(), // viewer lines manually added to the route
        };
      }

      function sealViewerBlock(data) {
        const lines = data.pending;
        if (!lines.length) return;
        data.pending = [];
        const count = lines.length;
        const starts = new Uint32Array(count);
        let offset = 0;
        for (let i = 0; i < count; i++) {
          starts[i] = offset;
          offset += lines[i].length + 1;
        }
        data.blocks.push({
          first: data.blocks.length * VIEWER_BLOCK_LINES + 1,
          count,
          text: lines.join("\n"),
          starts,
        });
      }

      // Lines that can be rendered right now: every sealed block holds exactly
      // VIEWER_BLOCK_LINES, so until the stream finishes we only trust the sealed
      // count (the trailing, not-yet-sealed lines appear once their block seals).
      function viewerLineCount(data) {
        return data.loaded
          ? data.lineCount
          : data.blocks.length * VIEWER_BLOCK_LINES;
      }

      function viewerBlockLine(block, i) {
        return i + 1 < block.count
          ? block.text.slice(block.starts[i], block.starts[i + 1] - 1)
          : block.text.slice(block.starts[i]);
      }

      // O(1) text lookup for any 1-based line via its sealed block.
      function getLineText(data, ln) {
        if (ln < 1) return "";
        const bi = Math.floor((ln - 1) / VIEWER_BLOCK_LINES);
        const block = data.blocks[bi];
        if (!block) return "";
        const i = (ln - 1) % VIEWER_BLOCK_LINES;
        if (i >= block.count) return "";
        return viewerBlockLine(block, i);
      }

      // Geometry of the virtualized scroll for the current file + viewport. When
      // the true height (lineCount * rowH) exceeds the browser's element-height
      // cap we scale: the scrollbar spans VIEWER_MAX_CONTENT_PX while the scroll
      // position maps linearly onto the full virtual height, so distant lines
      // stay reachable and jumps to them stay exact.
      function viewerMetrics(data) {
        const vh = viewerBody.clientHeight || 1;
        const rowH = data.rowH || 18.75;
        const lineCount = viewerLineCount(data);
        // Extended mode: every line is exactly rowH tall, so the scroll height is
        // the line count times the row height (capped/scaled for huge files).
        //
        // Wrap mode: lines can be taller than rowH, which the fixed-height model
        // can't represent. For tiny files that render in full we measure the real
        // height exactly (data.wrapRealH). For larger files we keep the per-line
        // model but add one screen (minus a row) of scroll-past-end so the final
        // line can still be brought to the top -- which makes every line, and the
        // full height of any line up to a viewport tall, reachable.
        let virtualHeight;
        if (viewerWrap && data.wrapRealH != null) {
          virtualHeight = Math.max(vh, data.wrapRealH);
        } else if (viewerWrap && lineCount * rowH > vh) {
          virtualHeight = lineCount * rowH + Math.max(0, vh - rowH);
        } else {
          virtualHeight = Math.max(vh, lineCount * rowH);
        }
        const contentHeight = Math.min(virtualHeight, VIEWER_MAX_CONTENT_PX);
        return {
          vh,
          rowH,
          lineCount,
          virtualHeight,
          contentHeight,
          maxScroll: Math.max(0, contentHeight - vh),
          maxVirtual: Math.max(0, virtualHeight - vh),
          scaled: virtualHeight > contentHeight + 0.5,
        };
      }

      function scheduleViewerRender() {
        if (viewerRaf) return;
        viewerRaf = requestAnimationFrame(() => {
          viewerRaf = 0;
          renderViewer();
        });
      }

      // A scroll comes from the user (drop any jump anchor and follow the bar) or
      // from a jump we just performed (keep the exact anchor for one render). A
      // horizontal-only scroll leaves the vertical anchor untouched.
      function onViewerScroll() {
        const data = viewerData;
        if (!data) return;
        if (data.programmaticScroll) {
          data.programmaticScroll = false;
        } else if (viewerBody.scrollTop !== data.lastScrollTop) {
          data.lastScrollTop = viewerBody.scrollTop;
          data.anchorVirtualTop = null;
        }
        scheduleViewerRender();
      }

      // Draw only the lines around the current vertical position into a single
      // absolutely-positioned window; the tall spacer alone carries the scroll
      // range. Runs on every scroll frame and after each jump.
      function renderViewer() {
        const data = viewerData;
        if (!data || !viewerWindow || !viewerSpacer) return;
        let m = viewerMetrics(data);
        if (m.lineCount <= 0) {
          viewerSpacer.style.height = m.contentHeight + "px";
          return;
        }

        // Match the line-number gutter width to the file's digit count.
        const digits = String(Math.max(1, m.lineCount)).length;
        if (digits !== data._lnDigits) {
          data._lnDigits = digits;
          viewerBody.style.setProperty("--v-ln-digits", String(digits));
        }

        const highlight = data.highlight;
        const overscan = 8;
        const windowCap = Math.ceil(m.vh / m.rowH) + overscan * 2;

        // Wrap mode, small enough to render whole: lay out every line so the
        // browser resolves the true wrapped heights, then scroll natively over
        // them. This is exact -- no fixed-height model to approximate.
        if (viewerWrap && m.lineCount <= windowCap) {
          viewerWindow.innerHTML = buildViewerRows(data, 1, m.lineCount, highlight);
          viewerWindow.style.top = "0px";
          const realH = viewerWindow.offsetHeight;
          data.wrapRealH = realH > m.vh + 0.5 ? realH : null;
          // Re-measure with the real height so spacer + scrollbar agree.
          m = viewerMetrics(data);
          viewerSpacer.style.height = m.contentHeight + "px";
          let scrollTop = viewerBody.scrollTop;
          if (scrollTop > m.maxScroll) {
            scrollTop = m.maxScroll;
            data.programmaticScroll = true;
            viewerBody.scrollTop = scrollTop;
            data.lastScrollTop = viewerBody.scrollTop;
          }
          markViewerCurrent(data, 1, m.lineCount);
          updateViewerScrollbar(m, scrollTop);
          return;
        }

        data.wrapRealH = null;
        viewerSpacer.style.height = m.contentHeight + "px";

        let scrollTop = viewerBody.scrollTop;
        if (scrollTop > m.maxScroll) scrollTop = m.maxScroll;

        // Where the viewport top sits in the file's full (unscaled) height.
        let virtualTop;
        if (data.anchorVirtualTop != null) {
          virtualTop = data.anchorVirtualTop;
        } else if (m.scaled && m.maxScroll > 0) {
          virtualTop = (scrollTop / m.maxScroll) * m.maxVirtual;
        } else {
          virtualTop = scrollTop;
        }
        virtualTop = Math.max(0, Math.min(virtualTop, m.maxVirtual));

        const topLineIdx = Math.min(
          m.lineCount - 1,
          Math.floor(virtualTop / m.rowH)
        ); // 0-based top line
        let firstLine;
        let lastLine;
        if (viewerWrap) {
          // Render from the exact top line so its measured height can anchor the
          // window. Wrapped lines are >= rowH tall, so this count always fills
          // the viewport (extra rows below are simply clipped).
          firstLine = topLineIdx;
          lastLine = firstLine + Math.ceil(m.vh / m.rowH) + overscan;
        } else {
          firstLine = topLineIdx - overscan;
          if (firstLine < 0) firstLine = 0;
          lastLine = firstLine + Math.ceil(m.vh / m.rowH) + overscan * 2;
        }
        if (firstLine < 0) firstLine = 0;
        if (lastLine > m.lineCount - 1) lastLine = m.lineCount - 1;

        viewerWindow.innerHTML = buildViewerRows(
          data,
          firstLine + 1,
          lastLine + 1,
          highlight
        );

        // Position the window so the top line sits correctly beneath the viewport
        // top. Extended mode: every line is exactly rowH, so the offset is
        // analytic. Wrap mode: the top line's height varies, so offset by its
        // measured height times the fractional scroll into it -- this keeps
        // scrolling smooth and prevents skipping tall wrapped lines.
        if (viewerWrap) {
          const frac = Math.max(0, Math.min(1, virtualTop / m.rowH - topLineIdx));
          const firstEl = viewerWindow.firstElementChild;
          const realH = firstEl ? firstEl.offsetHeight : m.rowH;
          viewerWindow.style.top = scrollTop - frac * realH + "px";
        } else {
          viewerWindow.style.top =
            scrollTop + firstLine * m.rowH - virtualTop + "px";
        }

        markViewerCurrent(data, firstLine + 1, lastLine + 1);
        updateViewerScrollbar(m, virtualTop);
      }

      // Build the row HTML for 1-based lines [firstLn, lastLn] inclusive.
      function buildViewerRows(data, firstLn, lastLn, highlight) {
        const parts = [];
        for (let ln = firstLn; ln <= lastLn; ln++) {
          const text = getLineText(data, ln);
          const timestamp =
            window.LogRouteCore &&
            typeof window.LogRouteCore.timestampFromLine === "function"
              ? window.LogRouteCore.timestampFromLine(text)
              : Number.NaN;
          const eventable = Number.isFinite(timestamp);
          const alreadyAdded =
            data.addedEventLines.has(ln) ||
            !!(
              window.LogRoute &&
              typeof window.LogRoute.hasEventFromLog === "function" &&
              window.LogRoute.hasEventFromLog(data.path, ln)
            );
          if (alreadyAdded) data.addedEventLines.add(ln);
          const classes = ["v-line"];
          if (ln === data.hitLine) classes.push("v-hit");
          if (eventable) classes.push("v-eventable");
          if (alreadyAdded) classes.push("v-event-added");
          const eventAttributes = eventable
            ? ` data-event-timestamp="${timestamp}" title="${
                alreadyAdded
                  ? "Already in the event timeline"
                  : "Click to add this line to the event timeline"
              }"`
            : "";
          parts.push(
            `<div class="${classes.join(" ")}" data-ln="${ln}"${eventAttributes}>` +
              `<span class="v-ln">${ln}</span>` +
              `<span class="v-tx">` +
              highlightText(text, highlight) +
              `</span></div>`
          );
        }
        return parts.join("");
      }

      // Re-mark the focused match if its line is within the rendered range
      // [minLn, maxLn] (survives scrolling away and back, since every re-render
      // rebuilds the window).
      function markViewerCurrent(data, minLn, maxLn) {
        if (viewerIdx < 0) return;
        const ln = data.matchLines[viewerIdx];
        if (ln < minLn || ln > maxLn) return;
        const row = viewerWindow.querySelector(`.v-line[data-ln="${ln}"]`);
        if (!row) return;
        const marks = row.querySelectorAll("mark");
        const within = viewerIdx - lowerBound(data.matchLines, ln);
        const mark = marks[Math.min(within, marks.length - 1)];
        if (mark) mark.classList.add("v-cur");
      }

      // A line can contain several highlighted matches, represented by repeated
      // line numbers in matchLines. Combine the clicked mark's position within
      // its row with the first index for that line to focus the exact occurrence
      // without moving the already-visible viewport.
      function onViewerMatchClick(event) {
        const data = viewerData;
        if (!data || viewerMode !== "text") return;
        const row = event.target.closest(".v-line[data-ln]");
        if (!row) return;
        const selection = window.getSelection && window.getSelection();
        if (selection && !selection.isCollapsed) return;
        const ln = Number(row.dataset.ln);

        const mark = event.target.closest("mark");
        if (!mark) {
          const timestamp = Number(row.dataset.eventTimestamp);
          if (!Number.isFinite(timestamp)) return;
          if (
            !window.LogRoute ||
            typeof window.LogRoute.addEventFromLog !== "function"
          ) {
            showViewerEventStatus(
              "The event timeline is not available for this selection.",
              true
            );
            return;
          }
          const result = window.LogRoute.addEventFromLog({
            timestamp,
            content: getLineText(data, ln),
            path: data.path,
            lineNo: ln,
          });
          if (result && result.ok) {
            data.addedEventLines.add(ln);
            row.classList.add("v-event-added");
            row.title = "Already in the event timeline";
            showViewerEventStatus(result.message || "Added to event timeline.");
          } else {
            showViewerEventStatus(
              (result && result.message) ||
                "Could not add this line to the event timeline.",
              true
            );
          }
          return;
        }

        const marks = row.querySelectorAll("mark");
        const within = Array.prototype.indexOf.call(marks, mark);
        const index = lowerBound(data.matchLines, ln) + within;
        if (within < 0 || data.matchLines[index] !== ln) return;

        data.jumped = true;
        viewerIdx = index;
        const current = viewerWindow.querySelector("mark.v-cur");
        if (current && current !== mark) current.classList.remove("v-cur");
        mark.classList.add("v-cur");
        updateViewerScrollbar();
        updateViewerInfo();
      }

      function showViewerEventStatus(message, isError = false) {
        clearTimeout(viewerEventStatusTimer);
        viewerEventStatusTimer = 0;
        viewerEventStatus.textContent = message || "";
        viewerEventStatus.classList.toggle("error", !!isError);
        if (!message) return;
        viewerEventStatusTimer = window.setTimeout(() => {
          viewerEventStatusTimer = 0;
          viewerEventStatus.textContent = "";
          viewerEventStatus.classList.remove("error");
        }, 3200);
      }

      // Where the viewport top currently sits in the file's full (unscaled)
      // height -- the same value renderViewer derives, factored out so the
      // scrollbar can reuse it without a re-render.
      function viewerVirtualTop(m) {
        const data = viewerData;
        if (!data) return 0;
        let scrollTop = viewerBody.scrollTop;
        if (scrollTop > m.maxScroll) scrollTop = m.maxScroll;
        let virtualTop;
        if (data.anchorVirtualTop != null) {
          virtualTop = data.anchorVirtualTop;
        } else if (m.scaled && m.maxScroll > 0) {
          virtualTop = (scrollTop / m.maxScroll) * m.maxVirtual;
        } else {
          virtualTop = scrollTop;
        }
        return Math.max(0, Math.min(virtualTop, m.maxVirtual));
      }

      // Track height plus thumb geometry for the current file/viewport. The
      // thumb spans the visible fraction of the file (with a floor so it stays
      // grabbable) and travels the remaining `movable` pixels.
      function viewerScrollGeom(m) {
        m = m || viewerMetrics(viewerData);
        const h = viewerScroll.clientHeight || 0;
        const scrollable = m.virtualHeight > m.vh + 0.5;
        const minThumb = 28;
        const thumbH = scrollable
          ? Math.max(minThumb, Math.min(h, (m.vh / m.virtualHeight) * h))
          : h;
        const movable = Math.max(0, h - thumbH);
        return { m, h, thumbH, movable, scrollable };
      }

      // Vertical position on the track for a 1-based line, using the line's
      // center so a match tick lines up with where that row renders.
      function viewerTrackY(ln, m, h) {
        if (m.virtualHeight <= 0) return 0;
        const y = (((ln - 0.5) * m.rowH) / m.virtualHeight) * h;
        return Math.max(0, Math.min(y, h));
      }

      // Reflect the current scroll position onto the custom scrollbar: size and
      // place the thumb (the highlighted "where am I" section) and the focused-
      // match cursor. Cheap enough to run every scroll frame.
      function updateViewerScrollbar(m, virtualTop) {
        const data = viewerData;
        if (!data || !viewerSpacer) {
          viewerScroll.hidden = true;
          return;
        }
        viewerScroll.hidden = false;
        m = m || viewerMetrics(data);
        if (virtualTop == null) virtualTop = viewerVirtualTop(m);
        const g = viewerScrollGeom(m);
        if (g.h <= 0) return;

        viewerScroll.classList.toggle("no-scroll", !g.scrollable);
        if (g.scrollable) {
          const thumbTop =
            m.maxVirtual > 0 ? (virtualTop / m.maxVirtual) * g.movable : 0;
          viewerScrollThumb.hidden = false;
          viewerScrollThumb.style.height = g.thumbH + "px";
          viewerScrollThumb.style.transform = `translateY(${thumbTop}px)`;
        } else {
          viewerScrollThumb.hidden = true;
        }

        const total = viewerMatchCount();
        if (viewerIdx >= 0 && viewerIdx < total) {
          const y = viewerTrackY(data.matchLines[viewerIdx], m, g.h);
          viewerScrollCursor.hidden = false;
          viewerScrollCursor.style.transform = `translateY(${y - 1}px)`;
        } else {
          viewerScrollCursor.hidden = true;
        }
      }

      // Paint one tick per match onto the scrollbar canvas. Density is collapsed
      // per device-pixel row first, so a file with hundreds of thousands of
      // matches still draws in O(matches + trackPixels). Redrawn only when the
      // match set or track size changes -- never per scroll frame.
      function drawViewerMatchMap() {
        const data = viewerData;
        const w = viewerScroll.clientWidth;
        const h = viewerScroll.clientHeight;
        if (w <= 0 || h <= 0) return;
        const dpr = window.devicePixelRatio || 1;
        const cw = Math.max(1, Math.round(w * dpr));
        const ch = Math.max(1, Math.round(h * dpr));
        if (viewerScrollMap.width !== cw) viewerScrollMap.width = cw;
        if (viewerScrollMap.height !== ch) viewerScrollMap.height = ch;
        const ctx = viewerScrollMap.getContext("2d");
        if (!ctx) return;
        ctx.clearRect(0, 0, cw, ch);

        if (!data || !data.highlight) return; // browse mode: no matches to map
        const matches = data.matchLines;
        const n = matches.length;
        if (!n) return;
        const m = viewerMetrics(data);
        if (m.virtualHeight <= 0) return;

        const rows = new Uint8Array(ch);
        for (let i = 0; i < n; i++) {
          let y = Math.floor(
            (((matches[i] - 0.5) * m.rowH) / m.virtualHeight) * ch
          );
          if (y < 0) y = 0;
          else if (y >= ch) y = ch - 1;
          if (rows[y] < 255) rows[y]++;
        }

        const inset = Math.round(2 * dpr);
        const tickW = Math.max(1, cw - inset * 2);
        const tickH = Math.max(1, Math.round(dpr));
        ctx.fillStyle = "rgba(255, 212, 121, 0.7)";
        for (let y = 0; y < ch; y++) {
          if (rows[y]) ctx.fillRect(inset, y, tickW, tickH);
        }
      }

      // Scroll the viewer so the given virtual offset is the viewport top,
      // driven by a click/drag on the custom scrollbar. Mirrors jumpToViewerLine
      // but takes a raw offset instead of centering a line.
      function viewerScrollToVirtualTop(vt) {
        const data = viewerData;
        if (!data || !viewerSpacer) return;
        const m = viewerMetrics(data);
        vt = Math.max(0, Math.min(vt, m.maxVirtual));
        let scrollTop =
          m.scaled && m.maxVirtual > 0 ? (vt / m.maxVirtual) * m.maxScroll : vt;
        scrollTop = Math.max(0, Math.min(scrollTop, m.maxScroll));
        data.anchorVirtualTop = vt;
        data.programmaticScroll = true;
        const before = viewerBody.scrollTop;
        viewerBody.scrollTop = scrollTop;
        data.lastScrollTop = viewerBody.scrollTop;
        if (viewerBody.scrollTop === before) data.programmaticScroll = false;
        renderViewer();
      }

      // Place a 1-based line in the viewport, centered by default or pinned to
      // the top (used when re-anchoring after zoom/wrap changes). Positions come
      // from a fixed row height, so this is exact for any file size: move the
      // scrollbar to the mapped position and draw the window from the precise
      // virtual offset, which we pin as the anchor until the user scrolls again.
      function jumpToViewerLine(ln, align) {
        const data = viewerData;
        if (!data || !viewerSpacer) return;
        // Fully-rendered wrap mode uses real (measured) positions, so scroll to
        // the actual row element instead of the fixed-height model. Render first
        // so the element and wrapRealH reflect the current font/width.
        if (viewerWrap) renderViewer();
        const m = viewerMetrics(data);
        if (viewerWrap && data.wrapRealH != null && viewerWindow) {
          const row = viewerWindow.querySelector(`.v-line[data-ln="${ln}"]`);
          if (row) {
            const lead = align === "top" ? 0 : Math.min(2 * m.rowH, m.vh * 0.3);
            const scrollTop = Math.max(
              0,
              Math.min(row.offsetTop - lead, m.maxScroll)
            );
            data.anchorVirtualTop = null;
            data.programmaticScroll = true;
            const was = viewerBody.scrollTop;
            viewerBody.scrollTop = scrollTop;
            data.lastScrollTop = viewerBody.scrollTop;
            if (viewerBody.scrollTop === was) data.programmaticScroll = false;
            renderViewer();
            return;
          }
        }

        let vt;
        if (align === "top") {
          vt = (ln - 1) * m.rowH;
        } else if (viewerWrap) {
          // Wrapped lines above the target vary in height, so centering by the
          // fixed-height model can push the target off-screen. Anchor it near
          // the top with a couple lines of lead, which stays reliably visible.
          vt = (ln - 1) * m.rowH - 2 * m.rowH;
        } else {
          vt = (ln - 1) * m.rowH + m.rowH / 2 - m.vh / 2;
        }
        vt = Math.max(0, Math.min(vt, m.maxVirtual));
        let scrollTop =
          m.scaled && m.maxVirtual > 0
            ? (vt / m.maxVirtual) * m.maxScroll
            : vt;
        scrollTop = Math.max(0, Math.min(scrollTop, m.maxScroll));

        viewerSpacer.style.height = m.contentHeight + "px";
        data.anchorVirtualTop = vt;
        data.programmaticScroll = true;
        const before = viewerBody.scrollTop;
        viewerBody.scrollTop = scrollTop;
        data.lastScrollTop = viewerBody.scrollTop;
        // No scroll event fires when the position is unchanged, so don't leave
        // the "programmatic" flag armed for the user's next scroll.
        if (viewerBody.scrollTop === before) data.programmaticScroll = false;
        renderViewer();
      }

      // The 1-based logical line currently at the viewport top -- used to keep
      // the view stable across zoom and wrap changes.
      function currentViewerTopLine() {
        const data = viewerData;
        if (!data) return 1;
        const m = viewerMetrics(data);
        // Fully-rendered wrap mode has real element positions, so find the first
        // row whose bottom is still below the viewport top.
        if (viewerWrap && data.wrapRealH != null && viewerWindow) {
          const s = viewerBody.scrollTop;
          const rows = viewerWindow.children;
          for (let i = 0; i < rows.length; i++) {
            const r = rows[i];
            if (r.offsetTop + r.offsetHeight > s + 1) {
              const ln = Number(r.getAttribute("data-ln"));
              if (ln) return ln;
            }
          }
          return m.lineCount;
        }
        return Math.floor(viewerVirtualTop(m) / m.rowH) + 1;
      }

      // Re-anchor after a layout change: keep the focused match centered if there
      // is one, otherwise hold the line that was at the viewport top.
      function reanchorViewer(topLine) {
        const data = viewerData;
        if (!data || !viewerSpacer) return;
        data.anchorVirtualTop = null;
        if (viewerIdx >= 0 && viewerIdx < data.matchLines.length) {
          jumpToViewerLine(data.matchLines[viewerIdx], "center");
        } else {
          jumpToViewerLine(topLine, "top");
        }
      }

      function updateViewerZoomLabel() {
        if (viewerMode === "image") {
          const ready = !!(
            viewerImageElement && viewerImageElement.naturalWidth
          );
          viewerZoomReset.textContent = Math.round(viewerImageZoom * 100) + "%";
          viewerZoomIn.disabled =
            !ready || viewerImageZoom >= VIEWER_IMAGE_ZOOM_MAX - 0.001;
          viewerZoomOut.disabled =
            !ready || viewerImageZoom <= VIEWER_IMAGE_ZOOM_MIN + 0.001;
          return;
        }
        const pct = Math.round((viewerFontPx / VIEWER_FONT_DEFAULT) * 100);
        viewerZoomReset.textContent = pct + "%";
        viewerZoomIn.disabled = viewerFontPx >= VIEWER_FONT_MAX - 0.01;
        viewerZoomOut.disabled = viewerFontPx <= VIEWER_FONT_MIN + 0.01;
      }

      function applyViewerImageSize(forceCenter, anchor) {
        const image = viewerImageElement;
        if (!image || !image.naturalWidth) return;
        const body = viewerBody;
        const oldWidth = body.scrollWidth || body.clientWidth || 1;
        const oldHeight = body.scrollHeight || body.clientHeight || 1;
        const rect = body.getBoundingClientRect();
        const viewportX = anchor
          ? Math.max(0, Math.min(anchor.clientX - rect.left, body.clientWidth))
          : body.clientWidth / 2;
        const viewportY = anchor
          ? Math.max(0, Math.min(anchor.clientY - rect.top, body.clientHeight))
          : body.clientHeight / 2;
        const contentX = forceCenter
          ? 0.5
          : (body.scrollLeft + viewportX) / oldWidth;
        const contentY = forceCenter
          ? 0.5
          : (body.scrollTop + viewportY) / oldHeight;

        image.style.width = viewerImageBaseWidth * viewerImageZoom + "px";
        image.style.height = viewerImageBaseHeight * viewerImageZoom + "px";

        // Reading scrollWidth/Height flushes the new dimensions before restoring
        // the same relative point beneath the cursor (or viewport center).
        const newWidth = body.scrollWidth;
        const newHeight = body.scrollHeight;
        body.scrollLeft = contentX * newWidth - viewportX;
        body.scrollTop = contentY * newHeight - viewportY;
      }

      function fitViewerImage(forceCenter) {
        const image = viewerImageElement;
        if (!image || !image.naturalWidth) return;
        // Keep this inset in sync with .viewer-image-stage's 20px padding.
        const availableWidth = Math.max(1, viewerBody.clientWidth - 40);
        const availableHeight = Math.max(1, viewerBody.clientHeight - 40);
        const fit = Math.min(
          1,
          availableWidth / image.naturalWidth,
          availableHeight / image.naturalHeight
        );
        viewerImageBaseWidth = image.naturalWidth * fit;
        viewerImageBaseHeight = image.naturalHeight * fit;
        applyViewerImageSize(forceCenter);
      }

      function setViewerImageZoom(zoom, anchor) {
        zoom = Math.max(
          VIEWER_IMAGE_ZOOM_MIN,
          Math.min(VIEWER_IMAGE_ZOOM_MAX, zoom)
        );
        viewerImageZoom = Math.round(zoom * 1000) / 1000;
        applyViewerImageSize(false, anchor);
        updateViewerZoomLabel();
      }

      function viewerImageAnchor(event) {
        return {
          clientX: Number.isFinite(event.clientX)
            ? event.clientX
            : viewerBody.getBoundingClientRect().left + viewerBody.clientWidth / 2,
          clientY: Number.isFinite(event.clientY)
            ? event.clientY
            : viewerBody.getBoundingClientRect().top + viewerBody.clientHeight / 2,
        };
      }

      function onViewerImageWheel(event) {
        if (viewerMode !== "image" || !event.ctrlKey) return;
        event.preventDefault();
        if (!viewerImageElement || !viewerImageElement.naturalWidth) return;
        let delta = event.deltaY;
        if (event.deltaMode === 1) delta *= 16;
        else if (event.deltaMode === 2) delta *= viewerBody.clientHeight;
        // Clamp one event so a mouse-wheel notch cannot jump several zoom levels;
        // trackpad pinches arrive as many small events and remain smooth.
        const factor = Math.max(
          0.8,
          Math.min(1.25, Math.exp(-delta * 0.01))
        );
        setViewerImageZoom(
          viewerImageZoom * factor,
          viewerImageAnchor(event)
        );
      }

      function onViewerImageGestureStart(event) {
        if (viewerMode !== "image") return;
        event.preventDefault();
        viewerGestureStartZoom = viewerImageZoom;
      }

      function onViewerImageGestureChange(event) {
        if (viewerMode !== "image") return;
        event.preventDefault();
        const scale = Number.isFinite(event.scale) ? event.scale : 1;
        setViewerImageZoom(
          viewerGestureStartZoom * scale,
          viewerImageAnchor(event)
        );
      }

      function onViewerImageGestureEnd(event) {
        if (viewerMode === "image") event.preventDefault();
      }

      function changeViewerZoom(direction) {
        if (viewerMode === "image") {
          setViewerImageZoom(
            viewerImageZoom *
              (direction > 0
                ? VIEWER_IMAGE_ZOOM_STEP
                : 1 / VIEWER_IMAGE_ZOOM_STEP)
          );
        } else if (viewerMode === "text") {
          setViewerFont(
            viewerFontPx *
              (direction > 0 ? VIEWER_ZOOM_STEP : 1 / VIEWER_ZOOM_STEP)
          );
        }
      }

      function resetViewerZoom() {
        if (viewerMode === "image") {
          setViewerImageZoom(1);
        } else if (viewerMode === "text") {
          setViewerFont(VIEWER_FONT_DEFAULT);
        }
      }

      // Zoom = change the viewer font size, which drives the measured row height.
      // Re-measure, update the geometry, and re-anchor so the view stays put.
      function setViewerFont(px) {
        px = Math.max(VIEWER_FONT_MIN, Math.min(VIEWER_FONT_MAX, px));
        px = Math.round(px * 10) / 10;
        const data = viewerData;
        // Capture the top line before the font (and thus layout) changes.
        const topLine = data && viewerSpacer ? currentViewerTopLine() : 1;
        viewerFontPx = px;
        viewerBody.style.fontSize = px + "px";
        if (data && viewerSpacer) {
          const rowH = measureViewerRowHeight();
          viewerBody.style.setProperty("--vrh", rowH + "px");
          data.rowH = rowH;
          reanchorViewer(topLine);
          scheduleViewerRender();
          drawViewerMatchMap();
        }
        updateViewerZoomLabel();
      }

      // Toggle fit-to-width wrapping. Row height is unchanged (one visual row is
      // still one line tall), so no re-measure is needed -- just relayout and
      // re-anchor. renderViewer handles the variable wrapped heights.
      function setViewerWrap(on) {
        const data = viewerData;
        // Capture the top line before the layout mode changes.
        const topLine = data && viewerSpacer ? currentViewerTopLine() : 1;
        viewerWrap = !!on;
        viewerWrapBtn.textContent = viewerWrap ? "Wrap: On" : "Wrap: Off";
        viewerWrapBtn.setAttribute("aria-pressed", viewerWrap ? "true" : "false");
        viewerBody.classList.toggle("wrap", viewerWrap);
        if (data && viewerSpacer) {
          viewerBody.scrollLeft = 0;
          reanchorViewer(topLine);
          scheduleViewerRender();
        }
      }

      // Bring the focused match's mark into horizontal view (long, unwrapped
      // lines can push it off-screen); the vertical position is already set.
      // In wrap mode there is no horizontal overflow, so this is a no-op.
      function scrollViewerToCurrentMark() {
        if (viewerWrap) return;
        if (!viewerWindow) return;
        const mark = viewerWindow.querySelector("mark.v-cur");
        if (!mark) return;
        const body = viewerBody.getBoundingClientRect();
        const rect = mark.getBoundingClientRect();
        const pad = 80;
        if (rect.left < body.left + pad || rect.right > body.right - pad) {
          const target =
            viewerBody.scrollLeft +
            (rect.left - body.left) -
            viewerBody.clientWidth / 2;
          viewerBody.scrollLeft = Math.max(0, target);
        }
      }

      // Measure the height of one rendered row for the current font/zoom so the
      // virtual geometry is pixel-accurate. Runs before --vrh is set, so the
      // probe uses the viewer's natural single-line height.
      function measureViewerRowHeight() {
        const probe = document.createElement("div");
        probe.className = "v-line";
        // Force the natural line height (1.5, matching .viewer-body) so the
        // measurement never depends on a --vrh left over from a previous open,
        // and neutralize the wrap-mode min-height/white-space so the probe is
        // always a single unwrapped row at the current font size.
        probe.style.cssText =
          "position:absolute;visibility:hidden;left:-9999px;top:0;" +
          "height:auto;min-height:0;line-height:1.5;white-space:pre;";
        probe.innerHTML =
          '<span class="v-ln">1</span><span class="v-tx">Xg</span>';
        viewerBody.appendChild(probe);
        const h = probe.getBoundingClientRect().height;
        viewerBody.removeChild(probe);
        return h > 0 ? h : 18.75;
      }

      function setViewerMatch(index, smooth = true) {
        const total = viewerMatchCount();
        if (!total) {
          updateViewerInfo();
          return;
        }
        viewerData.jumped = true; // manual navigation cancels the auto-jump
        viewerIdx = Math.max(0, Math.min(index, total - 1));
        // Fixed-height positioning makes the jump exact regardless of file size;
        // renderViewer applies the .v-cur mark for viewerIdx as it draws.
        jumpToViewerLine(viewerData.matchLines[viewerIdx]);
        scrollViewerToCurrentMark();
        updateViewerInfo();
      }

      // Jump to the first match at/after the clicked line as soon as that part
      // of the file has streamed in, without waiting for the full load.
      function tryViewerAutoJump(data) {
        if (data.jumped) return;
        const sealedLines = viewerLineCount(data);
        const i = lowerBound(data.matchLines, data.hitLine);
        if (i < data.matchLines.length && data.matchLines[i] <= sealedLines) {
          setViewerMatch(i, false);
          return;
        }
        if (!data.loaded) return;
        data.jumped = true;
        if (data.matchLines.length) {
          setViewerMatch(0, false);
        } else {
          jumpToViewerLine(data.hitLine);
          updateViewerInfo();
        }
      }

      // ---- in-file find ------------------------------------------------------
      //
      // The viewer already highlights and steps through data.matchLines with the
      // data.highlight regex. An in-file find reuses all of that: while a query
      // is active it points data.highlight at the query and rebuilds matchLines
      // from the loaded blocks, so the counter, First/Prev/Next/Last, arrows, and
      // the minimap all just work. Clearing the query restores the original
      // search's highlight and matches (kept in baseHighlight / baseMatchLines).

      // Literal, case-insensitive substring find (what "find in file" means to
      // most people); escaping means the query can never be an invalid regex.
      function buildFindRegex(query) {
