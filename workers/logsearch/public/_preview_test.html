<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Log Search</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background: #111;
        color: #eee;
        margin: 8px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        font-size: 14px;
      }

      main {
        max-width: none;
        margin: 0;
      }

      h1 {
        font-size: 18px;
        margin: 8px 0 2px;
      }

      p {
        margin: 0;
      }

      .muted {
        color: #aaa;
      }

      .error {
        color: #ff6b6b;
      }

      a {
        color: #7fb2ff;
      }

      .dropzone {
        border: 1px dashed #666;
        border-radius: 6px;
        cursor: pointer;
        display: block;
        margin-top: 12px;
        padding: 22px 16px;
        text-align: center;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      .dropzone:hover,
      .dropzone:focus-within {
        border-color: #888;
        background: #161616;
      }

      .dropzone-plus {
        color: #888;
        display: block;
        font-size: 40px;
        font-weight: 300;
        line-height: 1;
        /* The "+" glyph sits a hair below its line-box center; nudge it up. */
        transform: translateY(-0.06em);
      }

      /* Exactly one of the plus sign / info line shows at a time. */
      .dropzone.has-selection .dropzone-plus {
        display: none;
      }

      .dropzone:not(.has-selection) #selection {
        display: none;
      }

      .dropzone input[type="file"] {
        display: none;
      }

      /* Full-screen drop target: shown only while files are dragged over the
         page, so a folder/archive can be dropped anywhere, not just the box. */
      .drop-overlay {
        align-items: center;
        background: rgba(10, 16, 26, 0.82);
        display: none;
        inset: 0;
        justify-content: center;
        padding: 24px;
        position: fixed;
        z-index: 100;
      }

      .drop-overlay.active {
        display: flex;
      }

      .drop-overlay-inner {
        border: 2px dashed #7fb2ff;
        border-radius: 16px;
        color: #cfe0ff;
        font-size: 96px;
        font-weight: 300;
        line-height: 1;
        padding: 40px 64px;
        /* Let drag events fall through to a single target so the enter/leave
           counter that toggles the overlay never flickers on child edges. */
        pointer-events: none;
      }

      /* Nudge just the glyph up (not the dashed box) to optically center it. */
      .drop-overlay-plus {
        display: block;
        transform: translateY(-0.06em);
      }

      /* Top row: a "controls" box on the left and the file heatmap on the
         right, sitting side by side and stretched to the same height. The
         right cell is the sizing anchor (position: relative) and the heatmap
         fills it absolutely, so the heatmap always matches the left box's
         height and scrolls its list internally rather than growing the row. */
      .top-grid {
        align-items: stretch;
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .top-left {
        border: 1px solid #333;
        border-radius: 6px;
        padding: 14px;
      }

      .top-left > :first-child {
        margin-top: 0;
      }

      .top-right {
        min-height: 0;
        position: relative;
      }

      .controls {
        align-items: end;
        display: grid;
        gap: 8px 12px;
        grid-template-columns: minmax(0, 1fr) auto auto;
        margin-top: 12px;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }

      input[type="text"] {
        background: #111;
        border: 1px solid #666;
        color: #eee;
        font: inherit;
        padding: 6px 8px;
        width: 100%;
      }

      input[type="text"]::placeholder {
        color: #888;
      }

      .toggles {
        display: flex;
        gap: 14px;
        white-space: nowrap;
      }

      .toggle {
        align-items: center;
        cursor: pointer;
        display: flex;
        font-weight: 400;
        gap: 6px;
        margin: 0;
      }

      button {
        background: #2a2a2a;
        border: 1px solid #666;
        color: #eee;
        cursor: pointer;
        font: inherit;
        padding: 6px 14px;
      }

      button:hover:not(:disabled) {
        border-color: #888;
      }

      button.primary {
        background: #1f6feb;
        border-color: #1f6feb;
      }

      button:disabled {
        cursor: default;
        opacity: 0.5;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .progress {
        margin-top: 12px;
      }

      .bar {
        background: #222;
        border-radius: 3px;
        height: 6px;
        margin-top: 6px;
        overflow: hidden;
      }

      .bar > span {
        background: #1f6feb;
        display: block;
        height: 100%;
        width: 0;
        transition: width 0.1s linear;
      }

      .summary {
        border-top: 1px solid #2a2a2a;
        display: none;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: 14px;
        padding-top: 12px;
      }

      .stat .n {
        font-size: 20px;
        font-weight: 700;
      }

      .stat .k {
        color: #aaa;
        font-size: 12px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
      }

      .chip {
        background: #1a1a1a;
        border: 1px solid #444;
        border-radius: 999px;
        cursor: pointer;
        font-size: 12px;
        padding: 3px 10px;
      }

      .chip.active {
        background: #16202e;
        border-color: #7fb2ff;
        color: #cfe0ff;
      }

      .results-head {
        align-items: center;
        display: flex;
        gap: 10px;
        justify-content: space-between;
        margin-top: 14px;
      }

      .results-head input {
        max-width: 320px;
      }

      table {
        border-collapse: collapse;
        font-size: 13px;
        margin-top: 8px;
        table-layout: fixed;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid #222;
        overflow: hidden;
        padding: 5px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: #aaa;
        font-weight: 600;
        position: sticky;
        top: 0;
        background: #111;
      }

      thead th:first-child {
        padding-left: 20px;
      }

      col.c-line {
        width: 84px;
      }

      td.file-head {
        background: #151515;
        border-top: 1px solid #2f2f2f;
        color: #cfe0ff;
        padding-top: 7px;
        padding-bottom: 7px;
      }

      td.file-head .fh-inner {
        align-items: baseline;
        display: flex;
        gap: 12px;
        justify-content: space-between;
      }

      td.file-head .fh-path {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      td.file-head .base {
        font-weight: 700;
      }

      td.file-head .fcount {
        color: #8a8a8a;
        flex-shrink: 0;
        font-weight: 400;
        white-space: nowrap;
      }

      td.line {
        color: #888;
        font-variant-numeric: tabular-nums;
        padding-left: 20px;
      }

      td.text {
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      mark {
        background: #6a4a00;
        color: #ffd479;
        border-radius: 2px;
        padding: 0 1px;
      }

      .heatmap {
        border: 1px solid #333;
        border-radius: 6px;
        display: none;
        flex-direction: column;
        inset: 0;
        padding: 12px;
        position: absolute;
      }

      .heatmap h2 {
        color: #aaa;
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 8px;
      }

      .heat-list {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 3px;
        min-height: 0;
        overflow-y: auto;
      }

      .heat-row {
        align-items: center;
        border: 1px solid transparent;
        border-radius: 4px;
        cursor: pointer;
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) minmax(0, 2fr) auto;
        padding: 3px 6px;
      }

      .heat-row:hover {
        background: #161616;
      }

      .heat-row.active {
        background: #16202e;
        border-color: #7fb2ff;
      }

      .heat-row .hp {
        direction: rtl;
        overflow: hidden;
        text-align: left;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .heat-row .hp span {
        direction: ltr;
        unicode-bidi: plaintext;
      }

      .heat-row .hp .base {
        font-weight: 700;
      }

      .heat-track {
        background: #222;
        border-radius: 3px;
        height: 10px;
        overflow: hidden;
      }

      .heat-fill {
        border-radius: 3px;
        height: 100%;
        min-width: 3px;
      }

      .heat-count {
        color: #ccc;
        font-variant-numeric: tabular-nums;
        text-align: right;
        white-space: nowrap;
      }

      .heat-count .hc-p {
        color: #8a8a8a;
        margin-left: 5px;
      }

      .heat-note {
        color: #aaa;
        font-size: 12px;
        margin-top: 8px;
      }

      .note {
        color: #aaa;
        margin-top: 8px;
      }

      .search-all-btn {
        margin-left: 8px;
        padding: 2px 10px;
        vertical-align: baseline;
      }

      .pager {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 12px;
      }

      .pager .page-info {
        color: #aaa;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      tbody tr.res-row {
        cursor: pointer;
      }

      tbody tr.res-row:hover td {
        background: #161616;
      }

      tbody tr.file-row {
        cursor: pointer;
      }

      tbody tr.file-row:hover td.file-head {
        background: #1b2634;
      }

      .viewer {
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        inset: 0;
        padding: 24px;
        position: fixed;
        z-index: 50;
      }

      .viewer[hidden] {
        display: none;
      }

      .viewer-box {
        background: #0d0d0d;
        border: 1px solid #333;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        margin: auto;
        max-height: 100%;
        max-width: none;
        overflow: hidden;
        width: 100%;
      }

      .viewer-head {
        align-items: center;
        border-bottom: 1px solid #222;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        padding: 10px 12px;
      }

      .viewer-title {
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .viewer-title .base {
        font-weight: 700;
      }

      .viewer-nav {
        align-items: center;
        display: flex;
        flex-shrink: 0;
        gap: 8px;
      }

      .viewer-nav .minfo {
        color: #aaa;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .viewer-body {
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12.5px;
        line-height: 1.5;
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 0;
        position: relative;
      }

      .viewer-body:focus {
        outline: none;
      }

      /* A 1px-wide spacer sizes the (possibly scaled) scrollbar; the window
         holds only the rows near the viewport and is repositioned per frame. */
      .v-spacer {
        width: 1px;
      }

      .v-window {
        left: 0;
        min-width: 100%;
        position: absolute;
        top: 0;
        width: max-content;
      }

      /* Fixed-height, non-wrapping rows: line N is always at (N-1) * rowH, so
         positioning any line is exact regardless of file size. Long lines scroll
         horizontally with the body rather than wrapping. */
      .v-line {
        display: flex;
        gap: 12px;
        height: var(--vrh, 18.75px);
        line-height: var(--vrh, 18.75px);
        min-width: 100%;
        overflow: hidden;
        padding: 0 12px;
        white-space: pre;
      }

      .v-line:hover {
        background: #141414;
      }

      .v-line.v-hit {
        background: #16202e;
      }

      .v-ln {
        color: #666;
        flex: 0 0 60px;
        font-variant-numeric: tabular-nums;
        text-align: right;
        user-select: none;
        width: 60px;
      }

      .v-tx {
        flex: 0 0 auto;
        white-space: pre;
      }

      mark.v-cur {
        background: #ffd479;
        color: #000;
        outline: 2px solid #ffd479;
      }

      /* Below this width the two top boxes stack. The heatmap returns to normal
         flow (its desktop layout fills the right cell absolutely), so these
         overrides must come after the base .heatmap / .heat-list rules to win. */
      @media (max-width: 820px) {
        .top-grid {
          grid-template-columns: 1fr;
        }

        .top-right {
          position: static;
        }

        .heatmap {
          position: static;
        }

        .heat-list {
          flex: none;
          max-height: 50vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="drop-overlay" id="drop-overlay" aria-hidden="true">
      <div class="drop-overlay-inner"><span class="drop-overlay-plus">+</span></div>
    </div>
    <main>
      <div class="top-grid">
        <div class="top-left">
          <label
            class="dropzone"
            id="dropzone"
            tabindex="0"
            aria-label="Choose a log folder, or drag and drop a folder or archive anywhere on the page"
          >
            <span class="dropzone-plus" aria-hidden="true">+</span>
            <p class="muted" id="selection"></p>
            <input id="folder" type="file" webkitdirectory directory multiple>
          </label>

          <div class="controls">
            <div>
              <input
                id="terms"
                type="text"
                value="ERROR, FATAL"
                placeholder="ERROR, FATAL, Exception"
                autocomplete="off"
                spellcheck="false"
                aria-label="Search terms"
              >
            </div>
            <div class="toggles">
              <label class="toggle"><input id="case" type="checkbox"> Case sensitive</label>
              <label class="toggle"><input id="regex" type="checkbox"> Regex</label>
            </div>
            <button id="search" class="primary" type="button" disabled>Search</button>
          </div>

          <div class="chips" id="quick-chips" aria-label="Quick add terms">
            <span class="chip" data-add="WARN">+ WARN</span>
            <span class="chip" data-add="WARNING">+ WARNING</span>
            <span class="chip" data-add="CRITICAL">+ CRITICAL</span>
            <span class="chip" data-add="Exception">+ Exception</span>
            <span class="chip" data-add="Traceback">+ Traceback</span>
            <span class="chip" data-add="panic">+ panic</span>
            <span class="chip" data-add="segfault">+ segfault</span>
          </div>

          <div class="actions">
            <button id="cancel" type="button" style="display: none;">Cancel</button>
          </div>

          <div class="progress" id="progress" style="display: none;">
            <p class="muted" id="progress-text"></p>
            <div class="bar"><span id="progress-bar"></span></div>
          </div>

          <p class="error" id="config-error" role="alert"></p>

          <section class="summary" id="summary" aria-live="polite"></section>

          <p class="note" id="scan-note"></p>
        </div>

        <div class="top-right">
          <section class="heatmap" id="heatmap" aria-label="File heatmap"></section>
        </div>
      </div>

      <div class="chips" id="term-filter" aria-label="Filter by term"></div>

      <div class="results-head" id="results-head" style="display: none;">
        <input id="filter" type="text" placeholder="Filter results by path or text..." autocomplete="off">
        <button id="download" type="button">Download CSV</button>
      </div>

      <p class="note" id="results-note"></p>

      <div class="pager" id="pager-top" style="display: none;"></div>

      <table id="results-table" style="display: none;">
        <colgroup>
          <col class="c-line">
          <col>
        </colgroup>
        <thead>
          <tr><th>Line</th><th>Match</th></tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>

      <div class="pager" id="pager-bottom" style="display: none;"></div>
    </main>

    <div class="viewer" id="viewer" hidden>
      <div class="viewer-box" role="dialog" aria-modal="true" aria-label="File viewer">
        <div class="viewer-head">
          <div class="viewer-title" id="viewer-title"></div>
          <div class="viewer-nav">
            <span class="minfo" id="viewer-minfo"></span>
            <button id="viewer-first" type="button" title="First match (Home)">&#8676; First</button>
            <button id="viewer-prev" type="button" title="Previous match (Up / Left arrow)">&uarr; Prev</button>
            <button id="viewer-next" type="button" title="Next match (Down / Right arrow)">&darr; Next</button>
            <button id="viewer-last" type="button" title="Last match (End)">Last &#8677;</button>
            <button id="viewer-close" type="button" title="Close (Esc)">Close</button>
          </div>
        </div>
        <div class="viewer-body" id="viewer-body" tabindex="0"></div>
      </div>
    </div>

    <script src="archives.js"></script>
    <script>
      // Retain matches until their text is estimated to use this much memory,
      // rather than a fixed count -- so a run with a few hundred thousand short
      // matches stays fully in memory (instant filtering) while a pathological
      // run with millions of matches still can't exhaust the tab. Each match
      // costs roughly its text length plus a small per-object overhead.
      const STORE_BUDGET = 400 * 1024 * 1024; // ~400 MB of retained match text
      const STORE_MATCH_OVERHEAD = 64; // approx per-match object cost, in bytes
      const matchCost = (text) => text.length + STORE_MATCH_OVERHEAD;
      const PAGE_SIZE = 1000; // matches shown per results page
      const BINARY_SNIFF_BYTES = 8000;
      const VIEWER_BLOCK_LINES = 500; // lines per virtualized viewer block
      // Browsers cap how tall an element can be (about 2^24 device pixels). On a
      // HiDPI display that is only ~8.4M CSS px -- far short of what a file with
      // hundreds of thousands of lines needs. Keep the scroll content under this
      // cap and map the scroll position across the full line range so every line
      // (and every match) stays reachable, no matter how large the file is.
      const VIEWER_MAX_CONTENT_PX = Math.floor(
        16000000 / (window.devicePixelRatio || 1)
      );

      const el = (id) => document.getElementById(id);
      const dropzone = el("dropzone");
      const dropOverlay = el("drop-overlay");
      const folderInput = el("folder");
      const selectionEl = el("selection");
      const termsInput = el("terms");
      const caseInput = el("case");
      const regexInput = el("regex");
      const searchBtn = el("search");
      const cancelBtn = el("cancel");
      const progressEl = el("progress");
      const progressText = el("progress-text");
      const progressBar = el("progress-bar");
      const configError = el("config-error");
      const summaryEl = el("summary");
      const heatmapEl = el("heatmap");
      const termFilterEl = el("term-filter");
      const resultsHead = el("results-head");
      const filterInput = el("filter");
      const downloadBtn = el("download");
      const resultsNote = el("results-note");
      const scanNote = el("scan-note");
      const resultsTable = el("results-table");
      const resultsBody = el("results-body");
      const pagerTop = el("pager-top");
      const pagerBottom = el("pager-bottom");
      const viewer = el("viewer");
      const viewerTitle = el("viewer-title");
      const viewerMinfo = el("viewer-minfo");
      const viewerFirst = el("viewer-first");
      const viewerPrev = el("viewer-prev");
      const viewerNext = el("viewer-next");
      const viewerLast = el("viewer-last");
      const viewerClose = el("viewer-close");
      const viewerBody = el("viewer-body");

      // Archive expansion (.zip/.tar/.tar.gz/.tgz/.gz) runs client-side via
      // archives.js. It needs the native DecompressionStream API; if that is
      // missing we still scan plain folders and just skip archives.
      const archivesSupported = !!(
        window.LogArchives && window.LogArchives.support().any
      );

      // Chromium's File System Access API can open the folder picker directly
      // in a well-known location (Downloads, below). Safari and Firefox don't
      // implement it, so this is a progressive enhancement over the plain
      // <input webkitdirectory> picker, whose start directory the browser
      // controls and a page cannot set.
      const directoryPickerSupported =
        typeof window.showDirectoryPicker === "function";

      // Selected files as { file, path }. Kept in memory so re-searching with
      // new terms just re-reads them (no need to hold every line in memory).
      let selected = [];
      let lastRun = null; // results of the most recent completed scan
      let activeTerm = null; // term chip filter, or null for all
      let activeFile = null; // heatmap file filter, or null for all
      let activeFileMatches = null; // all matches for activeFile, re-read on demand
      let activeFileCapped = false; // that re-read hit the per-file cap
      let currentPage = 0; // zero-based page shown in the results list
      let fileScanToken = 0; // guards against races when switching files fast
      let globalScan = null; // cached disk re-scan of matches for the active filter
      let globalScanToken = 0; // cancels a superseded global re-scan
      let globalScanLoading = false; // a global re-scan is currently in flight
      let running = false;
      let cancelRequested = false;
      let displayRoot = ""; // shared root folder/archive trimmed from shown paths
      let viewerData = null; // virtualized model of the file open in the viewer
      let viewerIdx = -1; // index of the focused match in viewerData.matchLines
      let viewerToken = 0; // guards against races when opening files quickly
      let viewerSpacer = null; // sizes the scrollbar to the (scaled) file height
      let viewerWindow = null; // holds only the rows near the viewport
      let viewerRaf = 0; // rAF handle coalescing scroll-driven re-renders

      // The drop box shows a single status line; empty text collapses it and
      // brings back the plus sign.
      function setDropInfo(text) {
        selectionEl.textContent = text || "";
        dropzone.classList.toggle("has-selection", !!text);
      }

      function setSelection(files) {
        selected = files;
        if (!files.length) {
          setDropInfo("");
          searchBtn.disabled = true;
          return;
        }
        const totalBytes = files.reduce((sum, f) => sum + f.file.size, 0);
        const root = files[0].path.split("/")[0] || "(folder)";
        setDropInfo(
          `${files.length.toLocaleString()} file${files.length === 1 ? "" : "s"} ` +
            `(${formatBytes(totalBytes)}) from "${root}"`
        );
        searchBtn.disabled = false;
      }

      function filesFromInput(fileList) {
        return Array.from(fileList).map((file) => ({
          file,
          path: file.webkitRelativePath || file.name,
        }));
      }

      // Recursively walk a FileSystemDirectoryHandle into the same
      // { file, path } shape the rest of the app uses. Paths are prefixed with
      // the chosen folder's own name so they read like webkitRelativePath.
      async function filesFromDirectoryHandle(dirHandle) {
        const out = [];
        const walk = async (handle, prefix) => {
          for await (const entry of handle.values()) {
            const path = prefix ? `${prefix}/${entry.name}` : entry.name;
            if (entry.kind === "file") {
              out.push({ file: await entry.getFile(), path });
            } else if (entry.kind === "directory") {
              await walk(entry, path);
            }
          }
        };
        await walk(dirHandle, dirHandle.name);
        return out;
      }

      // Open the folder picker. In Chromium this uses the File System Access
      // API so the dialog opens in Downloads; elsewhere it falls back to the
      // native <input webkitdirectory> picker (browser-chosen location).
      async function pickFolder() {
        if (!directoryPickerSupported) {
          folderInput.click();
          return;
        }
        let dirHandle;
        try {
          // No `id` is passed, so the picker opens in Downloads on every use
          // instead of reopening wherever the user last browsed.
          dirHandle = await window.showDirectoryPicker({ startIn: "downloads" });
        } catch (error) {
          // AbortError just means the picker was dismissed; on anything else
          // fall back to the native picker so folder selection still works.
          if (error && error.name === "AbortError") return;
          folderInput.click();
          return;
        }
        setDropInfo("Reading folder...");
        try {
          setSelection(await filesFromDirectoryHandle(dirHandle));
        } catch (error) {
          setDropInfo("");
          showConfigError(
            "Could not read the selected folder: " + error.message
          );
        }
      }

      folderInput.addEventListener("change", () => {
        setSelection(filesFromInput(folderInput.files));
      });

      // The dropzone is a <label> wrapping the file input, so a click normally
      // opens the native picker. When the File System Access API is available,
      // intercept that click and open the Downloads-rooted picker instead.
      dropzone.addEventListener("click", (event) => {
        if (!directoryPickerSupported) return;
        event.preventDefault();
        pickFolder();
      });

      // Drag & drop works anywhere on the page, not just over the dropzone. A
      // full-screen overlay appears while files are dragged in, and dropping a
      // folder, archive, or files reads them wherever they land. The depth
      // counter tracks dragenter/dragleave across nested elements so the
      // overlay does not flicker. Non-file drags (e.g. text into an input) are
      // left alone so the browser handles them normally.
      let dragDepth = 0;

      function dragHasFiles(event) {
        const dt = event.dataTransfer;
        return !!dt && Array.from(dt.types || []).includes("Files");
      }

      window.addEventListener("dragenter", (event) => {
        if (!dragHasFiles(event)) return;
        event.preventDefault();
        dragDepth++;
        dropOverlay.classList.add("active");
      });
      window.addEventListener("dragover", (event) => {
        if (!dragHasFiles(event)) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = "copy";
      });
      window.addEventListener("dragleave", (event) => {
        if (!dragHasFiles(event)) return;
        dragDepth = Math.max(0, dragDepth - 1);
        if (dragDepth === 0) dropOverlay.classList.remove("active");
      });
      window.addEventListener("drop", (event) => {
        if (!dragHasFiles(event)) return;
        event.preventDefault();
        dragDepth = 0;
        dropOverlay.classList.remove("active");
        ingestDataTransfer(event.dataTransfer);
      });

      // Read dropped items into the selection. Folders are traversed via the
      // entry API; browsers without it fall back to the flat file list. All
      // DataTransfer reads happen synchronously up front because it is cleared
      // once the drop handler returns.
      async function ingestDataTransfer(dataTransfer) {
        if (!dataTransfer) return;
        const entries = [];
        const items = dataTransfer.items;
        if (items && items.length) {
          for (const item of items) {
            const entry = item.webkitGetAsEntry && item.webkitGetAsEntry();
            if (entry) entries.push(entry);
          }
        }
        const flatFiles = entries.length
          ? null
          : Array.from(dataTransfer.files || []);

        if (entries.length) {
          setDropInfo("Reading folder...");
          try {
            const files = [];
            for (const entry of entries) {
              await walkEntry(entry, files);
            }
            setSelection(files);
          } catch (error) {
            setDropInfo("");
            showConfigError(
              "Could not read the dropped items: " + error.message
            );
          }
          return;
        }
        if (flatFiles && flatFiles.length) {
          setSelection(filesFromInput(flatFiles));
        }
      }

      dropzone.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          pickFolder();
        }
      });

      async function walkEntry(entry, out) {
        if (entry.isFile) {
          const file = await new Promise((resolve, reject) =>
            entry.file(resolve, reject)
          );
          out.push({ file, path: entry.fullPath.replace(/^\//, "") });
          return;
        }
        if (entry.isDirectory) {
          const reader = entry.createReader();
          // readEntries returns results in batches; keep calling until empty.
          while (true) {
            const batch = await new Promise((resolve, reject) =>
              reader.readEntries(resolve, reject)
            );
            if (!batch.length) break;
            for (const child of batch) {
              await walkEntry(child, out);
            }
          }
        }
      }

      // Quick-add chips append a term to the terms box.
      el("quick-chips").addEventListener("click", (event) => {
        const term = event.target && event.target.getAttribute("data-add");
        if (!term) return;
        const current = termsInput.value
          .split(",")
          .map((s) => s.trim())
          .filter(Boolean);
        if (!current.some((t) => t.toLowerCase() === term.toLowerCase())) {
          current.push(term);
          termsInput.value = current.join(", ");
        }
      });

      searchBtn.addEventListener("click", runSearch);
      cancelBtn.addEventListener("click", () => {
        cancelRequested = true;
      });
      termsInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !searchBtn.disabled && !running) runSearch();
      });
      filterInput.addEventListener(
        "input",
        debounce(() => {
          currentPage = 0;
          invalidateGlobalScan();
          renderResults();
        }, 150)
      );
      downloadBtn.addEventListener("click", downloadCsv);
      // The truncation note can carry a "Search all files" button that recovers
      // matches dropped past the in-memory store cap.
      resultsNote.addEventListener("click", (event) => {
        if (event.target.closest("#search-all")) runGlobalRescan();
      });
      pagerTop.addEventListener("click", onPagerClick);
      pagerBottom.addEventListener("click", onPagerClick);

      // Clicking a results row opens that file in the viewer, jumped to the
      // clicked line. Ignore the click if the user is selecting text.
      resultsBody.addEventListener("click", (event) => {
        const tr = event.target.closest("tr");
        if (!tr || !tr.dataset.path) return;
        const selection = window.getSelection && window.getSelection();
        if (selection && !selection.isCollapsed) return;
        openViewer(tr.dataset.path, Number(tr.dataset.line));
      });

      viewerFirst.addEventListener("click", () => setViewerMatch(0));
      viewerPrev.addEventListener("click", () => setViewerMatch(viewerIdx - 1));
      viewerNext.addEventListener("click", () => setViewerMatch(viewerIdx + 1));
      viewerLast.addEventListener("click", () =>
        setViewerMatch(viewerMatchCount() - 1)
      );
      viewerClose.addEventListener("click", closeViewer);
      // Click on the backdrop (not the dialog box) closes the viewer.
      viewer.addEventListener("mousedown", (event) => {
        if (event.target === viewer) closeViewer();
      });
      document.addEventListener("keydown", (event) => {
        if (viewer.hidden) return;
        if (event.key === "Escape") {
          closeViewer();
        } else if (event.key === "ArrowDown" || event.key === "ArrowRight") {
          event.preventDefault();
          setViewerMatch(viewerIdx + 1);
        } else if (event.key === "ArrowUp" || event.key === "ArrowLeft") {
          event.preventDefault();
          setViewerMatch(viewerIdx - 1);
        } else if (event.key === "Home" && viewerMatchCount()) {
          event.preventDefault();
          setViewerMatch(0);
        } else if (event.key === "End" && viewerMatchCount()) {
          event.preventDefault();
          setViewerMatch(viewerMatchCount() - 1);
        }
      });

      viewerBody.addEventListener("scroll", onViewerScroll);
      window.addEventListener("resize", () => {
        if (viewerData) scheduleViewerRender();
      });

      function parseTerms() {
        return termsInput.value
          .split(",")
          .map((s) => s.trim())
          .filter(Boolean);
      }

      function buildMatchers(terms) {
        const flags = caseInput.checked ? "" : "i";
        const asRegex = regexInput.checked;
        const source = terms
          .map((t) => (asRegex ? t : escapeRegex(t)))
          .map((t) => `(?:${t})`)
          .join("|");
        // Combined matcher for "does this line match anything" + highlighting.
        const combined = new RegExp(source, flags);
        const highlight = new RegExp(source, flags + "g");
        // Per-term matchers for the summary breakdown.
        const perTerm = terms.map((t) => ({
          term: t,
          re: new RegExp(asRegex ? t : escapeRegex(t), flags),
        }));
        return { combined, highlight, perTerm };
      }

      async function runSearch() {
        if (running) return;
        const terms = parseTerms();
        showConfigError("");
        if (!selected.length) {
          showConfigError("Choose a log folder first.");
          return;
        }
        if (!terms.length) {
          showConfigError("Enter at least one search term.");
          return;
        }

        let matchers;
        try {
          matchers = buildMatchers(terms);
        } catch (error) {
          showConfigError("Invalid regular expression: " + error.message);
          return;
        }

        running = true;
        cancelRequested = false;
        searchBtn.disabled = true;
        cancelBtn.style.display = "";
        progressEl.style.display = "";
        summaryEl.style.display = "none";
        heatmapEl.style.display = "none";
        heatmapEl.innerHTML = "";
        resultsHead.style.display = "none";
        resultsTable.style.display = "none";
        resultsNote.textContent = "";
        scanNote.textContent = "";
        termFilterEl.innerHTML = "";
        activeTerm = null;
        activeFile = null;
        activeFileMatches = null;
        activeFileCapped = false;
        currentPage = 0;
        fileScanToken++;
        globalScan = null;
        invalidateGlobalScan();

        const ctx = {
          matches: [],
          stored: 0,
          storedBytes: 0, // estimated memory used by retained match text
          totalMatches: 0,
          totalLines: 0,
          filesScanned: 0,
          filesSkipped: 0,
          bytesRead: 0,
          unsupported: 0, // archived entries we can't read (encrypted, etc.)
          archiveErrors: [], // archives that failed to parse
          archivesExpanded: 0,
          termCounts: Object.fromEntries(terms.map((t) => [t, 0])),
          fileCounts: Object.create(null),
          fileTerms: Object.create(null), // path -> Set of terms that matched in it
          fileCount: 0,
          matchers,
          startedAt: performance.now(),
          lastUi: 0,
        };

        // Expand archives into scan tasks up front. Each top-level selected item
        // is one task; an archive task fans out to all the files inside it.
        const { tasks, unsupportedArchives } = buildTasks(selected);
        ctx.archivesExpanded = tasks.filter((t) => t.archive).length;
        const totalTasks = tasks.length;
        try {
          for (let i = 0; i < tasks.length; i++) {
            if (cancelRequested) break;
            updateProgress(ctx, i, totalTasks, tasks[i].path);
            await tasks[i].run(ctx);
          }
        } catch (error) {
          showConfigError("Error while scanning: " + error.message);
        }

        ctx.elapsedMs = performance.now() - ctx.startedAt;
        ctx.cancelled = cancelRequested;
        lastRun = ctx;
        displayRoot = commonRoot(Object.keys(ctx.fileCounts));

        running = false;
        cancelBtn.style.display = "none";
        searchBtn.disabled = false;
        // Scan finished: hide the progress bar and its status line entirely.
        progressEl.style.display = "none";

        renderSummary(ctx);
        renderScanNote(ctx, unsupportedArchives);
        renderHeatmap(ctx);
        renderTermFilter(ctx);
        renderResults();
      }

      // Turn the flat selection into scan tasks, expanding archives when the
      // browser supports the decompression APIs archives.js relies on.
      function buildTasks(items) {
        const tasks = [];
        let unsupportedArchives = 0;
        for (const { file, path } of items) {
          const kind = window.LogArchives ? LogArchives.archiveKind(path) : null;
          if (kind) {
            if (LogArchives.canExpand(path)) {
              tasks.push({
                path,
                archive: true,
                run: (ctx) =>
                  LogArchives.extract(file, path, makeArchiveSink(ctx), {
                    isCancelled: () => cancelRequested,
                  }),
              });
              continue;
            }
            unsupportedArchives++;
          }
          tasks.push({
            path,
            archive: false,
            run: (ctx) => scanFile(file, path, ctx),
          });
        }
        return { tasks, unsupportedArchives };
      }

      // Sink that streams each inner archive file through a LineScanner, so the
      // scanning/highlighting logic is identical to plain files.
      function makeArchiveSink(ctx) {
        return {
          open(name) {
            return {
              name,
              scanner: makeLineScanner(name, ctx),
              decoder: new TextDecoder("utf-8", { fatal: false }),
              done: false,
            };
          },
          chunk(handle, bytes) {
            if (handle.done) return false;
            ctx.bytesRead += bytes.length;
            const text = handle.decoder.decode(bytes, { stream: true });
            if (text) handle.scanner.pushText(text);
            if (handle.scanner.binary) {
              handle.done = true;
              return false; // tell the extractor to stop reading this entry
            }
            const now = performance.now();
            if (now - ctx.lastUi > 120) {
              ctx.lastUi = now;
              liveProgress(ctx, handle.name);
            }
            return true;
          },
          close(handle) {
            if (!handle.done) {
              const tail = handle.decoder.decode();
              if (tail) handle.scanner.pushText(tail);
            }
            handle.scanner.finish();
            ctx.filesScanned++;
            if (handle.scanner.binary) ctx.filesSkipped++;
          },
          skip(_name, _reason) {
            ctx.filesScanned++;
            ctx.filesSkipped++;
            ctx.unsupported++;
          },
          error(path, err) {
            ctx.filesScanned++;
            ctx.filesSkipped++;
            ctx.archiveErrors.push(
              `${path}: ${(err && err.message) || "could not be read"}`
            );
          },
        };
      }

      function renderScanNote(ctx, unsupportedArchives) {
        const parts = [];
        if (ctx.archiveErrors.length) {
          parts.push(
            `${ctx.archiveErrors.length} archive${ctx.archiveErrors.length === 1 ? "" : "s"} ` +
              `could not be read: ${ctx.archiveErrors.slice(0, 3).join("; ")}` +
              (ctx.archiveErrors.length > 3 ? "; ..." : ".")
          );
        }
        if (ctx.unsupported) {
          parts.push(
            `${ctx.unsupported.toLocaleString()} archived ` +
              `entr${ctx.unsupported === 1 ? "y was" : "ies were"} skipped ` +
              `(encrypted or unsupported compression).`
          );
        }
        if (unsupportedArchives) {
          parts.push(
            `${unsupportedArchives} archive${unsupportedArchives === 1 ? "" : "s"} ` +
              `could not be expanded in this browser and ` +
              `${unsupportedArchives === 1 ? "was" : "were"} skipped.`
          );
        }
        scanNote.textContent = parts.join(" ");
      }

      // Line-by-line scanner shared by plain files and archived entries. It
      // sniffs the first chunk for a NUL byte to skip binary content.
      function makeLineScanner(path, ctx) {
        const { combined, perTerm } = ctx.matchers;
        let buffer = "";
        let lineNo = 0;
        let sniffed = false;
        let binary = false;
        return {
          get binary() {
            return binary;
          },
          pushText(text) {
            if (binary || !text) return;
            if (!sniffed) {
              sniffed = true;
              // NUL byte in the head strongly implies binary content; skip it.
              if (text.slice(0, BINARY_SNIFF_BYTES).includes("\u0000")) {
                binary = true;
                return;
              }
            }
            // The leftover buffer never contains "\n", so the first search can
            // skip it. Keeps files with very long lines linear-time.
            const searchFrom = buffer.length;
            buffer += text;
            let nl = buffer.indexOf("\n", searchFrom);
            while (nl !== -1) {
              let line = buffer.slice(0, nl);
              buffer = buffer.slice(nl + 1);
              if (line.endsWith("\r")) line = line.slice(0, -1);
              lineNo++;
              ctx.totalLines++;
              testLine(line, lineNo, path, ctx, combined, perTerm);
              nl = buffer.indexOf("\n");
            }
          },
          finish() {
            if (binary || !buffer.length) return;
            if (buffer.endsWith("\r")) buffer = buffer.slice(0, -1);
            lineNo++;
            ctx.totalLines++;
            testLine(buffer, lineNo, path, ctx, combined, perTerm);
          },
        };
      }

      async function scanFile(fileObj, path, ctx) {
        let stream;
        try {
          stream = fileObj
            .stream()
            .pipeThrough(new TextDecoderStream("utf-8", { fatal: false }));
        } catch (error) {
          ctx.filesScanned++;
          ctx.filesSkipped++;
          return;
        }

        const reader = stream.getReader();
        const scanner = makeLineScanner(path, ctx);
        try {
          while (true) {
            if (cancelRequested) break;
            const { value, done } = await reader.read();
            if (done) break;
            ctx.bytesRead += value.length;
            scanner.pushText(value);
            if (scanner.binary) {
              try {
                await reader.cancel();
              } catch (e) {}
              break;
            }
            const now = performance.now();
            if (now - ctx.lastUi > 120) {
              ctx.lastUi = now;
              liveProgress(ctx, path);
            }
          }
          if (!cancelRequested) scanner.finish();
        } finally {
          try {
            reader.releaseLock();
          } catch (e) {}
        }

        ctx.filesScanned++;
        if (scanner.binary) ctx.filesSkipped++;
      }

      function testLine(line, lineNo, path, ctx, combined, perTerm) {
        if (!combined.test(line)) return;
        // Counts are the *true* totals across the whole scan so the heatmap,
        // term chips, and summary show the real picture. The results list keeps
        // match text only up to STORE_BUDGET of memory; if that fills, a filter
        // (or a heatmap file click) re-reads from disk to recover the rest.
        ctx.totalMatches++;
        ctx.fileCounts[path] = (ctx.fileCounts[path] || 0) + 1;
        for (const t of perTerm) {
          if (t.re.test(line)) {
            ctx.termCounts[t.term]++;
            // Remember which terms a file contains so a term-scoped re-scan can
            // skip files that can't possibly hold that term's matches.
            (ctx.fileTerms[path] || (ctx.fileTerms[path] = new Set())).add(
              t.term
            );
          }
        }
        if (ctx.storedBytes < STORE_BUDGET) {
          // Guard against pathologically long lines blowing up memory/DOM.
          const text = line.length > 4000 ? line.slice(0, 4000) + " ..." : line;
          ctx.matches.push({ path, lineNo, text });
          ctx.stored++;
          ctx.storedBytes += matchCost(text);
        }
      }

      function updateProgress(ctx, index, total, path) {
        progressBar.style.width = `${Math.round((index / total) * 100)}%`;
        progressText.textContent =
          `Scanning ${index + 1} / ${total}: ${path} ` +
          `-- ${ctx.totalMatches.toLocaleString()} matches`;
      }

      function liveProgress(ctx, path) {
        progressText.textContent =
          `Scanning: ${path} -- ` +
          `${ctx.totalMatches.toLocaleString()} matches, ` +
          `${ctx.totalLines.toLocaleString()} lines`;
      }

      function renderSummary(ctx) {
        const stats = [
          ["Matches", ctx.totalMatches],
          ["Files scanned", ctx.filesScanned],
          ["Files skipped", ctx.filesSkipped],
          ["Lines searched", ctx.totalLines],
          ["Time", `${(ctx.elapsedMs / 1000).toFixed(1)}s`],
        ];
        summaryEl.innerHTML = "";
        for (const [k, v] of stats) {
          const stat = document.createElement("div");
          stat.className = "stat";
          const n = document.createElement("div");
          n.className = "n";
          n.textContent = typeof v === "number" ? v.toLocaleString() : v;
          const label = document.createElement("div");
          label.className = "k";
          label.textContent = k;
          stat.append(n, label);
          summaryEl.appendChild(stat);
        }
        summaryEl.style.display = "flex";
      }

      const HEAT_LIMIT = 100; // max file rows drawn in the heatmap

      function renderHeatmap(ctx) {
        heatmapEl.innerHTML = "";
        const entries = Object.keys(ctx.fileCounts)
          .map((path) => [path, ctx.fileCounts[path]])
          .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

        if (!entries.length) {
          heatmapEl.style.display = "none";
          return;
        }

        const shown = entries.slice(0, HEAT_LIMIT);
        const max = entries[0][1];

        const heading = document.createElement("h2");
        heading.textContent =
          `${entries.length.toLocaleString()} ` +
          `file${entries.length === 1 ? "" : "s"} with matches ` +
          `(click to filter)`;
        heatmapEl.appendChild(heading);

        const list = document.createElement("div");
        list.className = "heat-list";

        for (const [path, count] of shown) {
          // Log scale keeps low-count files visible next to a runaway file.
          const intensity =
            max > 1 ? Math.log(count + 1) / Math.log(max + 1) : 1;

          const row = document.createElement("div");
          row.className = "heat-row" + (activeFile === path ? " active" : "");
          row.dataset.file = path;
          row.title =
            `${path} -- ${count.toLocaleString()} match${count === 1 ? "" : "es"} ` +
            `(${formatPercent(count, ctx.totalMatches)})`;

          const hp = document.createElement("div");
          hp.className = "hp";
          const inner = document.createElement("span");
          inner.innerHTML = formatPath(path);
          hp.appendChild(inner);

          const track = document.createElement("div");
          track.className = "heat-track";
          const fill = document.createElement("div");
          fill.className = "heat-fill";
          fill.style.width = `${Math.max(3, Math.round(intensity * 100))}%`;
          fill.style.background = heatColor(intensity);
          track.appendChild(fill);

          const countEl = document.createElement("div");
          countEl.className = "heat-count";
          const countN = document.createElement("span");
          countN.className = "hc-n";
          countN.textContent = count.toLocaleString();
          const countP = document.createElement("span");
          countP.className = "hc-p";
          countP.textContent = `(${formatPercent(count, ctx.totalMatches)})`;
          countEl.append(countN, countP);

          row.append(hp, track, countEl);
          row.addEventListener("click", () => selectHeatFile(path));
          list.appendChild(row);
        }
        heatmapEl.appendChild(list);

        if (entries.length > shown.length) {
          const note = document.createElement("p");
          note.className = "heat-note";
          note.textContent =
            `Showing the top ${shown.length} files by hit count.`;
          heatmapEl.appendChild(note);
        }
        heatmapEl.style.display = "flex";
      }

      function syncHeatRows() {
        for (const row of heatmapEl.querySelectorAll(".heat-row")) {
          row.classList.toggle("active", (row.dataset.file || null) === activeFile);
        }
      }

      function scrollToResults() {
        if (resultsHead.style.display !== "none") {
          resultsHead.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
      }

      // Clicking a heatmap file filters the results to it. If the scan filled
      // the memory budget, this file's rows may be missing from the in-memory
      // store, so re-read just this one file to recover all of them.
      async function selectHeatFile(path) {
        const turningOff = activeFile === path;
        activeFile = turningOff ? null : path;
        activeFileMatches = null;
        activeFileCapped = false;
        currentPage = 0;
        fileScanToken++;
        invalidateGlobalScan();
        syncHeatRows();

        if (!activeFile) {
          renderResults();
          return;
        }

        // Fast path: nothing was dropped, so the store already has every match.
        if (!lastRun || lastRun.totalMatches <= lastRun.stored) {
          renderResults();
          scrollToResults();
          return;
        }

        const token = fileScanToken;
        const expected = (lastRun.fileCounts[path] || 0).toLocaleString();
        resultsHead.style.display = "none";
        resultsTable.style.display = "none";
        resultsBody.innerHTML = "";
        resultsNote.textContent =
          `Loading all ${expected} matches in "${stripRoot(path)}"...`;

        let rescanned = null;
        try {
          rescanned = await rescanFileMatches(path);
        } catch (e) {
          rescanned = null;
        }
        // Bail if the user switched files (or cleared) while we were reading.
        if (token !== fileScanToken || activeFile !== path) return;

        if (rescanned) {
          activeFileMatches = rescanned.matches;
          activeFileCapped = rescanned.capped;
        }
        renderResults();
        scrollToResults();
      }

      // Re-read one file (from disk or its archive) and collect every matching
      // line, streaming so the whole file is never held in memory. Capped per
      // file to keep memory bounded; reading stops as soon as the cap is hit.
      async function rescanFileMatches(path) {
        const source = findSource(path);
        if (!source) return null;

        const token = fileScanToken;
        const combined = lastRun.matchers.combined;
        const matches = [];
        let bytes = 0;
        let capped = false;
        const ok = await streamSourceLines(source, {
          shouldStop: () => capped || token !== fileScanToken,
          onLine(line, lineNo) {
            if (capped || !combined.test(line)) return;
            if (bytes >= STORE_BUDGET) {
              capped = true;
              return;
            }
            const text =
              line.length > 4000 ? line.slice(0, 4000) + " ..." : line;
            bytes += matchCost(text);
            matches.push({ path, lineNo, text });
          },
        });
        if (!ok && !capped) return null;
        return { matches, capped };
      }

      // Blue (few hits) -> red (most hits) heat scale for the dark theme.
      function heatColor(ratio) {
        const r = Math.max(0, Math.min(1, ratio));
        const hue = 210 - 210 * r;
        return `hsl(${hue}, 85%, 52%)`;
      }

      // Each heatmap row shows its raw count and its share of all matches.
      function formatPercent(part, total) {
        if (!total) return "0%";
        const pct = (part / total) * 100;
        if (pct >= 10) return `${pct.toFixed(0)}%`;
        if (pct >= 0.1) return `${pct.toFixed(1)}%`;
        return pct > 0 ? "<0.1%" : "0%";
      }

      function renderTermFilter(ctx) {
        termFilterEl.innerHTML = "";
        const terms = Object.keys(ctx.termCounts);
        if (terms.length <= 1 && !ctx.totalMatches) return;

        const all = document.createElement("span");
        all.className = "chip" + (activeTerm === null ? " active" : "");
        all.textContent = `All (${ctx.totalMatches.toLocaleString()})`;
        all.addEventListener("click", () => {
          activeTerm = null;
          currentPage = 0;
          invalidateGlobalScan();
          syncTermChips();
          renderResults();
        });
        termFilterEl.appendChild(all);

        for (const term of terms) {
          const chip = document.createElement("span");
          chip.className = "chip" + (activeTerm === term ? " active" : "");
          chip.dataset.term = term;
          chip.textContent = `${term} (${ctx.termCounts[term].toLocaleString()})`;
          chip.addEventListener("click", () => {
            activeTerm = activeTerm === term ? null : term;
            currentPage = 0;
            invalidateGlobalScan();
            syncTermChips();
            renderResults();
          });
          termFilterEl.appendChild(chip);
        }
      }

      function syncTermChips() {
        for (const chip of termFilterEl.children) {
          const term = chip.dataset.term || null;
          chip.classList.toggle("active", term === activeTerm);
        }
      }

      function activeTermRegex() {
        if (!activeTerm) return null;
        const flags = caseInput.checked ? "" : "i";
        const src = regexInput.checked ? activeTerm : escapeRegex(activeTerm);
        try {
          return new RegExp(src, flags);
        } catch (e) {
          return null;
        }
      }

      // True when the scan found more matches than the in-memory store could
      // hold, so the results list is only a prefix of every match.
      function storeCapped() {
        return !!lastRun && lastRun.totalMatches > lastRun.stored;
      }

      // Identifies a global re-scan by the filter it was run for, so a cached
      // result is reused only while the term/text filter is unchanged.
      function globalScanKey() {
        return (activeTerm || "") + "\u0000" + filterInput.value.trim();
      }

      // A term chip or free-text filter can only see the matches kept in the
      // capped store. When the scan overflowed it, the active filter needs a
      // fresh disk re-scan to be complete. (A selected heatmap file already gets
      // its own full re-read, so it never needs this.)
      function needsGlobalRescan() {
        return (
          !activeFile &&
          storeCapped() &&
          !!(activeTerm || filterInput.value.trim())
        );
      }

      function invalidateGlobalScan() {
        globalScanToken++;
        globalScanLoading = false;
      }

      function searchAllButtonHtml() {
        const q = activeTerm || filterInput.value.trim();
        const label = q
          ? `Search all files for "${escapeHtml(q)}"`
          : "Search all files";
        return `<button type="button" id="search-all" class="search-all-btn">${label}</button>`;
      }

      // Re-read every matched file from disk (streaming) and collect the lines
      // that pass the active term/text filter, so a capped store no longer hides
      // matches. When a term chip is active the read is scoped to just the files
      // known to contain that term; the read is cancelled if the filter changes.
      async function runGlobalRescan() {
        if (!lastRun || !needsGlobalRescan()) return;
        const key = globalScanKey();
        if (globalScan && globalScan.key === key) {
          renderResults();
          return;
        }
        const token = ++globalScanToken;
        globalScanLoading = true;

        const combined = lastRun.matchers.combined;
        const termRe = activeTermRegex();
        const filterText = filterInput.value.trim().toLowerCase();
        const paths =
          activeTerm && lastRun.fileTerms
            ? Object.keys(lastRun.fileCounts).filter(
                (p) =>
                  lastRun.fileTerms[p] && lastRun.fileTerms[p].has(activeTerm)
              )
            : Object.keys(lastRun.fileCounts);

        const matches = [];
        let bytes = 0;
        let capped = false;
        resultsNote.textContent = `Searching all files... 0 / ${paths.length}`;
        for (let i = 0; i < paths.length; i++) {
          if (token !== globalScanToken) return; // superseded by a newer filter
          if (capped) break;
          const path = paths[i];
          const source = findSource(path);
          if (source) {
            await streamSourceLines(source, {
              shouldStop: () => capped || token !== globalScanToken,
              onLine(line, lineNo) {
                if (capped || !combined.test(line)) return;
                if (termRe && !termRe.test(line)) return;
                if (
                  filterText &&
                  !line.toLowerCase().includes(filterText) &&
                  !path.toLowerCase().includes(filterText)
                ) {
                  return;
                }
                if (bytes >= STORE_BUDGET) {
                  capped = true;
                  return;
                }
                const text =
                  line.length > 4000 ? line.slice(0, 4000) + " ..." : line;
                bytes += matchCost(text);
                matches.push({ path, lineNo, text });
              },
            });
          }
          if (token !== globalScanToken) return;
          resultsNote.textContent =
            `Searching all files... ${i + 1} / ${paths.length} scanned, ` +
            `${matches.length.toLocaleString()} found`;
        }
        if (token !== globalScanToken) return;
        globalScan = { key, matches, capped };
        globalScanLoading = false;
        currentPage = 0;
        renderResults();
        scrollToResults();
      }

      // The active match set: a heatmap file's fully re-read matches when one is
      // selected, a completed global re-scan when the capped store was searched
      // for the current filter, otherwise the global (capped) store.
      function currentSource() {
        if (activeFile && activeFileMatches) {
          return { mode: "file", matches: activeFileMatches };
        }
        if (!activeFile && globalScan && globalScan.key === globalScanKey()) {
          return { mode: "scan", matches: globalScan.matches };
        }
        return { mode: "store", matches: lastRun.matches };
      }

      // Predicate for the term chip + free-text filters over the active set.
      function currentPredicate(usingFileSet) {
        const filterText = filterInput.value.trim().toLowerCase();
        const termRe = activeTermRegex();
        return (m) => {
          // currentSource already scopes to the file when a re-read set is in
          // use; only the shared global store needs the explicit path check.
          if (activeFile && !usingFileSet && m.path !== activeFile) return false;
          if (termRe && !termRe.test(m.text)) return false;
          if (
            filterText &&
            !m.text.toLowerCase().includes(filterText) &&
            !m.path.toLowerCase().includes(filterText)
          ) {
            return false;
          }
          return true;
        };
      }

      function renderResults() {
        if (!lastRun) return;
        const { mode, matches: source } = currentSource();
        const usingFileSet = mode === "file";
        const passes = currentPredicate(usingFileSet);

        // Collect every match that passes the current filters, then show one
        // page of PAGE_SIZE matches at a time. This keeps the whole result set
        // reachable while never putting more than a page of rows in the DOM.
        const filtered = [];
        for (const m of source) {
          if (passes(m)) filtered.push(m);
        }

        const pageCount = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
        currentPage = Math.min(Math.max(0, currentPage), pageCount - 1);
        const start = currentPage * PAGE_SIZE;
        const end = Math.min(start + PAGE_SIZE, filtered.length);
        const pageMatches = filtered.slice(start, end);

        // Group this page's matches by file (in the order files are first
        // seen) so the list shows one header row per file with its lines
        // beneath.
        const groups = new Map(); // path -> matches[]
        for (const m of pageMatches) {
          let group = groups.get(m.path);
          if (!group) {
            group = [];
            groups.set(m.path, group);
          }
          group.push(m);
        }

        resultsBody.innerHTML = "";
        const frag = document.createDocumentFragment();
        const highlight = lastRun.matchers.highlight;
        for (const [path, group] of groups) {
          // A clickable header row per file (opens the file at its first match),
          // followed by a row for each matching line in the file.
          const headTr = document.createElement("tr");
          headTr.className = "file-row";
          headTr.dataset.path = path;
          headTr.dataset.line = group[0].lineNo;
          headTr.title = "Click to open this file with matches highlighted";

          const headTd = document.createElement("td");
          headTd.className = "file-head";
          headTd.colSpan = 2;
          const count = group.length;
          headTd.innerHTML =
            `<div class="fh-inner">` +
            `<span class="fh-path">${formatPath(path)}</span>` +
            `<span class="fcount">${count.toLocaleString()} ` +
            `match${count === 1 ? "" : "es"}</span>` +
            `</div>`;
          headTr.appendChild(headTd);
          frag.appendChild(headTr);

          for (const m of group) {
            const tr = document.createElement("tr");
            tr.className = "res-row";
            tr.dataset.path = m.path;
            tr.dataset.line = m.lineNo;
            tr.title = "Click to open this file with matches highlighted";

            const lineTd = document.createElement("td");
            lineTd.className = "line";
            lineTd.textContent = m.lineNo;

            const textTd = document.createElement("td");
            textTd.className = "text";
            textTd.innerHTML = highlightText(m.text, highlight);

            tr.append(lineTd, textTd);
            frag.appendChild(tr);
          }
        }
        resultsBody.appendChild(frag);

        resultsTable.style.display = pageMatches.length ? "table" : "none";
        resultsHead.style.display = lastRun.matches.length ? "flex" : "none";
        renderPagination(filtered.length, pageCount, start, end);

        if (!lastRun.totalMatches) {
          resultsNote.textContent = "No matches found.";
          return;
        }

        // Note parts may include a "Search all files" button, so they are HTML.
        const parts = [];
        if (activeFile) {
          parts.push(
            `Filtered to file "${escapeHtml(stripRoot(activeFile))}" (click it again to clear).`
          );
        }

        if (mode === "file") {
          // This file's lines were re-read from disk in full.
          if (activeFileCapped) {
            parts.push(
              `This file has too many matches to hold in memory at once; ` +
                `filter or download the CSV to narrow them.`
            );
          }
        } else if (mode === "scan") {
          // The capped store was re-scanned from disk for this filter, so the
          // list below is now complete (up to the store cap).
          parts.push(
            `Searched all files: ${filtered.length.toLocaleString()} ` +
              `match${filtered.length === 1 ? "" : "es"} for this filter.`
          );
          if (globalScan && globalScan.capped) {
            parts.push(
              `Stopped after filling the memory budget; ` +
                `narrow the filter to see them all.`
            );
          }
        } else if (activeFile) {
          // A file is selected but we fell back to the in-memory store (its
          // re-read was unavailable), so some of its lines may be missing.
          if (storeCapped()) {
            parts.push(
              "Showing only the matches kept in memory for this file; a re-read " +
                "was unavailable, so some may be missing."
            );
          }
        } else if (needsGlobalRescan()) {
          // The active filter has only searched the capped in-memory store, so
          // matches dropped past the cap are missing. Offer a full disk re-scan.
          if (globalScanLoading) {
            parts.push("Searching all files...");
          } else {
            if (activeTerm) {
              const known = lastRun.termCounts[activeTerm] || 0;
              parts.push(
                `Showing ${filtered.length.toLocaleString()} of ` +
                  `${known.toLocaleString()} "${escapeHtml(activeTerm)}" ` +
                  `match${known === 1 ? "" : "es"} kept in memory.`
              );
            } else {
              parts.push(
                `The results list holds only the first ` +
                  `${lastRun.stored.toLocaleString()} of ` +
                  `${lastRun.totalMatches.toLocaleString()} matches, so this ` +
                  `filter searched just those.`
              );
            }
            parts.push(searchAllButtonHtml());
          }
        } else if (!activeFile && storeCapped()) {
          // No filter yet, but the store is capped -- tell the user the list is
          // a prefix and how to reach the rest.
          parts.push(
            `Showing the first ${lastRun.stored.toLocaleString()} of ` +
              `${lastRun.totalMatches.toLocaleString()} matches kept in memory. ` +
              `Pick a term, type a filter, or click a file to search them all.`
          );
        }
        resultsNote.innerHTML = parts.join(" ");
      }

      // Draw the Prev / Next controls above and below the table. Hidden when
      // everything fits on a single page.
      function renderPagination(total, pageCount, start, end) {
        if (total <= PAGE_SIZE) {
          pagerTop.style.display = "none";
          pagerBottom.style.display = "none";
          pagerTop.innerHTML = "";
          pagerBottom.innerHTML = "";
          return;
        }
        const info =
          `Page ${(currentPage + 1).toLocaleString()} of ` +
          `${pageCount.toLocaleString()} \u00b7 matches ` +
          `${(start + 1).toLocaleString()}\u2013${end.toLocaleString()} of ` +
          `${total.toLocaleString()}`;
        const prevDis = currentPage <= 0 ? " disabled" : "";
        const nextDis = currentPage >= pageCount - 1 ? " disabled" : "";
        const html =
          `<button type="button" data-page="prev"${prevDis}>&larr; Prev</button>` +
          `<span class="page-info">${info}</span>` +
          `<button type="button" data-page="next"${nextDis}>Next &rarr;</button>`;
        pagerTop.innerHTML = html;
        pagerBottom.innerHTML = html;
        pagerTop.style.display = "flex";
        pagerBottom.style.display = "flex";
      }

      function onPagerClick(event) {
        const btn = event.target.closest("button[data-page]");
        if (!btn || btn.disabled) return;
        gotoPage(currentPage + (btn.dataset.page === "next" ? 1 : -1));
      }

      function gotoPage(page) {
        currentPage = page;
        renderResults();
        // Land at the top of the results so a new page starts from its first
        // row rather than wherever the previous page was scrolled to.
        resultsHead.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function highlightText(text, highlightRe) {
        highlightRe.lastIndex = 0;
        let result = "";
        let last = 0;
        let match;
        let guard = 0;
        while ((match = highlightRe.exec(text)) !== null) {
          if (match.index >= last) {
            result += escapeHtml(text.slice(last, match.index));
            result += "<mark>" + escapeHtml(match[0]) + "</mark>";
            last = match.index + match[0].length;
          }
          // Avoid infinite loop on zero-width matches.
          if (match.index === highlightRe.lastIndex) highlightRe.lastIndex++;
          if (++guard > 5000) break;
        }
        result += escapeHtml(text.slice(last));
        return result;
      }

      function formatPath(path) {
        const shown = stripRoot(path);
        const idx = shown.lastIndexOf("/");
        if (idx === -1) return `<span class="base">${escapeHtml(shown)}</span>`;
        const dir = shown.slice(0, idx + 1);
        const base = shown.slice(idx + 1);
        return (
          escapeHtml(dir) + `<span class="base">${escapeHtml(base)}</span>`
        );
      }

      // The directory prefix shared by every matched file is noise on each row,
      // so we hide it and show only the part below it. Stripping the whole common
      // prefix (never a file's own basename) lets a plain folder and an archive of
      // that same folder read identically: the archive's filename and the single
      // root folder inside it both fall away, just like a selected folder's name.
      function commonRoot(paths) {
        if (!paths.length) return "";
        const prefix = paths[0].split("/");
        // Never strip a file's own basename, so cap the prefix one segment short
        // of the shallowest path.
        let common = prefix.length - 1;
        for (const p of paths) {
          const segs = p.split("/");
          common = Math.min(common, segs.length - 1);
          let i = 0;
          while (i < common && segs[i] === prefix[i]) i++;
          common = i;
          if (common <= 0) return "";
        }
        return prefix.slice(0, common).join("/");
      }

      function stripRoot(path) {
        if (displayRoot && path.startsWith(displayRoot + "/")) {
          return path.slice(displayRoot.length + 1);
        }
        return path;
      }

      function downloadCsv() {
        if (!lastRun) return;
        // Export exactly what the current filters show (file, term, free text),
        // including a heatmap file's fully re-read matches or a global re-scan.
        const { mode, matches: source } = currentSource();
        const passes = currentPredicate(mode === "file");
        const rows = [["file", "line", "text"]];
        for (const m of source) {
          if (passes(m)) rows.push([m.path, String(m.lineNo), m.text]);
        }
        if (rows.length === 1) return;
        const csv = rows
          .map((r) => r.map(csvCell).join(","))
          .join("\r\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "logsearch-results.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function csvCell(value) {
        const needsQuotes = /[",\r\n]/.test(value);
        const escaped = value.replace(/"/g, '""');
        return needsQuotes ? `"${escaped}"` : escaped;
      }

      // ---- file viewer -------------------------------------------------------

      // Map a result path back to the selected source that can produce its bytes.
      // Plain files match directly; archived entries are prefixed with their
      // archive's path (except single .gz files, whose entry drops the suffix).
      function findSource(path) {
        for (const item of selected) {
          const kind = window.LogArchives
            ? LogArchives.archiveKind(item.path)
            : null;
          if (!kind && item.path === path) {
            return { kind: "file", file: item.file };
          }
        }
        for (const item of selected) {
          const kind = window.LogArchives
            ? LogArchives.archiveKind(item.path)
            : null;
          if (!kind) continue;
          if (kind === "gzip") {
            const inner = item.path.replace(/\.(gz|gzip)$/i, "") || item.path;
            if (path === inner) {
              return {
                kind: "archive",
                file: item.file,
                archivePath: item.path,
                innerPath: inner,
              };
            }
          } else if (path.startsWith(item.path + "/")) {
            return {
              kind: "archive",
              file: item.file,
              archivePath: item.path,
              innerPath: path,
            };
          }
        }
        return null;
      }

      // Split streamed text into lines with the same semantics as
      // String.split("\n"): every "\n" ends a line, a trailing newline yields a
      // final empty line, and a lone "\r" before the newline is stripped.
      function lineEmitter(onLine) {
        let buffer = "";
        let lineNo = 0;
        return {
          push(text) {
            // The leftover buffer never contains "\n", so the search can skip
            // it. Keeps very long lines (rare, but huge) linear-time.
            const searchFrom = buffer.length;
            buffer += text;
            let nl = buffer.indexOf("\n", searchFrom);
            while (nl !== -1) {
              let line = buffer.slice(0, nl);
              buffer = buffer.slice(nl + 1);
              if (line.endsWith("\r")) line = line.slice(0, -1);
              onLine(line, ++lineNo);
              nl = buffer.indexOf("\n");
            }
          },
          finish() {
            // A trailing "\n" leaves an empty buffer; emitting it would invent a
            // phantom last line and disagree with the search's line numbering.
            if (!buffer.length) return;
            let line = buffer;
            buffer = "";
            if (line.endsWith("\r")) line = line.slice(0, -1);
            onLine(line, ++lineNo);
          },
        };
      }

      // Stream a findSource() result line-by-line without ever buffering the
      // whole file. Used by the viewer and the heatmap re-read. Returns true
      // when the source was fully streamed, false if it was cancelled via
      // shouldStop() or could not be found/read.
      async function streamSourceLines(source, handlers) {
        const emitter = lineEmitter(handlers.onLine);
        const decoder = new TextDecoder("utf-8", { fatal: false });
        const stopped = () => !!(handlers.shouldStop && handlers.shouldStop());

        if (source.kind === "file") {
          let reader;
          try {
            reader = source.file.stream().getReader();
          } catch (error) {
            return false;
          }
          let read = 0;
          try {
            while (true) {
              if (stopped()) {
                try {
                  await reader.cancel();
                } catch (e) {}
                return false;
              }
              const { value, done } = await reader.read();
              if (done) break;
              read += value.byteLength;
              const text = decoder.decode(value, { stream: true });
              if (text) emitter.push(text);
              if (handlers.onBytes) handlers.onBytes(read, source.file.size);
            }
          } catch (error) {
            return false;
          } finally {
            try {
              reader.releaseLock();
            } catch (e) {}
          }
          const tail = decoder.decode();
          if (tail) emitter.push(tail);
          emitter.finish();
          return true;
        }

        // Archive entry: extractEntry jumps straight to the entry for ZIP and
        // walks (with early exit) for TAR/GZ. Bytes arrive already decompressed.
        let found = false;
        let doneTarget = false;
        let read = 0;
        let total = 0;
        const sink = {
          open(name, sizeHint) {
            if (doneTarget || found || name !== source.innerPath) return null;
            found = true;
            total = sizeHint || 0;
            return { name };
          },
          chunk(_handle, bytes) {
            if (stopped()) return false;
            read += bytes.length;
            const text = decoder.decode(bytes, { stream: true });
            if (text) emitter.push(text);
            if (handlers.onBytes) handlers.onBytes(read, total);
            return true;
          },
          close() {
            doneTarget = true;
          },
          skip() {},
          error() {},
        };
        try {
          await LogArchives.extractEntry(
            source.file,
            source.archivePath,
            source.innerPath,
            sink,
            { isCancelled: () => doneTarget || stopped() }
          );
        } catch (error) {
          return false;
        }
        if (!found || stopped()) return false;
        const tail = decoder.decode();
        if (tail) emitter.push(tail);
        emitter.finish();
        return true;
