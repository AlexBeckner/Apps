      }

      // First index in the sorted array whose value is >= target.
      function lowerBound(arr, target) {
        let lo = 0;
        let hi = arr.length;
        while (lo < hi) {
          const mid = (lo + hi) >> 1;
          if (arr[mid] < target) lo = mid + 1;
          else hi = mid;
        }
        return lo;
      }

      // Count the marks highlightText() would produce for this line, mirroring
      // its overlap handling and its runaway-line guard so the match index and
      // the rendered marks always agree.
      function countLineMatches(text, highlightRe) {
        highlightRe.lastIndex = 0;
        let count = 0;
        let last = 0;
        let match;
        let guard = 0;
        while ((match = highlightRe.exec(text)) !== null) {
          if (match.index >= last) {
            count++;
            last = match.index + match[0].length;
          }
          if (match.index === highlightRe.lastIndex) highlightRe.lastIndex++;
          if (++guard > 5000) break;
        }
        return count;
      }

      function viewerMessage(message) {
        viewerBody.innerHTML = "";
        const line = document.createElement("div");
        line.className = "v-line";
        const text = document.createElement("span");
        text.className = "v-tx";
        text.textContent = message;
        line.appendChild(text);
        viewerBody.appendChild(line);
      }

      // The viewer is virtualized so huge files open instantly and scroll
      // smoothly. The file streams in as blocks of VIEWER_BLOCK_LINES lines
      // (one string + a line-offset table per block, no DOM) for O(1) line
      // lookup, and only the ~screenful of lines around the scroll position is
      // ever in the DOM. Rows have a fixed height, so any line's position is
      // computed directly; for files taller than the browser's element-height
      // cap the scroll range is scaled onto the full file, keeping every line
      // and match reachable. Match positions are indexed during the streamed
      // read, so the counter and First/Prev/Next/Last cover the entire file.

      function viewerMatchCount() {
        return viewerData ? viewerData.matchLines.length : 0;
      }

      function newViewerData(hitLine, highlight) {
        return {
          blocks: [], // { first, count, text, starts } for O(1) line lookup
          pending: [], // lines waiting to be sealed into the next block
          matchLines: [], // line number of every match, in order
          lineCount: 0,
          hitLine,
          highlight,
          loaded: false,
          jumped: false, // the initial jump to the clicked line happened
          progressPct: null,
          lastUi: 0,
          rowH: 18.75, // measured height of one rendered row, in px
          anchorVirtualTop: null, // exact virtual offset to hold after a jump
          programmaticScroll: false, // the next scroll event is one we caused
          lastScrollTop: 0, // last vertical offset, to spot horizontal scrolls
        };
      }

      function sealViewerBlock(data) {
        const lines = data.pending;
        if (!lines.length) return;
        data.pending = [];
        const count = lines.length;
        const starts = new Uint32Array(count);
        let offset = 0;
        for (let i = 0; i < count; i++) {
          starts[i] = offset;
          offset += lines[i].length + 1;
        }
        data.blocks.push({
          first: data.blocks.length * VIEWER_BLOCK_LINES + 1,
          count,
          text: lines.join("\n"),
          starts,
        });
      }

      // Lines that can be rendered right now: every sealed block holds exactly
      // VIEWER_BLOCK_LINES, so until the stream finishes we only trust the sealed
      // count (the trailing, not-yet-sealed lines appear once their block seals).
      function viewerLineCount(data) {
        return data.loaded
          ? data.lineCount
          : data.blocks.length * VIEWER_BLOCK_LINES;
      }

      function viewerBlockLine(block, i) {
        return i + 1 < block.count
          ? block.text.slice(block.starts[i], block.starts[i + 1] - 1)
          : block.text.slice(block.starts[i]);
      }

      // O(1) text lookup for any 1-based line via its sealed block.
      function getLineText(data, ln) {
        if (ln < 1) return "";
        const bi = Math.floor((ln - 1) / VIEWER_BLOCK_LINES);
        const block = data.blocks[bi];
        if (!block) return "";
        const i = (ln - 1) % VIEWER_BLOCK_LINES;
        if (i >= block.count) return "";
        return viewerBlockLine(block, i);
      }

      // Geometry of the virtualized scroll for the current file + viewport. When
      // the true height (lineCount * rowH) exceeds the browser's element-height
      // cap we scale: the scrollbar spans VIEWER_MAX_CONTENT_PX while the scroll
      // position maps linearly onto the full virtual height, so distant lines
      // stay reachable and jumps to them stay exact.
      function viewerMetrics(data) {
        const vh = viewerBody.clientHeight || 1;
        const rowH = data.rowH || 18.75;
        const lineCount = viewerLineCount(data);
        const virtualHeight = Math.max(vh, lineCount * rowH);
        const contentHeight = Math.min(virtualHeight, VIEWER_MAX_CONTENT_PX);
        return {
          vh,
          rowH,
          lineCount,
          virtualHeight,
          contentHeight,
          maxScroll: Math.max(0, contentHeight - vh),
          maxVirtual: Math.max(0, virtualHeight - vh),
          scaled: virtualHeight > contentHeight + 0.5,
        };
      }

      function scheduleViewerRender() {
        if (viewerRaf) return;
        viewerRaf = requestAnimationFrame(() => {
          viewerRaf = 0;
          renderViewer();
        });
      }

      // A scroll comes from the user (drop any jump anchor and follow the bar) or
      // from a jump we just performed (keep the exact anchor for one render). A
      // horizontal-only scroll leaves the vertical anchor untouched.
      function onViewerScroll() {
        const data = viewerData;
        if (!data) return;
        if (data.programmaticScroll) {
          data.programmaticScroll = false;
        } else if (viewerBody.scrollTop !== data.lastScrollTop) {
          data.lastScrollTop = viewerBody.scrollTop;
          data.anchorVirtualTop = null;
        }
        scheduleViewerRender();
      }

      // Draw only the lines around the current vertical position into a single
      // absolutely-positioned window; the tall spacer alone carries the scroll
      // range. Runs on every scroll frame and after each jump.
      function renderViewer() {
        const data = viewerData;
        if (!data || !viewerWindow || !viewerSpacer) return;
        const m = viewerMetrics(data);
        viewerSpacer.style.height = m.contentHeight + "px";
        if (m.lineCount <= 0) return;

        let scrollTop = viewerBody.scrollTop;
        if (scrollTop > m.maxScroll) scrollTop = m.maxScroll;

        // Where the viewport top sits in the file's full (unscaled) height.
        let virtualTop;
        if (data.anchorVirtualTop != null) {
          virtualTop = data.anchorVirtualTop;
        } else if (m.scaled && m.maxScroll > 0) {
          virtualTop = (scrollTop / m.maxScroll) * m.maxVirtual;
        } else {
          virtualTop = scrollTop;
        }
        virtualTop = Math.max(0, Math.min(virtualTop, m.maxVirtual));

        const overscan = 8;
        const windowLines = Math.ceil(m.vh / m.rowH) + overscan * 2;
        let firstLine = Math.floor(virtualTop / m.rowH) - overscan; // 0-based
        if (firstLine < 0) firstLine = 0;
        let lastLine = firstLine + windowLines;
        if (lastLine > m.lineCount - 1) lastLine = m.lineCount - 1;

        const highlight = data.highlight;
        const parts = [];
        for (let i = firstLine; i <= lastLine; i++) {
          const ln = i + 1;
          const cls = ln === data.hitLine ? "v-line v-hit" : "v-line";
          parts.push(
            `<div class="${cls}" data-ln="${ln}">` +
              `<span class="v-ln">${ln}</span>` +
              `<span class="v-tx">` +
              highlightText(getLineText(data, ln), highlight) +
              `</span></div>`
          );
        }
        // Pin the window to the viewport top, then offset each row by its true
        // position minus the virtual top so line `firstLine` lands at y = 0.
        viewerWindow.style.top =
          scrollTop + firstLine * m.rowH - virtualTop + "px";
        viewerWindow.innerHTML = parts.join("");

        // Re-mark the focused match if its line is on screen (survives scrolling
        // away and back, since every re-render rebuilds the window).
        if (viewerIdx >= 0) {
          const ln = data.matchLines[viewerIdx];
          if (ln >= firstLine + 1 && ln <= lastLine + 1) {
            const row = viewerWindow.querySelector(`.v-line[data-ln="${ln}"]`);
            if (row) {
              const marks = row.querySelectorAll("mark");
              const within = viewerIdx - lowerBound(data.matchLines, ln);
              const mark = marks[Math.min(within, marks.length - 1)];
              if (mark) mark.classList.add("v-cur");
            }
          }
        }
      }

      // Center a 1-based line in the viewport. Positions come from a fixed row
      // height, so this is exact for any file size: move the scrollbar to the
      // mapped position and draw the window from the precise virtual offset,
      // which we pin as the anchor until the user scrolls vertically again.
      function jumpToViewerLine(ln) {
        const data = viewerData;
        if (!data || !viewerSpacer) return;
        const m = viewerMetrics(data);
        let vt = (ln - 1) * m.rowH + m.rowH / 2 - m.vh / 2;
        vt = Math.max(0, Math.min(vt, m.maxVirtual));
        let scrollTop =
          m.scaled && m.maxVirtual > 0
            ? (vt / m.maxVirtual) * m.maxScroll
            : vt;
        scrollTop = Math.max(0, Math.min(scrollTop, m.maxScroll));

        viewerSpacer.style.height = m.contentHeight + "px";
        data.anchorVirtualTop = vt;
        data.programmaticScroll = true;
        const before = viewerBody.scrollTop;
        viewerBody.scrollTop = scrollTop;
        data.lastScrollTop = viewerBody.scrollTop;
        // No scroll event fires when the position is unchanged, so don't leave
        // the "programmatic" flag armed for the user's next scroll.
        if (viewerBody.scrollTop === before) data.programmaticScroll = false;
        renderViewer();
      }

      // Bring the focused match's mark into horizontal view (long, unwrapped
      // lines can push it off-screen); the vertical position is already set.
      function scrollViewerToCurrentMark() {
        if (!viewerWindow) return;
        const mark = viewerWindow.querySelector("mark.v-cur");
        if (!mark) return;
        const body = viewerBody.getBoundingClientRect();
        const rect = mark.getBoundingClientRect();
        const pad = 80;
        if (rect.left < body.left + pad || rect.right > body.right - pad) {
          const target =
            viewerBody.scrollLeft +
            (rect.left - body.left) -
            viewerBody.clientWidth / 2;
          viewerBody.scrollLeft = Math.max(0, target);
        }
      }

      // Measure the height of one rendered row for the current font/zoom so the
      // virtual geometry is pixel-accurate. Runs before --vrh is set, so the
      // probe uses the viewer's natural single-line height.
      function measureViewerRowHeight() {
        const probe = document.createElement("div");
        probe.className = "v-line";
        // Force the natural line height (1.5, matching .viewer-body) so the
        // measurement never depends on a --vrh left over from a previous open.
        probe.style.cssText =
          "position:absolute;visibility:hidden;left:-9999px;top:0;" +
          "height:auto;line-height:1.5;";
        probe.innerHTML =
          '<span class="v-ln">1</span><span class="v-tx">Xg</span>';
        viewerBody.appendChild(probe);
        const h = probe.getBoundingClientRect().height;
        viewerBody.removeChild(probe);
        return h > 0 ? h : 18.75;
      }

      function setViewerMatch(index, smooth = true) {
        const total = viewerMatchCount();
        if (!total) {
          updateViewerInfo();
          return;
        }
        viewerData.jumped = true; // manual navigation cancels the auto-jump
        viewerIdx = Math.max(0, Math.min(index, total - 1));
        // Fixed-height positioning makes the jump exact regardless of file size;
        // renderViewer applies the .v-cur mark for viewerIdx as it draws.
        jumpToViewerLine(viewerData.matchLines[viewerIdx]);
        scrollViewerToCurrentMark();
        updateViewerInfo();
      }

      // Jump to the first match at/after the clicked line as soon as that part
      // of the file has streamed in, without waiting for the full load.
      function tryViewerAutoJump(data) {
        if (data.jumped) return;
        const sealedLines = viewerLineCount(data);
        const i = lowerBound(data.matchLines, data.hitLine);
        if (i < data.matchLines.length && data.matchLines[i] <= sealedLines) {
          setViewerMatch(i, false);
          return;
        }
        if (!data.loaded) return;
        data.jumped = true;
        if (data.matchLines.length) {
          setViewerMatch(0, false);
        } else {
          jumpToViewerLine(data.hitLine);
          updateViewerInfo();
        }
      }

      async function openViewer(path, lineNo) {
        if (!lastRun) return;
        const token = ++viewerToken;
        viewer.hidden = false;
        document.body.style.overflow = "hidden";
        viewerTitle.innerHTML = formatPath(path);
        viewerIdx = -1;

        // Build the virtualized DOM: a tall spacer that owns the scrollbar plus a
        // small window holding only the rows near the viewport. Measure the row
        // height first, before --vrh pins it.
        const rowH = measureViewerRowHeight();
        viewerBody.style.setProperty("--vrh", rowH + "px");
        viewerBody.scrollTop = 0;
        viewerBody.scrollLeft = 0;
        viewerBody.innerHTML = "";
        viewerSpacer = document.createElement("div");
        viewerSpacer.className = "v-spacer";
        viewerWindow = document.createElement("div");
        viewerWindow.className = "v-window";
        viewerWindow.innerHTML =
          '<div class="v-line"><span class="v-tx">Loading...</span></div>';
        viewerBody.append(viewerSpacer, viewerWindow);

        const data = newViewerData(lineNo, lastRun.matchers.highlight);
        data.rowH = rowH;
        viewerData = data;
        updateViewerInfo();
        viewerBody.focus();

        const source = findSource(path);
        if (!source) {
          viewerData = null;
          viewerMessage(
            "Could not locate this file to open. Re-select the folder or " +
              "archive and search again."
          );
          updateViewerInfo();
          return;
        }

        let ok = false;
        try {
          ok = await streamSourceLines(source, {
            shouldStop: () => token !== viewerToken,
            onBytes(read, totalHint) {
              data.progressPct = totalHint
                ? Math.min(100, Math.round((read / totalHint) * 100))
                : null;
              const now = performance.now();
              if (now - data.lastUi > 100) {
                data.lastUi = now;
                if (!data.jumped) tryViewerAutoJump(data);
                scheduleViewerRender();
                updateViewerInfo();
              }
            },
            onLine(line, ln) {
              data.lineCount = ln;
              const hits = countLineMatches(line, data.highlight);
              for (let i = 0; i < hits; i++) data.matchLines.push(ln);
              data.pending.push(line);
              if (data.pending.length === VIEWER_BLOCK_LINES) {
                sealViewerBlock(data);
              }
            },
          });
        } catch (error) {
          ok = false;
        }

        // Bail if the viewer was closed or another file opened while loading.
        if (token !== viewerToken) return;
        if (!ok && !data.lineCount) {
          viewerData = null;
          viewerMessage("Could not read this file.");
          updateViewerInfo();
          return;
        }

        sealViewerBlock(data);
        data.loaded = true;
        if (!data.lineCount) {
          viewerMessage("(empty file)");
          viewerSpacer = null;
          viewerWindow = null;
          updateViewerInfo();
          return;
        }
        tryViewerAutoJump(data);
        scheduleViewerRender();
        updateViewerInfo();
      }

      function updateViewerInfo() {
        const total = viewerMatchCount();
        if (viewerData && !viewerData.loaded) {
          const pct = viewerData.progressPct;
          viewerMinfo.textContent =
            (viewerIdx >= 0 ? `Match ${viewerIdx + 1} / ` : "") +
            `${total.toLocaleString()} match${total === 1 ? "" : "es"}` +
            ` -- loading${pct != null ? ` ${pct}%` : ""}...`;
        } else {
          viewerMinfo.textContent = total
            ? `Match ${viewerIdx + 1} / ${total.toLocaleString()}`
            : "No matches";
        }
        const has = total > 0;
        viewerFirst.disabled = !has || viewerIdx <= 0;
        viewerPrev.disabled = !has || viewerIdx <= 0;
        viewerNext.disabled = !has || viewerIdx >= total - 1;
        viewerLast.disabled = !has || viewerIdx >= total - 1;
      }

      function closeViewer() {
        viewerToken++; // stops any in-flight streamed load
        viewer.hidden = true;
        viewerData = null;
        if (viewerRaf) {
          cancelAnimationFrame(viewerRaf);
          viewerRaf = 0;
        }
        viewerBody.innerHTML = "";
        viewerSpacer = null;
        viewerWindow = null;
        viewerIdx = -1;
        document.body.style.overflow = "";
      }

      function showConfigError(message) {
        configError.textContent = message || "";
      }

      function escapeRegex(value) {
        return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (c) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        }[c]));
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        const units = ["KB", "MB", "GB", "TB"];
        let value = bytes / 1024;
        let unit = 0;
        while (value >= 1024 && unit < units.length - 1) {
          value /= 1024;
          unit++;
        }
        return `${value.toFixed(value >= 10 ? 0 : 1)} ${units[unit]}`;
      }

      function debounce(callback, waitMs) {
        let timeoutId;
        return (...args) => {
          window.clearTimeout(timeoutId);
          timeoutId = window.setTimeout(() => callback(...args), waitMs);
        };
      }

      if (!("TextDecoderStream" in window)) {
        showConfigError(
          "This browser lacks TextDecoderStream. Use a recent Chrome, Edge, or Safari."
        );
        searchBtn.disabled = true;
      } else if (!archivesSupported) {
        // Folder scanning still works; only automatic archive expansion needs
        // the DecompressionStream API (Chrome 103+, Firefox 113+, Safari 16.4+).
        scanNote.textContent =
          "Note: automatic archive expansion (.zip/.tar/.gz) needs a newer " +
          "browser; plain folders still work here.";
      }
    </script>
    <script>
      (function () {
        setDropInfo('47 files (1.9 GB) from "mce103_20260707_192907_logs"');
        var fileCounts = Object.create(null);
        var total = 0;
        for (var i = 1; i <= 60; i++) {
          var n = i < 10 ? "0" + i : "" + i;
          var name = "mce103_20260707_192907_logs/service-" + n + "/app.log";
          var c = Math.round(20000 / i) + ((i * 137) % 900) + 3;
          fileCounts[name] = c;
          total += c;
        }
        var termCounts = { ERROR: Math.round(total * 0.7), FATAL: 0 };
        termCounts.FATAL = total - termCounts.ERROR;
        displayRoot = "mce103_20260707_192907_logs";
        var ctx = {
          totalMatches: total,
          filesScanned: 47,
          filesSkipped: 2,
          totalLines: 10757961,
          elapsedMs: 3600,
          fileCounts: fileCounts,
          termCounts: termCounts,
          stored: total,
          matches: [],
          matchers: { highlight: /ERROR|FATAL/gi, combined: /ERROR|FATAL/i },
        };
        lastRun = ctx;
        renderSummary(ctx);
        renderHeatmap(ctx);
        renderTermFilter(ctx);
      })();
    </script>
  </body>
