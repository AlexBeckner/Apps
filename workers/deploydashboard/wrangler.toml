name = "deploydashboard"
main = "src/index.js"
compatibility_date = "2026-07-17"
keep_vars = true

[vars]
# Same-origin Worker-hosted app. Override to "*" in local `.dev.vars` if needed.
ALLOWED_ORIGIN = "https://deploydashboard.appliedapps.workers.dev"
# Webhooks are the fast path. These lower-frequency scans reconcile missed
# webhook deliveries without relying on a fixed newest-build window.
CACHE_SECONDS = "30"
FINISHED_RECHECK_SECONDS = "300"
FINISHED_SCAN_OVERLAP_SECONDS = "60"
AUDIT_RECHECK_SECONDS = "60"

[[d1_databases]]
binding = "DB"
database_name = "deploydashboard"
database_id = "a1ee14ef-c799-4caa-a42f-7653919f0ea3"

[[durable_objects.bindings]]
name = "REFRESH_SCHEDULER"
class_name = "RefreshScheduler"

[[queues.producers]]
binding = "BUILDKITE_EVENTS"
queue = "deploydashboard-buildkite-events"

[[queues.consumers]]
queue = "deploydashboard-buildkite-events"
max_batch_size = 100
max_batch_timeout = 5
max_retries = 10
dead_letter_queue = "deploydashboard-buildkite-events-dlq"
retry_delay = 30

[[migrations]]
tag = "refresh_scheduler_v1"
new_sqlite_classes = ["RefreshScheduler"]

[triggers]
crons = ["* * * * *"]

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
