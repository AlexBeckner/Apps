name = "log-search"
main = "src/index.js"
compatibility_date = "2024-09-23"
keep_vars = true

# This Worker only gates access with the shared company password and then serves
# the static app in ./public. All log scanning happens client-side in the
# browser -- no file is ever uploaded to the Worker.

# Secrets (set with `wrangler secret put <NAME>`), not stored here:
#   ACCESS_PASSWORD  company-auth gate (see ../github-dashboard/src/company-auth.js)
#   AUTH_SECRET      >=32 char random string used to sign the session cookie

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
