<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Log Search</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background: #111;
        color: #eee;
        margin: 8px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        font-size: 14px;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
      }

      h1 {
        font-size: 18px;
        margin: 8px 0 2px;
      }

      p {
        margin: 0;
      }

      .muted {
        color: #aaa;
      }

      .error {
        color: #ff6b6b;
      }

      a {
        color: #7fb2ff;
      }

      .dropzone {
        border: 1px dashed #666;
        border-radius: 6px;
        cursor: pointer;
        display: block;
        margin-top: 12px;
        padding: 22px 16px;
        text-align: center;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      .dropzone:hover,
      .dropzone:focus-within {
        border-color: #888;
        background: #161616;
      }

      .dropzone.dragover {
        border-color: #7fb2ff;
        background: #16202e;
      }

      .dropzone strong {
        font-size: 15px;
      }

      .dropzone input[type="file"] {
        display: none;
      }

      .controls {
        align-items: end;
        display: grid;
        gap: 8px 12px;
        grid-template-columns: minmax(0, 1fr) auto auto;
        margin-top: 12px;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }

      input[type="text"] {
        background: #111;
        border: 1px solid #666;
        color: #eee;
        font: inherit;
        padding: 6px 8px;
        width: 100%;
      }

      input[type="text"]::placeholder {
        color: #888;
      }

      .toggles {
        display: flex;
        gap: 14px;
        white-space: nowrap;
      }

      .toggle {
        align-items: center;
        cursor: pointer;
        display: flex;
        font-weight: 400;
        gap: 6px;
        margin: 0;
      }

      button {
        background: #2a2a2a;
        border: 1px solid #666;
        color: #eee;
        cursor: pointer;
        font: inherit;
        padding: 6px 14px;
      }

      button:hover:not(:disabled) {
        border-color: #888;
      }

      button.primary {
        background: #1f6feb;
        border-color: #1f6feb;
      }

      button:disabled {
        cursor: default;
        opacity: 0.5;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .progress {
        margin-top: 12px;
      }

      .bar {
        background: #222;
        border-radius: 3px;
        height: 6px;
        margin-top: 6px;
        overflow: hidden;
      }

      .bar > span {
        background: #1f6feb;
        display: block;
        height: 100%;
        width: 0;
        transition: width 0.1s linear;
      }

      .summary {
        border: 1px solid #333;
        border-radius: 6px;
        display: none;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: 14px;
        padding: 12px;
      }

      .stat .n {
        font-size: 20px;
        font-weight: 700;
      }

      .stat .k {
        color: #aaa;
        font-size: 12px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
      }

      .chip {
        background: #1a1a1a;
        border: 1px solid #444;
        border-radius: 999px;
        cursor: pointer;
        font-size: 12px;
        padding: 3px 10px;
      }

      .chip.active {
        background: #16202e;
        border-color: #7fb2ff;
        color: #cfe0ff;
      }

      .results-head {
        align-items: center;
        display: flex;
        gap: 10px;
        justify-content: space-between;
        margin-top: 14px;
      }

      .results-head input {
        max-width: 320px;
      }

      table {
        border-collapse: collapse;
        font-size: 13px;
        margin-top: 8px;
        table-layout: fixed;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid #222;
        overflow: hidden;
        padding: 5px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: #aaa;
        font-weight: 600;
        position: sticky;
        top: 0;
        background: #111;
      }

      col.c-file {
        width: 34%;
      }

      col.c-line {
        width: 66px;
      }

      td.file {
        overflow-wrap: anywhere;
      }

      td.file .base {
        font-weight: 700;
      }

      td.line {
        color: #888;
        font-variant-numeric: tabular-nums;
      }

      td.text {
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      mark {
        background: #6a4a00;
        color: #ffd479;
        border-radius: 2px;
        padding: 0 1px;
      }

      .heatmap {
        border: 1px solid #333;
        border-radius: 6px;
        display: none;
        margin-top: 14px;
        padding: 12px;
      }

      .heatmap h2 {
        color: #aaa;
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 8px;
      }

      .heat-list {
        display: flex;
        flex-direction: column;
        gap: 3px;
        max-height: 340px;
        overflow-y: auto;
      }

      .heat-row {
        align-items: center;
        border: 1px solid transparent;
        border-radius: 4px;
        cursor: pointer;
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) 130px auto;
        padding: 3px 6px;
      }

      .heat-row:hover {
        background: #161616;
      }

      .heat-row.active {
        background: #16202e;
        border-color: #7fb2ff;
      }

      .heat-row .hp {
        direction: rtl;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .heat-row .hp span {
        direction: ltr;
        unicode-bidi: plaintext;
      }

      .heat-row .hp .base {
        font-weight: 700;
      }

      .heat-track {
        background: #222;
        border-radius: 3px;
        height: 10px;
        overflow: hidden;
      }

      .heat-fill {
        border-radius: 3px;
        height: 100%;
        min-width: 3px;
      }

      .heat-count {
        color: #ccc;
        font-variant-numeric: tabular-nums;
        text-align: right;
        white-space: nowrap;
      }

      .heat-count .hc-p {
        color: #8a8a8a;
        margin-left: 5px;
      }

      .heat-note {
        color: #aaa;
        font-size: 12px;
        margin-top: 8px;
      }

      .note {
        color: #aaa;
        margin-top: 8px;
      }

      tbody tr.res-row {
        cursor: pointer;
      }

      tbody tr.res-row:hover td {
        background: #161616;
      }

      .viewer {
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        inset: 0;
        padding: 24px;
        position: fixed;
        z-index: 50;
      }

      .viewer[hidden] {
        display: none;
      }

      .viewer-box {
        background: #0d0d0d;
        border: 1px solid #333;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        margin: auto;
        max-height: 100%;
        max-width: 1100px;
        overflow: hidden;
        width: 100%;
      }

      .viewer-head {
        align-items: center;
        border-bottom: 1px solid #222;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        padding: 10px 12px;
      }

      .viewer-title {
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .viewer-title .base {
        font-weight: 700;
      }

      .viewer-nav {
        align-items: center;
        display: flex;
        flex-shrink: 0;
        gap: 8px;
      }

      .viewer-nav .minfo {
        color: #aaa;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .viewer-body {
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12.5px;
        line-height: 1.5;
        overflow: auto;
        padding: 6px 0;
      }

      .viewer-body:focus {
        outline: none;
      }

      .v-line {
        display: flex;
        gap: 12px;
        overflow-wrap: anywhere;
        padding: 0 12px;
        white-space: pre-wrap;
      }

      .v-line:hover {
        background: #141414;
      }

      .v-line.v-hit {
        background: #16202e;
      }

      .v-ln {
        color: #666;
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
        text-align: right;
        user-select: none;
        width: 60px;
      }

      .v-tx {
        flex: 1;
        min-width: 0;
      }

      mark.v-cur {
        background: #ffd479;
        color: #000;
        outline: 2px solid #ffd479;
      }
    </style>
  </head>
  <body>
    <main>
      <label class="dropzone" id="dropzone" tabindex="0">
        <strong>Choose a log folder</strong>
        <p class="muted">or drag &amp; drop a folder or archive here</p>
        <p class="muted">Archives expand automatically: .zip, .tar, .tar.gz, .tgz, .gz</p>
        <p class="muted" id="selection">No folder selected yet.</p>
        <input id="folder" type="file" webkitdirectory directory multiple>
      </label>
      <p class="note" style="margin-top: 6px;">
        <a href="#" id="pick-archives" role="button">Choose archive file(s) instead</a>
      </p>
      <input
        id="archive-files"
        type="file"
        accept=".zip,.tar,.gz,.tgz,.gzip,.tar.gz,application/zip,application/gzip,application/x-tar"
        multiple
        hidden
      >

      <div class="controls">
        <div>
          <label for="terms">Search terms (comma-separated)</label>
          <input
            id="terms"
            type="text"
            value="ERROR, FATAL"
            placeholder="ERROR, FATAL, Exception"
            autocomplete="off"
            spellcheck="false"
          >
        </div>
        <div class="toggles">
          <label class="toggle"><input id="case" type="checkbox"> Case sensitive</label>
          <label class="toggle"><input id="regex" type="checkbox"> Regex</label>
        </div>
        <button id="search" class="primary" type="button" disabled>Search</button>
      </div>

      <div class="chips" id="quick-chips" aria-label="Quick add terms">
        <span class="chip" data-add="WARN">+ WARN</span>
        <span class="chip" data-add="WARNING">+ WARNING</span>
        <span class="chip" data-add="CRITICAL">+ CRITICAL</span>
        <span class="chip" data-add="Exception">+ Exception</span>
        <span class="chip" data-add="Traceback">+ Traceback</span>
        <span class="chip" data-add="panic">+ panic</span>
        <span class="chip" data-add="segfault">+ segfault</span>
      </div>

      <div class="actions">
        <button id="cancel" type="button" style="display: none;">Cancel</button>
      </div>

      <div class="progress" id="progress" style="display: none;">
        <p class="muted" id="progress-text"></p>
        <div class="bar"><span id="progress-bar"></span></div>
      </div>

      <p class="error" id="config-error" role="alert"></p>

      <section class="summary" id="summary" aria-live="polite"></section>

      <p class="note" id="scan-note"></p>

      <section class="heatmap" id="heatmap" aria-label="File heatmap"></section>

      <div class="chips" id="term-filter" aria-label="Filter by term"></div>

      <div class="results-head" id="results-head" style="display: none;">
        <input id="filter" type="text" placeholder="Filter results by path or text..." autocomplete="off">
        <button id="download" type="button">Download CSV</button>
      </div>

      <p class="note" id="results-note"></p>

      <table id="results-table" style="display: none;">
        <colgroup>
          <col class="c-file">
          <col class="c-line">
          <col>
        </colgroup>
        <thead>
          <tr><th>File</th><th>Line</th><th>Match</th></tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </main>

    <div class="viewer" id="viewer" hidden>
      <div class="viewer-box" role="dialog" aria-modal="true" aria-label="File viewer">
        <div class="viewer-head">
          <div class="viewer-title" id="viewer-title"></div>
          <div class="viewer-nav">
            <span class="minfo" id="viewer-minfo"></span>
            <button id="viewer-first" type="button" title="First match (Home)">&#8676; First</button>
            <button id="viewer-prev" type="button" title="Previous match (Up / Left arrow)">&uarr; Prev</button>
            <button id="viewer-next" type="button" title="Next match (Down / Right arrow)">&darr; Next</button>
            <button id="viewer-last" type="button" title="Last match (End)">Last &#8677;</button>
            <button id="viewer-close" type="button" title="Close (Esc)">Close</button>
          </div>
        </div>
        <div class="viewer-body" id="viewer-body" tabindex="0"></div>
      </div>
    </div>

    <script src="archives.js"></script>
    <script>
      const STORE_LIMIT = 50000; // max matches kept in memory
      const RENDER_LIMIT = 2000; // max rows painted into the DOM at once
      const BINARY_SNIFF_BYTES = 8000;

      const el = (id) => document.getElementById(id);
      const dropzone = el("dropzone");
      const folderInput = el("folder");
      const archiveInput = el("archive-files");
      const pickArchives = el("pick-archives");
      const selectionEl = el("selection");
      const termsInput = el("terms");
      const caseInput = el("case");
      const regexInput = el("regex");
      const searchBtn = el("search");
      const cancelBtn = el("cancel");
      const progressEl = el("progress");
      const progressText = el("progress-text");
      const progressBar = el("progress-bar");
      const configError = el("config-error");
      const summaryEl = el("summary");
      const heatmapEl = el("heatmap");
      const termFilterEl = el("term-filter");
      const resultsHead = el("results-head");
      const filterInput = el("filter");
      const downloadBtn = el("download");
      const resultsNote = el("results-note");
      const scanNote = el("scan-note");
      const resultsTable = el("results-table");
      const resultsBody = el("results-body");
      const viewer = el("viewer");
      const viewerTitle = el("viewer-title");
      const viewerMinfo = el("viewer-minfo");
      const viewerFirst = el("viewer-first");
      const viewerPrev = el("viewer-prev");
      const viewerNext = el("viewer-next");
      const viewerLast = el("viewer-last");
      const viewerClose = el("viewer-close");
      const viewerBody = el("viewer-body");

      // Archive expansion (.zip/.tar/.tar.gz/.tgz/.gz) runs client-side via
      // archives.js. It needs the native DecompressionStream API; if that is
      // missing we still scan plain folders and just skip archives.
      const archivesSupported = !!(
        window.LogArchives && window.LogArchives.support().any
      );

      // Selected files as { file, path }. Kept in memory so re-searching with
      // new terms just re-reads them (no need to hold every line in memory).
      let selected = [];
      let lastRun = null; // results of the most recent completed scan
      let activeTerm = null; // term chip filter, or null for all
      let activeFile = null; // heatmap file filter, or null for all
      let activeFileMatches = null; // all matches for activeFile, re-read on demand
      let activeFileCapped = false; // that re-read hit the per-file cap
      let fileScanToken = 0; // guards against races when switching files fast
      let running = false;
      let cancelRequested = false;
      let displayRoot = ""; // shared root folder/archive trimmed from shown paths
      let viewerMarks = []; // <mark> nodes in the open file viewer
      let viewerIdx = -1; // index of the currently focused match
      let viewerToken = 0; // guards against races when opening files quickly

      function setSelection(files) {
        selected = files;
        const totalBytes = files.reduce((sum, f) => sum + f.file.size, 0);
        if (!files.length) {
          selectionEl.textContent = "No folder selected yet.";
          searchBtn.disabled = true;
          return;
        }
        const root = files[0].path.split("/")[0] || "(folder)";
        const archiveCount = files.filter(
          (f) => window.LogArchives && LogArchives.archiveKind(f.path)
        ).length;
        selectionEl.textContent =
          `${files.length.toLocaleString()} file${files.length === 1 ? "" : "s"} ` +
          `(${formatBytes(totalBytes)}) from "${root}"` +
          (archiveCount
            ? ` -- ${archiveCount} archive${archiveCount === 1 ? "" : "s"} will be expanded`
            : "");
        searchBtn.disabled = false;
      }

      function filesFromInput(fileList) {
        return Array.from(fileList).map((file) => ({
          file,
          path: file.webkitRelativePath || file.name,
        }));
      }

      folderInput.addEventListener("change", () => {
        setSelection(filesFromInput(folderInput.files));
      });

      // Secondary picker for choosing archive files directly (the folder input
      // above only allows selecting directories).
      archiveInput.addEventListener("change", () => {
        setSelection(filesFromInput(archiveInput.files));
      });
      pickArchives.addEventListener("click", (event) => {
        event.preventDefault();
        archiveInput.click();
      });

      // Drag & drop of a folder (traverses the directory tree).
      ["dragenter", "dragover"].forEach((type) =>
        dropzone.addEventListener(type, (event) => {
          event.preventDefault();
          dropzone.classList.add("dragover");
        })
      );
      ["dragleave", "drop"].forEach((type) =>
        dropzone.addEventListener(type, (event) => {
          event.preventDefault();
          dropzone.classList.remove("dragover");
        })
      );
      dropzone.addEventListener("drop", async (event) => {
        const items = event.dataTransfer && event.dataTransfer.items;
        if (!items || !items.length) return;
        const entries = [];
        for (const item of items) {
          const entry = item.webkitGetAsEntry && item.webkitGetAsEntry();
          if (entry) entries.push(entry);
        }
        selectionEl.textContent = "Reading folder...";
        try {
          const files = [];
          for (const entry of entries) {
            await walkEntry(entry, files);
          }
          setSelection(files);
        } catch (error) {
          selectionEl.textContent = "";
          showConfigError("Could not read the dropped folder: " + error.message);
        }
      });
      dropzone.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          folderInput.click();
        }
      });

      async function walkEntry(entry, out) {
        if (entry.isFile) {
          const file = await new Promise((resolve, reject) =>
            entry.file(resolve, reject)
          );
          out.push({ file, path: entry.fullPath.replace(/^\//, "") });
          return;
        }
        if (entry.isDirectory) {
          const reader = entry.createReader();
          // readEntries returns results in batches; keep calling until empty.
          while (true) {
            const batch = await new Promise((resolve, reject) =>
              reader.readEntries(resolve, reject)
            );
            if (!batch.length) break;
            for (const child of batch) {
              await walkEntry(child, out);
            }
          }
        }
      }

      // Quick-add chips append a term to the terms box.
      el("quick-chips").addEventListener("click", (event) => {
        const term = event.target && event.target.getAttribute("data-add");
        if (!term) return;
        const current = termsInput.value
          .split(",")
          .map((s) => s.trim())
          .filter(Boolean);
        if (!current.some((t) => t.toLowerCase() === term.toLowerCase())) {
          current.push(term);
          termsInput.value = current.join(", ");
        }
      });

      searchBtn.addEventListener("click", runSearch);
      cancelBtn.addEventListener("click", () => {
        cancelRequested = true;
      });
      termsInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !searchBtn.disabled && !running) runSearch();
      });
      filterInput.addEventListener("input", debounce(renderResults, 150));
      downloadBtn.addEventListener("click", downloadCsv);

      // Clicking a results row opens that file in the viewer, jumped to the
      // clicked line. Ignore the click if the user is selecting text.
      resultsBody.addEventListener("click", (event) => {
        const tr = event.target.closest("tr");
        if (!tr || !tr.dataset.path) return;
        const selection = window.getSelection && window.getSelection();
        if (selection && !selection.isCollapsed) return;
        openViewer(tr.dataset.path, Number(tr.dataset.line));
      });

      viewerFirst.addEventListener("click", () => setViewerMatch(0));
      viewerPrev.addEventListener("click", () => setViewerMatch(viewerIdx - 1));
      viewerNext.addEventListener("click", () => setViewerMatch(viewerIdx + 1));
      viewerLast.addEventListener("click", () =>
        setViewerMatch(viewerMarks.length - 1)
      );
      viewerClose.addEventListener("click", closeViewer);
      // Click on the backdrop (not the dialog box) closes the viewer.
      viewer.addEventListener("mousedown", (event) => {
        if (event.target === viewer) closeViewer();
      });
      document.addEventListener("keydown", (event) => {
        if (viewer.hidden) return;
        if (event.key === "Escape") {
          closeViewer();
        } else if (event.key === "ArrowDown" || event.key === "ArrowRight") {
          event.preventDefault();
          setViewerMatch(viewerIdx + 1);
        } else if (event.key === "ArrowUp" || event.key === "ArrowLeft") {
          event.preventDefault();
          setViewerMatch(viewerIdx - 1);
        } else if (event.key === "Home" && viewerMarks.length) {
          event.preventDefault();
          setViewerMatch(0);
        } else if (event.key === "End" && viewerMarks.length) {
          event.preventDefault();
          setViewerMatch(viewerMarks.length - 1);
        }
      });

      function parseTerms() {
        return termsInput.value
          .split(",")
          .map((s) => s.trim())
          .filter(Boolean);
      }

      function buildMatchers(terms) {
        const flags = caseInput.checked ? "" : "i";
        const asRegex = regexInput.checked;
        const source = terms
          .map((t) => (asRegex ? t : escapeRegex(t)))
          .map((t) => `(?:${t})`)
          .join("|");
        // Combined matcher for "does this line match anything" + highlighting.
        const combined = new RegExp(source, flags);
        const highlight = new RegExp(source, flags + "g");
        // Per-term matchers for the summary breakdown.
        const perTerm = terms.map((t) => ({
          term: t,
          re: new RegExp(asRegex ? t : escapeRegex(t), flags),
        }));
        return { combined, highlight, perTerm };
      }

      async function runSearch() {
        if (running) return;
        const terms = parseTerms();
        showConfigError("");
        if (!selected.length) {
          showConfigError("Choose a log folder first.");
          return;
        }
        if (!terms.length) {
          showConfigError("Enter at least one search term.");
          return;
        }

        let matchers;
        try {
          matchers = buildMatchers(terms);
        } catch (error) {
          showConfigError("Invalid regular expression: " + error.message);
          return;
        }

        running = true;
        cancelRequested = false;
        searchBtn.disabled = true;
        cancelBtn.style.display = "";
        progressEl.style.display = "";
        summaryEl.style.display = "none";
        heatmapEl.style.display = "none";
        heatmapEl.innerHTML = "";
        resultsHead.style.display = "none";
        resultsTable.style.display = "none";
        resultsNote.textContent = "";
        scanNote.textContent = "";
        termFilterEl.innerHTML = "";
        activeTerm = null;
        activeFile = null;
        activeFileMatches = null;
        activeFileCapped = false;
        fileScanToken++;

        const ctx = {
          matches: [],
          stored: 0,
          totalMatches: 0,
          totalLines: 0,
          filesScanned: 0,
          filesSkipped: 0,
          bytesRead: 0,
          unsupported: 0, // archived entries we can't read (encrypted, etc.)
          archiveErrors: [], // archives that failed to parse
          archivesExpanded: 0,
          termCounts: Object.fromEntries(terms.map((t) => [t, 0])),
          fileCounts: Object.create(null),
          fileCount: 0,
          matchers,
          startedAt: performance.now(),
          lastUi: 0,
        };

        // Expand archives into scan tasks up front. Each top-level selected item
        // is one task; an archive task fans out to all the files inside it.
        const { tasks, unsupportedArchives } = buildTasks(selected);
        ctx.archivesExpanded = tasks.filter((t) => t.archive).length;
        const totalTasks = tasks.length;
        try {
          for (let i = 0; i < tasks.length; i++) {
            if (cancelRequested) break;
            updateProgress(ctx, i, totalTasks, tasks[i].path);
            await tasks[i].run(ctx);
          }
        } catch (error) {
          showConfigError("Error while scanning: " + error.message);
        }

        ctx.elapsedMs = performance.now() - ctx.startedAt;
        ctx.cancelled = cancelRequested;
        lastRun = ctx;
        displayRoot = commonRoot(Object.keys(ctx.fileCounts));

        running = false;
        cancelBtn.style.display = "none";
        searchBtn.disabled = false;
        progressBar.style.width = "100%";
        const scannedLabel =
          `${ctx.filesScanned.toLocaleString()} file` +
          `${ctx.filesScanned === 1 ? "" : "s"}` +
          (ctx.archivesExpanded
            ? ` (expanded ${ctx.archivesExpanded.toLocaleString()} archive${ctx.archivesExpanded === 1 ? "" : "s"})`
            : "");
        progressText.textContent = ctx.cancelled
          ? `Cancelled after searching ${scannedLabel}.`
          : `Done. Searched ${scannedLabel}.`;

        renderSummary(ctx);
        renderScanNote(ctx, unsupportedArchives);
        renderHeatmap(ctx);
        renderTermFilter(ctx);
        renderResults();
      }

      // Turn the flat selection into scan tasks, expanding archives when the
      // browser supports the decompression APIs archives.js relies on.
      function buildTasks(items) {
        const tasks = [];
        let unsupportedArchives = 0;
        for (const { file, path } of items) {
          const kind = window.LogArchives ? LogArchives.archiveKind(path) : null;
          if (kind) {
            if (LogArchives.canExpand(path)) {
              tasks.push({
                path,
                archive: true,
                run: (ctx) =>
                  LogArchives.extract(file, path, makeArchiveSink(ctx), {
                    isCancelled: () => cancelRequested,
                  }),
              });
              continue;
            }
            unsupportedArchives++;
          }
          tasks.push({
            path,
            archive: false,
            run: (ctx) => scanFile(file, path, ctx),
          });
        }
        return { tasks, unsupportedArchives };
      }

      // Sink that streams each inner archive file through a LineScanner, so the
      // scanning/highlighting logic is identical to plain files.
      function makeArchiveSink(ctx) {
        return {
          open(name) {
            return {
              name,
              scanner: makeLineScanner(name, ctx),
              decoder: new TextDecoder("utf-8", { fatal: false }),
              done: false,
            };
          },
          chunk(handle, bytes) {
            if (handle.done) return false;
            ctx.bytesRead += bytes.length;
            const text = handle.decoder.decode(bytes, { stream: true });
            if (text) handle.scanner.pushText(text);
            if (handle.scanner.binary) {
              handle.done = true;
              return false; // tell the extractor to stop reading this entry
            }
            const now = performance.now();
            if (now - ctx.lastUi > 120) {
              ctx.lastUi = now;
              liveProgress(ctx, handle.name);
            }
            return true;
          },
          close(handle) {
            if (!handle.done) {
              const tail = handle.decoder.decode();
              if (tail) handle.scanner.pushText(tail);
            }
            handle.scanner.finish();
            ctx.filesScanned++;
            if (handle.scanner.binary) ctx.filesSkipped++;
          },
          skip(_name, _reason) {
            ctx.filesScanned++;
            ctx.filesSkipped++;
            ctx.unsupported++;
          },
          error(path, err) {
            ctx.filesScanned++;
            ctx.filesSkipped++;
            ctx.archiveErrors.push(
              `${path}: ${(err && err.message) || "could not be read"}`
            );
          },
        };
      }

      function renderScanNote(ctx, unsupportedArchives) {
        const parts = [];
        if (ctx.archiveErrors.length) {
          parts.push(
            `${ctx.archiveErrors.length} archive${ctx.archiveErrors.length === 1 ? "" : "s"} ` +
              `could not be read: ${ctx.archiveErrors.slice(0, 3).join("; ")}` +
              (ctx.archiveErrors.length > 3 ? "; ..." : ".")
          );
        }
        if (ctx.unsupported) {
          parts.push(
            `${ctx.unsupported.toLocaleString()} archived ` +
              `entr${ctx.unsupported === 1 ? "y was" : "ies were"} skipped ` +
              `(encrypted or unsupported compression).`
          );
        }
        if (unsupportedArchives) {
          parts.push(
            `${unsupportedArchives} archive${unsupportedArchives === 1 ? "" : "s"} ` +
              `could not be expanded in this browser and ` +
              `${unsupportedArchives === 1 ? "was" : "were"} skipped.`
          );
        }
        scanNote.textContent = parts.join(" ");
      }

      // Line-by-line scanner shared by plain files and archived entries. It
      // sniffs the first chunk for a NUL byte to skip binary content.
      function makeLineScanner(path, ctx) {
        const { combined, perTerm } = ctx.matchers;
        let buffer = "";
        let lineNo = 0;
        let sniffed = false;
        let binary = false;
        return {
          get binary() {
            return binary;
          },
          pushText(text) {
            if (binary || !text) return;
            if (!sniffed) {
              sniffed = true;
              // NUL byte in the head strongly implies binary content; skip it.
              if (text.slice(0, BINARY_SNIFF_BYTES).includes("\u0000")) {
                binary = true;
                return;
              }
            }
            buffer += text;
            let nl;
            while ((nl = buffer.indexOf("\n")) !== -1) {
              let line = buffer.slice(0, nl);
              buffer = buffer.slice(nl + 1);
              if (line.endsWith("\r")) line = line.slice(0, -1);
              lineNo++;
              ctx.totalLines++;
              testLine(line, lineNo, path, ctx, combined, perTerm);
            }
          },
          finish() {
            if (binary || !buffer.length) return;
            if (buffer.endsWith("\r")) buffer = buffer.slice(0, -1);
            lineNo++;
            ctx.totalLines++;
            testLine(buffer, lineNo, path, ctx, combined, perTerm);
          },
        };
      }

      async function scanFile(fileObj, path, ctx) {
        let stream;
        try {
          stream = fileObj
            .stream()
            .pipeThrough(new TextDecoderStream("utf-8", { fatal: false }));
        } catch (error) {
          ctx.filesScanned++;
          ctx.filesSkipped++;
          return;
        }

        const reader = stream.getReader();
        const scanner = makeLineScanner(path, ctx);
        try {
          while (true) {
            if (cancelRequested) break;
            const { value, done } = await reader.read();
            if (done) break;
            ctx.bytesRead += value.length;
            scanner.pushText(value);
            if (scanner.binary) {
              try {
                await reader.cancel();
              } catch (e) {}
              break;
            }
            const now = performance.now();
            if (now - ctx.lastUi > 120) {
              ctx.lastUi = now;
              liveProgress(ctx, path);
            }
          }
          if (!cancelRequested) scanner.finish();
        } finally {
          try {
            reader.releaseLock();
          } catch (e) {}
        }

        ctx.filesScanned++;
        if (scanner.binary) ctx.filesSkipped++;
      }

      function testLine(line, lineNo, path, ctx, combined, perTerm) {
        if (!combined.test(line)) return;
        // Counts are the *true* totals across the whole scan so the heatmap,
        // term chips, and summary show the real picture. The results list can
        // only hold STORE_LIMIT lines in memory, but a click on any file re-reads
        // just that file to recover every one of its matches on demand.
        ctx.totalMatches++;
        ctx.fileCounts[path] = (ctx.fileCounts[path] || 0) + 1;
        for (const t of perTerm) {
          if (t.re.test(line)) ctx.termCounts[t.term]++;
        }
        if (ctx.stored < STORE_LIMIT) {
          // Guard against pathologically long lines blowing up memory/DOM.
          const text = line.length > 4000 ? line.slice(0, 4000) + " ..." : line;
          ctx.matches.push({ path, lineNo, text });
          ctx.stored++;
        }
      }

      function updateProgress(ctx, index, total, path) {
        progressBar.style.width = `${Math.round((index / total) * 100)}%`;
        progressText.textContent =
          `Scanning ${index + 1} / ${total}: ${path} ` +
          `-- ${ctx.totalMatches.toLocaleString()} matches`;
      }

      function liveProgress(ctx, path) {
        progressText.textContent =
          `Scanning: ${path} -- ` +
          `${ctx.totalMatches.toLocaleString()} matches, ` +
          `${ctx.totalLines.toLocaleString()} lines`;
      }

      function renderSummary(ctx) {
        const stats = [
          ["Matches", ctx.totalMatches],
          ["Files scanned", ctx.filesScanned],
          ["Files skipped", ctx.filesSkipped],
          ["Lines searched", ctx.totalLines],
          ["Time", `${(ctx.elapsedMs / 1000).toFixed(1)}s`],
        ];
        summaryEl.innerHTML = "";
        for (const [k, v] of stats) {
          const stat = document.createElement("div");
          stat.className = "stat";
          const n = document.createElement("div");
          n.className = "n";
          n.textContent = typeof v === "number" ? v.toLocaleString() : v;
          const label = document.createElement("div");
          label.className = "k";
          label.textContent = k;
          stat.append(n, label);
          summaryEl.appendChild(stat);
        }
        summaryEl.style.display = "flex";
      }

      const HEAT_LIMIT = 100; // max file rows drawn in the heatmap

      function renderHeatmap(ctx) {
        heatmapEl.innerHTML = "";
        const entries = Object.keys(ctx.fileCounts)
          .map((path) => [path, ctx.fileCounts[path]])
          .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

        if (!entries.length) {
          heatmapEl.style.display = "none";
          return;
        }

        const shown = entries.slice(0, HEAT_LIMIT);
        const max = entries[0][1];

        const heading = document.createElement("h2");
        heading.textContent =
          `${entries.length.toLocaleString()} ` +
          `file${entries.length === 1 ? "" : "s"} with matches ` +
          `(click to filter)`;
        heatmapEl.appendChild(heading);

        const list = document.createElement("div");
        list.className = "heat-list";

        for (const [path, count] of shown) {
          // Log scale keeps low-count files visible next to a runaway file.
          const intensity =
            max > 1 ? Math.log(count + 1) / Math.log(max + 1) : 1;

          const row = document.createElement("div");
          row.className = "heat-row" + (activeFile === path ? " active" : "");
          row.dataset.file = path;
          row.title =
            `${path} -- ${count.toLocaleString()} match${count === 1 ? "" : "es"} ` +
            `(${formatPercent(count, ctx.totalMatches)})`;

          const hp = document.createElement("div");
          hp.className = "hp";
          const inner = document.createElement("span");
          inner.innerHTML = formatPath(path);
          hp.appendChild(inner);

          const track = document.createElement("div");
          track.className = "heat-track";
          const fill = document.createElement("div");
          fill.className = "heat-fill";
          fill.style.width = `${Math.max(3, Math.round(intensity * 100))}%`;
          fill.style.background = heatColor(intensity);
          track.appendChild(fill);

          const countEl = document.createElement("div");
          countEl.className = "heat-count";
          const countN = document.createElement("span");
          countN.className = "hc-n";
          countN.textContent = count.toLocaleString();
          const countP = document.createElement("span");
          countP.className = "hc-p";
          countP.textContent = `(${formatPercent(count, ctx.totalMatches)})`;
          countEl.append(countN, countP);

          row.append(hp, track, countEl);
          row.addEventListener("click", () => selectHeatFile(path));
          list.appendChild(row);
        }
        heatmapEl.appendChild(list);

        if (entries.length > shown.length) {
          const note = document.createElement("p");
          note.className = "heat-note";
          note.textContent =
            `Showing the top ${shown.length} files by hit count.`;
          heatmapEl.appendChild(note);
        }
        if (ctx.totalMatches > ctx.stored) {
          const capNote = document.createElement("p");
          capNote.className = "heat-note";
          capNote.textContent =
            `Over ${ctx.stored.toLocaleString()} matches found, so the results ` +
            `list below starts with the first ${ctx.stored.toLocaleString()}. ` +
            `Click any file to load all of its matching lines.`;
          heatmapEl.appendChild(capNote);
        }
        heatmapEl.style.display = "block";
      }

      function syncHeatRows() {
        for (const row of heatmapEl.querySelectorAll(".heat-row")) {
          row.classList.toggle("active", (row.dataset.file || null) === activeFile);
        }
      }

      function scrollToResults() {
        if (resultsHead.style.display !== "none") {
          resultsHead.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
      }

      // Clicking a heatmap file filters the results to it. If the scan dropped
      // matches past STORE_LIMIT, this file's rows may be missing from the
      // in-memory store, so re-read just this one file to recover all of them.
      async function selectHeatFile(path) {
        const turningOff = activeFile === path;
        activeFile = turningOff ? null : path;
        activeFileMatches = null;
        activeFileCapped = false;
        fileScanToken++;
        syncHeatRows();

        if (!activeFile) {
          renderResults();
          return;
        }

        // Fast path: nothing was dropped, so the store already has every match.
        if (!lastRun || lastRun.totalMatches <= lastRun.stored) {
          renderResults();
          scrollToResults();
          return;
        }

        const token = fileScanToken;
        const expected = (lastRun.fileCounts[path] || 0).toLocaleString();
        resultsHead.style.display = "none";
        resultsTable.style.display = "none";
        resultsBody.innerHTML = "";
        resultsNote.textContent =
          `Loading all ${expected} matches in "${stripRoot(path)}"...`;

        let rescanned = null;
        try {
          rescanned = await rescanFileMatches(path);
        } catch (e) {
          rescanned = null;
        }
        // Bail if the user switched files (or cleared) while we were reading.
        if (token !== fileScanToken || activeFile !== path) return;

        if (rescanned) {
          activeFileMatches = rescanned.matches;
          activeFileCapped = rescanned.capped;
        }
        renderResults();
        scrollToResults();
      }

      // Re-read one file (from disk or its archive) and collect every matching
      // line, mirroring how the streaming scanner counts lines and truncates
      // very long ones. Capped per file to keep memory bounded.
      async function rescanFileMatches(path) {
        const source = findSource(path);
        if (!source) return null;

        let result;
        try {
          result =
            source.kind === "file"
              ? await readPlainFile(source.file)
              : await readArchiveEntry(
                  source.file,
                  source.archivePath,
                  source.innerPath
                );
        } catch (error) {
          result = null;
        }
        if (!result || result.text == null) return null;

        const combined = lastRun.matchers.combined;
        const lines = result.text.split("\n");
        const matches = [];
        let capped = false;
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i];
          if (line.endsWith("\r")) line = line.slice(0, -1);
          if (!combined.test(line)) continue;
          if (matches.length >= STORE_LIMIT) {
            capped = true;
            break;
          }
          const text = line.length > 4000 ? line.slice(0, 4000) + " ..." : line;
          matches.push({ path, lineNo: i + 1, text });
        }
        return { matches, capped };
      }

      // Blue (few hits) -> red (most hits) heat scale for the dark theme.
      function heatColor(ratio) {
        const r = Math.max(0, Math.min(1, ratio));
        const hue = 210 - 210 * r;
        return `hsl(${hue}, 85%, 52%)`;
      }

      // Each heatmap row shows its raw count and its share of all matches.
      function formatPercent(part, total) {
        if (!total) return "0%";
        const pct = (part / total) * 100;
        if (pct >= 10) return `${pct.toFixed(0)}%`;
        if (pct >= 0.1) return `${pct.toFixed(1)}%`;
        return pct > 0 ? "<0.1%" : "0%";
      }

      function renderTermFilter(ctx) {
        termFilterEl.innerHTML = "";
        const terms = Object.keys(ctx.termCounts);
        if (terms.length <= 1 && !ctx.totalMatches) return;

        const all = document.createElement("span");
        all.className = "chip" + (activeTerm === null ? " active" : "");
        all.textContent = `All (${ctx.totalMatches.toLocaleString()})`;
        all.addEventListener("click", () => {
          activeTerm = null;
          syncTermChips();
          renderResults();
        });
        termFilterEl.appendChild(all);

        for (const term of terms) {
          const chip = document.createElement("span");
          chip.className = "chip" + (activeTerm === term ? " active" : "");
          chip.dataset.term = term;
          chip.textContent = `${term} (${ctx.termCounts[term].toLocaleString()})`;
          chip.addEventListener("click", () => {
            activeTerm = activeTerm === term ? null : term;
            syncTermChips();
            renderResults();
          });
          termFilterEl.appendChild(chip);
        }
      }

      function syncTermChips() {
        for (const chip of termFilterEl.children) {
          const term = chip.dataset.term || null;
          chip.classList.toggle("active", term === activeTerm);
        }
      }

      function activeTermRegex() {
        if (!activeTerm) return null;
        const flags = caseInput.checked ? "" : "i";
        const src = regexInput.checked ? activeTerm : escapeRegex(activeTerm);
        try {
          return new RegExp(src, flags);
        } catch (e) {
          return null;
        }
      }

      // The active match set: a heatmap file's fully re-read matches when one is
      // selected, otherwise the global (capped) store.
      function currentSource() {
        const usingFileSet = !!(activeFile && activeFileMatches);
        return {
          usingFileSet,
          matches: usingFileSet ? activeFileMatches : lastRun.matches,
        };
      }

      // Predicate for the term chip + free-text filters over the active set.
      function currentPredicate(usingFileSet) {
        const filterText = filterInput.value.trim().toLowerCase();
        const termRe = activeTermRegex();
        return (m) => {
          // currentSource already scopes to the file when a re-read set is in
          // use; only the shared global store needs the explicit path check.
          if (activeFile && !usingFileSet && m.path !== activeFile) return false;
          if (termRe && !termRe.test(m.text)) return false;
          if (
            filterText &&
            !m.text.toLowerCase().includes(filterText) &&
            !m.path.toLowerCase().includes(filterText)
          ) {
            return false;
          }
          return true;
        };
      }

      function renderResults() {
        if (!lastRun) return;
        const { usingFileSet, matches: source } = currentSource();
        const passes = currentPredicate(usingFileSet);

        // Single pass: collect up to the render cap, but count every match so
        // the note can report the true total (which may exceed the cap).
        const rows = [];
        let totalMatching = 0;
        for (const m of source) {
          if (!passes(m)) continue;
          totalMatching++;
          if (rows.length < RENDER_LIMIT) rows.push(m);
        }

        resultsBody.innerHTML = "";
        const frag = document.createDocumentFragment();
        const highlight = lastRun.matchers.highlight;
        for (const m of rows) {
          const tr = document.createElement("tr");
          tr.className = "res-row";
          tr.dataset.path = m.path;
          tr.dataset.line = m.lineNo;
          tr.title = "Click to open this file with matches highlighted";

          const fileTd = document.createElement("td");
          fileTd.className = "file";
          fileTd.innerHTML = formatPath(m.path);

          const lineTd = document.createElement("td");
          lineTd.className = "line";
          lineTd.textContent = m.lineNo;

          const textTd = document.createElement("td");
          textTd.className = "text";
          textTd.innerHTML = highlightText(m.text, highlight);

          tr.append(fileTd, lineTd, textTd);
          frag.appendChild(tr);
        }
        resultsBody.appendChild(frag);

        resultsTable.style.display = rows.length ? "table" : "none";
        resultsHead.style.display = lastRun.matches.length ? "flex" : "none";

        if (!lastRun.totalMatches) {
          resultsNote.textContent = "No matches found.";
          return;
        }

        const capped = lastRun.totalMatches > lastRun.stored;
        const parts = [];
        if (activeFile) {
          parts.push(
            `Filtered to file "${stripRoot(activeFile)}" (click it again to clear).`
          );
        }
        parts.push(
          `Showing ${rows.length.toLocaleString()} of ` +
            `${totalMatching.toLocaleString()} matching line${totalMatching === 1 ? "" : "s"}.`
        );

        if (usingFileSet) {
          // This file's lines were re-read from disk in full.
          if (activeFileCapped) {
            parts.push(
              `Only the first ${STORE_LIMIT.toLocaleString()} matches in this file ` +
                `were loaded; filter or download the CSV to narrow them.`
            );
          } else if (totalMatching > rows.length) {
            parts.push("Refine the filter or download the CSV to see them all.");
          }
        } else if (activeFile && capped) {
          // A file is selected but we fell back to the in-memory store (re-read
          // was unavailable), so some of its lines may be missing.
          parts.push(
            "Showing only the matches kept in memory for this file; a re-read " +
              "was unavailable, so some may be missing."
          );
        } else if (!activeFile && capped) {
          // Term / free-text filters run over the first STORE_LIMIT matches only.
          parts.push(
            `Searched the first ${lastRun.stored.toLocaleString()} of ` +
              `${lastRun.totalMatches.toLocaleString()} total matches -- click a ` +
              `file above to load all of its lines, or narrow your terms.`
          );
        } else if (totalMatching > rows.length) {
          parts.push("Refine the filter or download the CSV to see them all.");
        }
        resultsNote.textContent = parts.join(" ");
      }

      function highlightText(text, highlightRe) {
        highlightRe.lastIndex = 0;
        let result = "";
        let last = 0;
        let match;
        let guard = 0;
        while ((match = highlightRe.exec(text)) !== null) {
          if (match.index >= last) {
            result += escapeHtml(text.slice(last, match.index));
            result += "<mark>" + escapeHtml(match[0]) + "</mark>";
            last = match.index + match[0].length;
          }
          // Avoid infinite loop on zero-width matches.
          if (match.index === highlightRe.lastIndex) highlightRe.lastIndex++;
          if (++guard > 5000) break;
        }
        result += escapeHtml(text.slice(last));
        return result;
      }

      function formatPath(path) {
        const shown = stripRoot(path);
        const idx = shown.lastIndexOf("/");
        if (idx === -1) return `<span class="base">${escapeHtml(shown)}</span>`;
        const dir = shown.slice(0, idx + 1);
        const base = shown.slice(idx + 1);
        return (
          escapeHtml(dir) + `<span class="base">${escapeHtml(base)}</span>`
        );
      }

      // The single top-level folder or archive shared by every matched file is
      // noise on each row, so we hide it and show only the nested path.
      function commonRoot(paths) {
        if (!paths.length) return "";
        const first = paths[0].split("/")[0];
        if (!first) return "";
        for (const p of paths) {
          if (p.split("/")[0] !== first) return "";
        }
        return paths.some((p) => p.startsWith(first + "/")) ? first : "";
      }

      function stripRoot(path) {
        if (displayRoot && path.startsWith(displayRoot + "/")) {
          return path.slice(displayRoot.length + 1);
        }
        return path;
      }

      function downloadCsv() {
        if (!lastRun) return;
        // Export exactly what the current filters show (file, term, free text),
        // including a heatmap file's fully re-read matches.
        const { usingFileSet, matches: source } = currentSource();
        const passes = currentPredicate(usingFileSet);
        const rows = [["file", "line", "text"]];
        for (const m of source) {
          if (passes(m)) rows.push([m.path, String(m.lineNo), m.text]);
        }
        if (rows.length === 1) return;
        const csv = rows
          .map((r) => r.map(csvCell).join(","))
          .join("\r\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "log-search-results.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function csvCell(value) {
        const needsQuotes = /[",\r\n]/.test(value);
        const escaped = value.replace(/"/g, '""');
        return needsQuotes ? `"${escaped}"` : escaped;
      }

      // ---- file viewer -------------------------------------------------------

      // Map a result path back to the selected source that can produce its bytes.
      // Plain files match directly; archived entries are prefixed with their
      // archive's path (except single .gz files, whose entry drops the suffix).
      function findSource(path) {
        for (const item of selected) {
          const kind = window.LogArchives
            ? LogArchives.archiveKind(item.path)
            : null;
          if (!kind && item.path === path) {
            return { kind: "file", file: item.file };
          }
        }
        for (const item of selected) {
          const kind = window.LogArchives
            ? LogArchives.archiveKind(item.path)
            : null;
          if (!kind) continue;
          if (kind === "gzip") {
            const inner = item.path.replace(/\.(gz|gzip)$/i, "") || item.path;
            if (path === inner) {
              return {
                kind: "archive",
                file: item.file,
                archivePath: item.path,
                innerPath: inner,
              };
            }
          } else if (path.startsWith(item.path + "/")) {
            return {
              kind: "archive",
              file: item.file,
              archivePath: item.path,
              innerPath: path,
            };
          }
        }
        return null;
      }

      async function readPlainFile(file) {
        const bytes = new Uint8Array(await file.arrayBuffer());
        const text = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
        return { text };
      }

      // Re-extract a single entry from its archive, capturing only the bytes of
      // the target file and stopping the extraction once we have them.
      async function readArchiveEntry(file, archivePath, targetPath) {
        const chunks = [];
        let found = false;
        let doneTarget = false;
        let size = 0;
        const sink = {
          open(name) {
            if (doneTarget || name !== targetPath) return null;
            found = true;
            return { name };
          },
          chunk(_handle, bytes) {
            chunks.push(bytes.slice());
            size += bytes.length;
            return true;
          },
          close() {
            if (found) doneTarget = true;
          },
          skip() {},
          error() {},
        };
        try {
          await LogArchives.extract(file, archivePath, sink, {
            isCancelled: () => doneTarget,
          });
        } catch (error) {
          return null;
        }
        if (!found) return null;
        const buffer = new Uint8Array(size);
        let offset = 0;
        for (const part of chunks) {
          buffer.set(part, offset);
          offset += part.length;
        }
        const text = new TextDecoder("utf-8", { fatal: false }).decode(buffer);
        return { text };
      }

      function viewerMessage(message) {
        viewerBody.innerHTML = "";
        const line = document.createElement("div");
        line.className = "v-line";
        const text = document.createElement("span");
        text.className = "v-tx";
        text.textContent = message;
        line.appendChild(text);
        viewerBody.appendChild(line);
      }

      async function openViewer(path, lineNo) {
        if (!lastRun) return;
        const token = ++viewerToken;
        viewer.hidden = false;
        document.body.style.overflow = "hidden";
        viewerTitle.innerHTML = formatPath(path);
        viewerMarks = [];
        viewerIdx = -1;
        updateViewerInfo();
        viewerMessage("Loading...");

        const source = findSource(path);
        if (!source) {
          viewerMessage(
            "Could not locate this file to open. Re-select the folder or " +
              "archive and search again."
          );
          return;
        }

        let result;
        try {
          result =
            source.kind === "file"
              ? await readPlainFile(source.file)
              : await readArchiveEntry(
                  source.file,
                  source.archivePath,
                  source.innerPath
                );
        } catch (error) {
          result = null;
        }

        // Bail if the viewer was closed or another file opened while loading.
        if (viewer.hidden || token !== viewerToken) return;
        if (!result || result.text == null) {
          viewerMessage("Could not read this file.");
          return;
        }

        renderViewerContent(result.text, lineNo);
        viewerMarks = Array.from(viewerBody.querySelectorAll("mark"));

        const hit = viewerBody.querySelector(`.v-line[data-ln="${lineNo}"]`);
        let start = viewerMarks.findIndex((mark) => {
          const row = mark.closest(".v-line");
          return row && Number(row.dataset.ln) >= lineNo;
        });
        if (start < 0 && viewerMarks.length) start = 0;
        if (start >= 0) {
          setViewerMatch(start, false);
        } else {
          if (hit) hit.scrollIntoView({ block: "center" });
          updateViewerInfo();
        }
        viewerBody.focus();
      }

      function renderViewerContent(text, hitLine) {
        const highlight = lastRun.matchers.highlight;
        const lines = text.split("\n");
        const parts = [];
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i];
          if (line.endsWith("\r")) line = line.slice(0, -1);
          const ln = i + 1;
          const cls = ln === hitLine ? "v-line v-hit" : "v-line";
          parts.push(
            `<div class="${cls}" data-ln="${ln}">` +
              `<span class="v-ln">${ln}</span>` +
              `<span class="v-tx">${highlightText(line, highlight)}</span>` +
              `</div>`
          );
        }
        viewerBody.innerHTML = parts.join("");
      }

      function setViewerMatch(index, smooth = true) {
        if (!viewerMarks.length) {
          updateViewerInfo();
          return;
        }
        const next = Math.max(0, Math.min(index, viewerMarks.length - 1));
        if (viewerIdx >= 0 && viewerMarks[viewerIdx]) {
          viewerMarks[viewerIdx].classList.remove("v-cur");
        }
        viewerIdx = next;
        const mark = viewerMarks[viewerIdx];
        mark.classList.add("v-cur");
        mark.scrollIntoView({
          block: "center",
          behavior: smooth ? "smooth" : "auto",
        });
        updateViewerInfo();
      }

      function updateViewerInfo() {
        const has = viewerMarks.length > 0;
        viewerMinfo.textContent = has
          ? `Match ${viewerIdx + 1} / ${viewerMarks.length.toLocaleString()}`
          : "No matches";
        viewerFirst.disabled = !has || viewerIdx <= 0;
        viewerPrev.disabled = !has || viewerIdx <= 0;
        viewerNext.disabled = !has || viewerIdx >= viewerMarks.length - 1;
        viewerLast.disabled = !has || viewerIdx >= viewerMarks.length - 1;
      }

      function closeViewer() {
        viewer.hidden = true;
        viewerBody.innerHTML = "";
        viewerMarks = [];
        viewerIdx = -1;
        document.body.style.overflow = "";
      }

      function showConfigError(message) {
        configError.textContent = message || "";
      }

      function escapeRegex(value) {
        return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (c) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        }[c]));
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        const units = ["KB", "MB", "GB", "TB"];
        let value = bytes / 1024;
        let unit = 0;
        while (value >= 1024 && unit < units.length - 1) {
          value /= 1024;
          unit++;
        }
        return `${value.toFixed(value >= 10 ? 0 : 1)} ${units[unit]}`;
      }

      function debounce(callback, waitMs) {
        let timeoutId;
        return (...args) => {
          window.clearTimeout(timeoutId);
          timeoutId = window.setTimeout(() => callback(...args), waitMs);
        };
      }

      if (!("TextDecoderStream" in window)) {
        showConfigError(
          "This browser lacks TextDecoderStream. Use a recent Chrome, Edge, or Safari."
        );
        searchBtn.disabled = true;
      } else if (!archivesSupported) {
        // Folder scanning still works; only automatic archive expansion needs
        // the DecompressionStream API (Chrome 103+, Firefox 113+, Safari 16.4+).
        scanNote.textContent =
          "Note: automatic archive expansion (.zip/.tar/.gz) needs a newer " +
          "browser; plain folders still work here.";
      }
    </script>
  </body>
</html>
