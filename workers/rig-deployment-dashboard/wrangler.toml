name = "rig-deployment-dashboard"
main = "src/index.js"
compatibility_date = "2024-09-23"

[vars]
# Set this to the GitHub Pages origin after deployment, for example:
# ALLOWED_ORIGIN = "https://alexbeckner.github.io"
# Leave unset or use "*" during local testing.
ALLOWED_ORIGIN = "*"
SNAPSHOT_SIZE = "10"
CACHE_SECONDS = "10"

[[d1_databases]]
binding = "DB"
database_name = "rig-deployment-dashboard"
database_id = "a1ee14ef-c799-4caa-a42f-7653919f0ea3"

[triggers]
crons = ["* * * * *"]
