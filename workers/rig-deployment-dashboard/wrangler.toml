name = "rig-deployment-dashboard"
main = "src/index.js"
compatibility_date = "2024-09-23"

[vars]
# Same-origin Worker-hosted app. Override to "*" in local `.dev.vars` if needed.
ALLOWED_ORIGIN = "https://rig-deployment-dashboard.dataspeedhashfinder.workers.dev"
SNAPSHOT_SIZE = "10"
CACHE_SECONDS = "10"

[[d1_databases]]
binding = "DB"
database_name = "rig-deployment-dashboard"
database_id = "a1ee14ef-c799-4caa-a42f-7653919f0ea3"

[triggers]
crons = ["* * * * *"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[[send_email]]
name = "EMAIL"
remote = true
