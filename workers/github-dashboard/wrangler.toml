name = "github-dashboard"
main = "src/index.js"
compatibility_date = "2026-06-29"
keep_vars = true

[vars]
# Same-origin Worker-hosted app. Override to "*" in local `.dev.vars` if needed.
ALLOWED_ORIGIN = "https://github-dashboard.appliedapps.workers.dev"
GITHUB_REPO = "AppliedNeuron/core-stack"
SYNC_COMMIT_PAGES = "3"
SYNC_PR_PAGES = "5"
SYNC_TAG_PAGES = "3"
# Branches are refreshed by a continuous GraphQL sweep (100 branches + their
# commit date per request). This caps GraphQL pages per invocation; the sweep
# resumes from a saved cursor each cron tick and prunes deleted branches when a
# full pass completes. Raise for faster sweeps, lower if you hit the subrequest
# budget or CPU (Error 1102).
SYNC_BRANCH_SWEEP_PAGES = "12"
# History back-fill rotates one page per type per turn (branches -> tags ->
# commits -> prs -> repeat) so all types advance together each run.
SYNC_SEED_PAGES_PER_TURN = "1"
# Safety cap on how many history pages a single type may pull per invocation;
# the real limiter is SYNC_MAX_GITHUB_REQUESTS.
SYNC_SEED_PAGE_BUDGET = "200"
# Free plan allows 50 external subrequests per invocation. Keep the whole run
# (fresh pass + history back-fill) under that; the cron trigger resumes the
# back-fill from saved cursors every 15 min. Raise toward ~45 for faster
# seeding, or lower if you hit CPU (Error 1102) on the free plan.
SYNC_MAX_GITHUB_REQUESTS = "30"
# Backstop only; stall detection is primarily heartbeat-based below.
SYNC_RUNNING_TTL_SECONDS = "600"
# A running sync is treated as dead if it stops heartbeating for this long,
# letting the next cron tick take over (kept under the 15 min cron interval).
SYNC_HEARTBEAT_STALE_SECONDS = "180"

[[d1_databases]]
binding = "DB"
database_name = "github-dashboard"
database_id = "d2b507b0-d616-41fe-a2cd-9f6e7c72011d"

[triggers]
crons = ["*/15 * * * *"]
