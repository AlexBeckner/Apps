name = "github-dashboard"
main = "src/index.js"
compatibility_date = "2026-06-29"
keep_vars = true

[vars]
# Same-origin Worker-hosted app. Override to "*" in local `.dev.vars` if needed.
ALLOWED_ORIGIN = "https://github-dashboard.appliedapps.workers.dev"
# Repo whose commits/PRs the dashboard lazily reads at request time (PR bodies,
# commit messages, live per-branch commit lists). Needs the GITHUB_TOKEN secret
# with read access to it.
GITHUB_REPO = "AppliedNeuron/core-stack"
# All syncing is owned by git-based GitHub Actions in this repo (sync-branches;
# sync-commits [+ tags]; sync-prs), each run on demand (manual dispatch, no
# cron). The Worker no longer syncs anything itself. "Sync now" dispatches all
# three workflows via the GitHub API using the ACTIONS_DISPATCH_TOKEN secret --
# a PAT with actions:read + write on ACTIONS_REPO. ACTIONS_REF defaults to "main".
ACTIONS_REPO = "AlexBeckner/Apps"

# Secrets (set with `wrangler secret put <NAME>`), not stored here:
#   GITHUB_TOKEN           read access to GITHUB_REPO (lazy request-time reads)
#   ACTIONS_DISPATCH_TOKEN PAT with actions:read+write on ACTIONS_REPO ("Sync now")
#   ACCESS_PASSWORD        company-auth gate (see company-auth.js)

# Serves the browser-tab favicon (./public/favicon.png) via env.ASSETS. The
# Worker still generates all HTML itself; the only static asset is the icon.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# No scheduled triggers: the Worker no longer syncs. This MUST be an explicit
# empty list -- omitting [triggers] leaves any previously deployed cron live on
# Cloudflare (that's how the old "*/15" sync cron lingered and kept throwing
# "Handler does not export a scheduled() function" every 15 min). `crons = []`
# removes it on the next deploy.
[triggers]
crons = []

[[d1_databases]]
binding = "DB"
database_name = "github-dashboard"
database_id = "d2b507b0-d616-41fe-a2cd-9f6e7c72011d"
