name = "github-dashboard"
main = "src/index.js"
compatibility_date = "2026-06-29"
keep_vars = true

[vars]
# Same-origin Worker-hosted app. Override to "*" in local `.dev.vars` if needed.
ALLOWED_ORIGIN = "https://github-dashboard.appliedapps.workers.dev"
# Repo whose commits/PRs the dashboard lazily reads at request time (PR bodies,
# commit messages, live per-branch commit lists). Needs the GITHUB_TOKEN secret
# with read access to it.
GITHUB_REPO = "AppliedNeuron/core-stack"
# All syncing is owned by git-based GitHub Actions in this repo (sync-branches;
# sync-commits [+ tags]; sync-prs), each running hourly. The Worker no longer
# syncs anything itself (no cron). "Sync now" dispatches all three workflows via
# the GitHub API using the ACTIONS_DISPATCH_TOKEN secret -- a PAT with
# actions:read + write on ACTIONS_REPO. ACTIONS_REF defaults to "main".
ACTIONS_REPO = "AlexBeckner/Apps"

# Secrets (set with `wrangler secret put <NAME>`), not stored here:
#   GITHUB_TOKEN           read access to GITHUB_REPO (lazy request-time reads)
#   ACTIONS_DISPATCH_TOKEN PAT with actions:read+write on ACTIONS_REPO ("Sync now")
#   ACCESS_PASSWORD        company-auth gate (see company-auth.js)

[[d1_databases]]
binding = "DB"
database_name = "github-dashboard"
database_id = "d2b507b0-d616-41fe-a2cd-9f6e7c72011d"
