name: Deploy static site to Pages

# Replaces GitHub's built-in "Deploy from a branch" flow. That flow's deploy step
# has a FIXED 10-minute timeout (timeout: 600000) that fails whenever GitHub's Pages
# backend is slow to pick a deployment off the queue -- which is what's been happening
# (build succeeds, then "deployment_queued" until the 10-min timeout aborts it).
#
# This does the same job (publish the repo root as a static site) but lets us raise
# the deploy timeout and control concurrency.
#
# >>> ACTIVATION (do this FIRST): in the repo on GitHub, go to
# Settings -> Pages -> Build and deployment -> Source, and switch it from
# "Deploy from a branch" to "GitHub Actions". Until you do, this workflow will fail
# at the deploy step because Pages is still configured to build from a branch. Your
# live site stays up on the last successful deploy the whole time.

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

# Least-privilege permissions the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; do NOT cancel an in-flight deploy (GitHub's guidance).
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Publishes the whole repo root, matching the old branch-based deploy.
      # upload-pages-artifact always excludes .git and .github, plus top-level
      # dotfiles (e.g. .nojekyll, which the Actions flow doesn't need).
      - name: Upload repo as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # 30 min (ms) instead of the built-in flow's fixed 10 min, so a transient
          # Pages backend queue slowdown no longer fails the deploy.
          timeout: 1800000
          error_count: 15
