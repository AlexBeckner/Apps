name: Sync commits + tags to dashboard D1

# Commit metadata for EVERY branch is sourced from git (one `git log --all`)
# instead of paginating the REST API per branch, and every tag is sourced from
# the same clone (`git for-each-ref refs/tags`). These are the sole source of
# truth for commits and tags in D1 (the Worker no longer syncs anything).
#
# This run also snapshots branch heads (`git for-each-ref refs/heads`) from the
# same clone, so the commit ancestry DAG and the branch heads that "branches
# containing this commit" matches against are one consistent snapshot.
#
# The clone is BLOBLESS (--filter=blob:none: all commits + all trees, no file
# blobs) and cached between runs. Blobless (not treeless) is required because
# `git log --all` traverses trees and a treeless clone would lazily fetch them
# mid-log -- which fails here since credentials aren't persisted on the repo.
# Blobless keeps every tree local, so `git log` never phones home; only file
# contents (blobs, which we never read) are omitted.

on:
  # Manual-only (no cron) so a private repo doesn't burn Actions minutes hourly.
  # Runs on demand via the dashboard's "Sync now" button or the Actions UI.
  workflow_dispatch:
    inputs:
      full:
        description: "Force full re-ingest (ignore the D1 watermark)"
        type: boolean
        default: false

concurrency:
  group: sync-commits
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout dashboard repo (for the ingest script)
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore core-stack git cache
        uses: actions/cache@v4
        with:
          path: repo.git
          # Rolling cache: the run-id key never hits, so a fresh cache is saved
          # every run; restore-keys pulls the most recent prior cache to fetch on
          # top of. Keeps the blobless history warm between runs. The v2 bump
          # invalidates old treeless caches (which lacked trees).
          key: core-stack-commits-git-v2-${{ github.run_id }}
          restore-keys: |
            core-stack-commits-git-v2-

      - name: Fetch full commit history from core-stack (blobless)
        env:
          # PAT / fine-grained token with contents:read on AppliedNeuron/core-stack.
          CORE_STACK_TOKEN: ${{ secrets.CORE_STACK_TOKEN }}
          CORE_STACK_REPO: AppliedNeuron/core-stack
        run: |
          set -euo pipefail
          AUTH=$(printf 'x-access-token:%s' "$CORE_STACK_TOKEN" | base64 | tr -d '\n')
          if [ ! -d repo.git ]; then
            git init --bare repo.git
            git -C repo.git remote add origin "https://github.com/${CORE_STACK_REPO}.git"
          fi
          # Full history of every branch: all commits + all trees, no file blobs.
          # Blobless (not treeless) so `git log --all` never needs a lazy fetch.
          # --no-tags disables auto-following; the explicit refs/tags refspec is
          # still honored, so we get every tag object (for the tag sync) without
          # git also grabbing tags reachable from unrelated fetched history.
          git -C repo.git \
            -c http.extraheader="Authorization: Basic ${AUTH}" \
            -c protocol.version=2 \
            fetch --filter=blob:none --prune --no-tags \
            origin '+refs/heads/*:refs/heads/*' '+refs/tags/*:refs/tags/*'
          DEF=$(git -C repo.git -c http.extraheader="Authorization: Basic ${AUTH}" \
            ls-remote --symref origin HEAD \
            | sed -n 's#^ref: refs/heads/\(.*\)[[:space:]]HEAD#\1#p')
          echo "DEFAULT_BRANCH=${DEF}" >> "$GITHUB_ENV"
          echo "Default branch: ${DEF}"
          echo "Branches: $(git -C repo.git for-each-ref refs/heads | wc -l)"
          echo "Tags: $(git -C repo.git for-each-ref refs/tags | wc -l)"

      - name: Ingest commits into D1
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: "501de9c56b6ed3604e3ca0d047ed8084"
          D1_DATABASE_ID: "d2b507b0-d616-41fe-a2cd-9f6e7c72011d"
          REPO_DIR: repo.git
          GITHUB_REPO: AppliedNeuron/core-stack
          FULL: ${{ github.event.inputs.full }}
          # Safety net: the blobless clone already has every tree, so `git log`
          # should never lazily fetch. If it somehow tries, fail fast locally
          # (clear error, no unauthenticated network call) instead of the opaque
          # "could not read Username for github.com" that a lazy fetch produces.
          GIT_NO_LAZY_FETCH: "1"
        run: node workers/github-dashboard/scripts/ingest-commits.mjs

      # Snapshot branch heads from the SAME clone that just built the DAG, so the
      # "branches containing this commit" walk and the branch heads it matches
      # against are always one consistent point-in-time snapshot. Without this,
      # branch heads (from the separate sync-branches run) can be newer or older
      # than the DAG, so a freshly pushed commit/head shows "in 0 branches" until
      # both happen to line up. sync-branches still runs on its own cadence for
      # fresher between-run branch listings; this just guarantees consistency at
      # DAG-build time. Reuses the same mark-and-sweep ingest as sync-branches.
      - name: Snapshot branch heads into D1 (consistent with the DAG)
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: "501de9c56b6ed3604e3ca0d047ed8084"
          D1_DATABASE_ID: "d2b507b0-d616-41fe-a2cd-9f6e7c72011d"
          # Exported by the fetch step above; marks the default branch.
          DEFAULT_BRANCH: ${{ env.DEFAULT_BRANCH }}
        run: |
          set -euo pipefail
          git -C repo.git for-each-ref --sort=-committerdate refs/heads \
            --format='%(objectname)%09%(committerdate:unix)%09%(refname:short)' > branches.tsv
          echo "Branch tips: $(wc -l < branches.tsv)"
          node workers/github-dashboard/scripts/ingest-branches.mjs branches.tsv

      - name: Ingest tags into D1
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: "501de9c56b6ed3604e3ca0d047ed8084"
          D1_DATABASE_ID: "d2b507b0-d616-41fe-a2cd-9f6e7c72011d"
          REPO_DIR: repo.git
        run: node workers/github-dashboard/scripts/ingest-tags.mjs
